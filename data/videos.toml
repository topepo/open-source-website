[[videos]]
url = "https://www.youtube.com/watch?v=oFQANK13-k4"
title = "MLOps with vetiver in Python and R | Led by Julia Silge & Isabel Zimmerman"
slug = "2022-09-20_mlops-with-vetiver-in-python-and-r-led-by-julia-silge-isabel-zimmerman"
date = "2022-09-20T17:30:50Z"
description = "Many data scientists understand what goes into training a machine learning model, but creating a strategy to deploy and maintain that model can be daunting. In this meetup, learn what MLOps is, what principles can be used to create a practical MLOps strategy, and what kinds of tasks and components are involved. See how to get started with vetiver, a framework for MLOps tasks in R and Python that provides fluent tooling to version, deploy, and monitor your models.\n\nBlog Post with Q&A: https://www.rstudio.com/blog/vetiver-answering-your-questions/\n\nFor folks interested in seeing what data artifacts look like on Connect, we have these for R:\n⬢ Versioned model object: https://colorado.rstudio.com/rsc/seattle-housing-pin/\n⬢ Deployed API: https://colorado.rstudio.com/rsc/seattle-housing/\n⬢ Monitoring dashboard: https://colorado.rstudio.com/rsc/seattle-housing-dashboard/\n⬢ Create a custom yardstick metric: https://juliasilge.com/blog/nyc-airbnb/\n⬢ End point used in the demo: https://colorado.rstudio.com/rsc/scooby\n\nOur team's reading list (mentioned in the meetup)\n\nBooks:\n⬢ Designing Machine Learning Systems by Chip Huyen: https://www.oreilly.com/library/view/designing-machine-learning/9781098107956/\n\nArticles:\n⬢ “Machine Learning Operations (MLOps): Overview, Definition, and Architecture” by Kreuzberger et al: https://arxiv.org/abs/2205.02302\n⬢  “From Concept Drift to Model Degradation: An Overview on Performance-Aware Drift Detectors” by Bayram et al: https://arxiv.org/abs/2203.11070\n⬢ “Towards Observability for Production Machine Learning Pipelines” by Shankar et al: https://arxiv.org/pdf/2108.13557.pdf\n⬢ “The ML Test Score: A Rubric for ML Production Readiness and Technical Debt Reduction” by Breck et al: https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/aad9f93b86b7addfea4c419b9100c6cdd26cacea.pdf\n\nWeb content:\n⬢  _How ML Breaks: A Decade of Outages for One Large ML Pipeline_ by Papasian and Underwood: https://www.youtube.com/watch?v=hBMHohkRgAA\n⬢  _MLOps Principles_ by INNOQ: https://ml-ops.org/content/mlops-principles\n⬢  _Google’s Practitioners Guide to MLOps_ by Salama et al: https://services.google.com/fh/files/misc/practitioners_guide_to_mlops_whitepaper.pdf\n⬢  _Gently Down the Stream_ by Mitch Seymour: https://www.gentlydownthe.stream/\n\nSpeaker bios:\nJulia Silge is a software engineer at RStudio focusing on open source MLOps tools, as well as an author and international keynote speaker. Julia loves making beautiful charts, Jane Austen, and her two cats. \n\nIsabel Zimmerman is also a software engineer on the open source team at RStudio, where she works on building MLOps frameworks. When she's not geeking out over new data science techniques, she can be found hanging out with her dog or watching Marvel movies."
