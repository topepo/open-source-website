date = "2021-10-07T16:13:14Z"
description = "You probably know that RStudio makes a free, open-source development environment for data scientists. It’s made with love and used by millions of people around the world.\n\nWhat you might not know is that we also make a professional platform, called RStudio Team.\n\nLearn How RStudio Team Can...\n- Help you scale your data science work\n- Seamlessly manage open-source data science environments\n- Automate repetitive tasks\n- And, rapidly share key insights and data science products securely to your entire organization.\n\nTimecodes\n0:00 - Intro\n4:18 - Hard truth of data science\n10:22 - Serious Data Science\n16:46 - Model management with R and Python\n18:48 - Live Demo / RStudio Workbench\n23:09 - RStudio support for Jupyter Notebooks\n24:40 - Live Demo / RStudio Connect\n28:01 - RStudio support for VS Code\n30:05 - R and Python within RStudio\n32:33 - Scale and share data science results\n36:55 - Sharing previous versions of presentations\n38:16 - Data Science team knowledge sharing\n40:36 - Scheduling snd emailing data science content\n43:55 - Live demo / RStudio Package Manager\n48:09 - Data Science stories\n49:37 - RStudio Team\n52:59 - What makes RStudio different?\n55:12 - Q/A - Learn More\n\nLeading organizations like NASA, Janssen Pharmaceuticals, The World Health Organization, financial institutions, government agencies and insurance organizations around the globe use RStudio’s professional products to tackle world-changing problems and we’re inviting you to learn how. You’ll learn how RStudio Team gives professional data science teams superpowers, with all of the bells and whistles that enterprises need.\n\nYou can try RStudio Team free here: https://www.rstudio.com/products/team/evaluation2/\n\nIf you'd like to access presentation slides, sign up for future events, provide feedback and/or ask additional questions we've bundled everything together for you here: https://docs.google.com/document/d/1HGt7LSohhyxpCvETvVEFHugrdaSnTcZaXbI0jV5g9o