title = "Aleksander Dietrichson | Mobile Education App during COVID | Teaching Data Science | Posit (2022)"
slug = "2022-10-24_aleksander-dietrichson-mobile-education-app-during-covid-teaching-data-science-posit-2022"
date = "2022-10-24T17:07:59Z"
description = "This talk discusses how we used R to solve some of the challenges we faced when all classes were emergency onlined due to COVID. Instructors improvised, typically defaulting to Zoom. Survey data showed that more than half of our student population had no laptop or computer access, but all did have a smartphone. We set out to mitigate this by creating a mobile app that facilitates a feedback loop between students and instructors and provides analytics of this interaction.Starting as a shiny-app with {shinymobile}, we applied linguistic and social network analysis to provide the instructor with analyses. As the pandemic dragged on, the system evolved and became more integrated with Google Cloud and the Android ecosystem.\n\nSession: Teaching data science"
