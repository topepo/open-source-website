description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Jonathan Lin, Adviser of Data Science and AI at Ovintiv, to chat about scaling data science infrastructure with Kubernetes, the \"show, don't tell\" method for leadership buy-in, creating internal handbooks to support users, and even a little chat around navigating a sparse job market.\n\nIn this Hangout, we explore Jon's approach to driving adoption and scaling impact without becoming a bottleneck. He discusses moving from simple virtual machines to using Kubernetes to manage memory for over 900 users and 60 publishers (wow!!). John also details how he built a comprehensive internal \"handbook\" to answer repeated questions, allowing him to support a growing community of R and Python users while encouraging self-service learning.\n\nResources mentioned in the video and zoom chat: \n🔗 Posit Conf 2026 Call for Talks → https://posit.co/blog/posit-conf-2026-call-for-talks/ \n🔗 Data Science Lab → https://pos.it/dslab \n🔗 R Screencasts (David Robinson) → https://www.rscreencasts.com/ \n🔗 Python for Data Analysis (Wes McKinney) → https://wesmckinney.com/book/ \n🔗 Cool 3D printing ggplots and maps using Rayshader! (shared in chat) → https://www.tylermw.com/posts/data_visualization/3d-printing-rayshader.html\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about Dragon Boating! Jon coaches a team, and the chat lit up with curiosity, explanations, and excitement about the sport (and its potential crossover with 3D printing paddles? We are the best community). Have you ever watched a dragon boat event?!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n10:38 \"What are tips for navigating a sparse job market?\" \n14:33 \"How do you support all of your users with different skills?\" \n17:49 \"What types of fraud were you working with?\" \n21:12 \"How do you get people to actually read it?\" \n24:55 \"How did you learn R?\" \n29:18 \"What are some techniques you use to get people to trust the tech?\" \n33:35 \"Do you block time each week for documentation?\" \n36:50 \"How would you recommend getting a company to buy in?\" \n42:15 \"How do you pick the topics to learn more about?\" \n45:34 \"Advice on how to overcome fear and feel confident enough to ask questions?\" \n49:09 \"Do you program much in your current position?\" \n51:34 \"Is it truly necessary to have deployment experience to get a data science job?\""
