[[videos]]
url = "https://www.youtube.com/watch?v=I2W7i7QyJPI"
title = "How to Build, Deploy, & Share a Python Application in 20 minutes! (Using Shiny)"
slug = "2024-05-27_how-to-build-deploy-share-a-python-application-in-20-minutes-using-shiny"
date = "2024-05-27T15:20:20Z"
description = "This is a quick-start guide to Shiny for Python. It's part 1 of a multi-part series. \nData scientists need to quickly build web applications to create and share interactive visualizations, giving others a way to interact with data and analytics. Shiny helps you do this. \n\nIn this video, we'll walk you through the basics of setting up Shiny for Python, creating your first app, and deploying it so others can use it. We'll cover:\n- Installing Shiny and necessary dependencies\n- Writing and running your first Shiny app\n- Basic UI and server structure\n- Deploying your app online\n- Helpful Links\n\nShiny for Python Homepage: https://shiny.posit.co/py/\n\nThe link to the final app can be found here: https://keithgalli.shinyapps.io/final-app/\n\nFollow along with the code examples provided in this repository: https://github.com/KeithGalli/shiny-python-projects\n\nCheck out the complete documentation here: https://shiny.posit.co/py/api/express/\n\nStay tuned for part 2, where we'll dive deeper into advanced features and customization options.\n\n---\nVideo Timeline!\n0:00 - Intro to Shiny & Video Overview\n1:43 - Getting Started with the Shinylive Playground\n2:44 - Building a custom visualization with Shinylive\n5:18 - Easily sharing the code/application for a Shinylive app\n6:12 - Building a Shiny Express App locally (VSCode)\n9:40 - How to run app if you're not using VSCode\n10:17 - Further customization of our app (adding title, using CSV data, dynamic input)\n17:15 - Deploying our Shiny app to the web\n21:20 - Conclusion & what's coming next in the series\n\nVideo by @KeithGalli\n\nAll videos in the series:\nPart 1 - How to Build, Deploy, & Share a Python Application in 20 minutes! (Using Shiny): https://www.youtube.com/watch?v=I2W7i7QyJPI&t=0s\nPart 2 - How to make Interactive Python Dashboards! (Reactivity in Shiny): https://www.youtube.com/watch?v=SLkA-Z8HTAE&t=0s\nPart 3 - How to make your Python Dashboard look Professional! (Layouts in Shiny): https://www.youtube.com/watch?v=jemk7DoN4qk&t=0s\nPart 4 - How to combine Matplotlib, Plotly, Seaborn, & more in a single Python Dashboard! (Shiny for Python): https://youtu.be/xDgO5hB4-VU?si=kk20yhdpsBqkMYcC\nPart 5 - How to Perfect Your Python Dashboard with Advanced Styling! (HTML/CSS - Shiny for Python): https://youtu.be/uYZUS-eFbqw"
