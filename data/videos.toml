[[videos]]
url = "https://www.youtube.com/watch?v=qIzKJKcmh-s"
title = "Predicting Lending Rates with Databricks, tidymodels, and Posit Team"
slug = "2024-06-26_predicting-lending-rates-with-databricks-tidymodels-and-posit-team"
date = "2024-06-26T15:00:06Z"
description = "Machine learning algorithms are reshaping financial decision-making, changing how the industry manages financial risk.\n\nFor our workflow demo today on June 26th at 11 am ET, Garrett Grolemund at Posit will show how to use both Posit and Databricks to apply machine learning methods to the consumer credit market, where accurately predicting lending rates is critical for customer acquisition. \n\n*Please note that while the workflow focuses on a financial example, the general workflow will be useful to those using Databricks and R together across any industry.\n\nDuring this workflow demo, you will learn how to:\n1. Connect to historical lending rate data stored in Databricks Delta Lake\n2. Tune and cross-validate a penalized linear regression (LASSO) that predicts interest rates\n3. Select variables with the penalized linear regression model (LASSO)\n4. Build an interactive Shiny app to provide a customer-facing user interface for our model\n5. Deploy the app to production on Posit Connect, and arrange for the app to access Databricks\n\nResources for the demo:\n✨ GitHub repo for today's materials: https://github.com/posit-dev/databricks-finance-app\n✨ Accompanying Guide: https://pub.demo.posit.team/public/predicting-lending-rates/lending-rate-prediction.html\n✨ Q&A Recording: https://youtube.com/live/wNI3AhHP7uM\n\nAdditional follow-up links:\n✨ GitHub Repo: https://github.com/posit-dev/databricks-finance-app\n✨ Accompanying Guide: https://pub.demo.posit.team/content/fec42b3d-3aa9-43e1-8312-0ff553d09851/lending-rate-prediction.html\n✨ While this demo uses ODBC package to connect to Databricks, you can also use sparklyr R package. Learn more about both here: https://docs.posit.co/ide/server-pro/user/rstudio-pro/guide/databricks.html\n✨ Example using sparklyr instead of ODBC: https://posit.co/blog/reporting-on-nyc-taxi-data-with-rstudio-and-databricks/\n✨ Posit Workbench provides additional features for managing Databricks Credentials, learn more here: https://docs.posit.co/ide/server-pro/user/posit-workbench/guide/databricks.html#databricks-with-r\n✨ For more on the Posit x Databricks partnership: https://posit.co/solutions/databricks/\n✨ Blog post on Edgar’s workshop on Databricks at conf: https://posit.co/blog/using-databricks-with-r-conf-workshop/\n✨ Solutions article on ODBC and Databricks: https://solutions.posit.co/connections/db/databases/databricks/\n\nWant to chat more with Posit?\n✨ To talk with Posit about integrating Posit & Databricks: https://posit.co/schedule-a-call/?booking_calendar__c=DatabricksJune2024Demo\n\nHad fun and want to join again? You can add the monthly recurring event to your calendar with this link: https://pos.it/team-demo"
