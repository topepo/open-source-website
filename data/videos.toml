url = "https://www.youtube.com/watch?v=qFB1dkYdczk"
title = "Matt Iorio and Rumil Legaspi @ Neuros Medical | Data Science Hangout"
slug = "2024-06-27_matt-iorio-and-rumil-legaspi-neuros-medical-data-science-hangout"
date = "2024-06-27T14:16:06Z"
description = "We were recently joined by Matt Iorio and Rumil Legaspi @ Neuros Medical to discuss how a novel clinical trial design in chronic post-amputation pain became the catalyst for the founding and growth of the company's clinical data department.\n\nSpeaker Bios:\nMatt Iorio: Matt is the Senior Manager of Clinical Affairs and Data Analytics at Neuros Medical, a clinical stage neuromodulation company where he specializes in overseeing end-to-end clinical data operations within the organization, including design of data pipelines, design and validation of databases and patient-reported outcome systems, as well as analysis and visualizations for regulatory submissions and commercial initiatives. He is also an adjunct Instructor in Biomedical Engineering at Case Western Reserve University, where he teaches Clinical and Regulatory Affairs and their impact on data collection and analysis. Matt holds a BSE and an MS in Biomedical Engineering from Case Western Reserve University and an MBA in Marketing from Cleveland State University. In his free time, he enjoys mentoring/teaching on all things data and Clinical Trials, playing soccer, supporting the Northeast Ohio Entrepreneurial Ecosystem and spending time with friends and family.\n\nRumil Legaspi: Rumil is a Clinical Data Specialist at Neuros Medical, a biotech startup developing medical devices for treating chronic pain in lower limb post-amputee patients using high-frequency neuromodulation. Using his background in public health and a master’s in statistics, Rumil leverages the capabilities of R and other data science tools to analyze, automate, and optimize clinical data management and operations, ensuring patient safety and efficacy. Outside of work, he enjoys powerlifting, traveling to Japan, and exploring coffee and tea shops in Southern California.\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nThe Hangout is a gathering place for the whole data science community to chat about data science leadership and questions you're all facing that happens every Thursday at 12 ET.\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh \n\nWe'd love to have you join us in the conversation live!\n\nThanks for hanging out with us! 💛"
