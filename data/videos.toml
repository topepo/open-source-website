[[videos]]
url = "https://www.youtube.com/watch?v=id34IlOY1fg"
title = "Giving your scientific computing environment (SCE) a voice - posit conf 2024"
slug = "2024-10-31_giving-your-scientific-computing-environment-sce-a-voice-posit-conf-2024"
date = "2024-10-31T13:55:32Z"
description = "Full Title: Giving your scientific computing environment (SCE) a voice: experiences and learnings leveraging operational data from our SCE and Posit products to help us serve our users better\n\nPlatform owners often ask questions like ‘how quickly do users migrate to new versions of R’, ‘what programming languages are used’, and ‘how are internal packages, dashboards and outputs consumed’? \n\n The answer to these questions and many more lives within the operational logs collected by systems like Posit Connect, Github, and AWS. I’ll share examples of how we use this data at Roche to shape our product roadmap. I’ll also share some ideas we are exploring to use this data to help empower our data scientists to understand the hidden consequence of how they work through feeding back personal cost and environmental impact - enabling informed decisions, e.g., what it means to schedule a pin to update daily, or request 2 vs 8 cores.\n\nTalk by James Black"
