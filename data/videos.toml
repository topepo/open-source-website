[[videos]]
url = "https://www.youtube.com/watch?v=JELG5jktC5E"
title = "quickr: Translate R to Fortran for Improved Performance - Tomaz Kalinowski"
slug = "2025-10-28_quickr-translate-r-to-fortran-for-improved-performance-tomaz-kalinowski"
date = "2025-10-28T22:05:51Z"
description = "This talk introduces 'quickr', an R package designed to make numerical R code faster by translating R functions to Fortran. While R code offers great flexibility, it often comes at the expense of performance, especially for computationally intensive tasks. To achieve better speed, users typically need to rewrite performance-critical code in compiled languages like C or Fortran, which adds complexity and creates maintenance overhead.\n\nQuickr simplifies this process by allowing users to add simple type declarations to their existing R functions, which enables quickr to then automatically translate the entire function into efficient Fortran routines. The presentation will demonstrate quickr in practical applications, with benchmarks showing performance improvements comparable to native C implementations.\n\nThe talk will also cover current limitations, including supported data types and language features, and show how quickr can be easily integrated into existing R packages. Participants will learn how quickr can help improve their R code performance without significantly increasing development complexity or sacrificing the readability of their code.\n\nhttps://github.com/t-kalinowski/quickr"
duration = 872
channel = "useR! Conference"
playlist = "PL9HYL-VRX0oRAlRLRnRa9YyAAeWuGRati"
