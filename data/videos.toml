[[videos]]
url = "https://www.youtube.com/watch?v=ntsVCqFsZOE"
title = "Data Science Hangout | Yu Cao, Exeter Finance | Impacting business with data science"
slug = "2023-02-08_data-science-hangout-yu-cao-exeter-finance-impacting-business-with-data-science"
date = "2023-02-08T16:13:03Z"
description = "We were joined by Yu Cao, VP Data Science at Exeter Finance.\n\nSpeaker bio: Data science professional, EMBA student, amateur biologist, rock'n'roll zealot. Not only viewing business problems from the perspective of data science, but also from the perspective of the business.\n\nYu shared his thoughts on creativity as a data scientist, working with the business, growing in your career, and much more.\n\nA few snippets from our conversation on building relationships with the business. (15:32)\n\nIt all started with networking. I work with a very analytical team, so a lot of the people there just want to code and build a fantastic model, not spend time networking with people from other business lines.\n\nBut actually, this is not the right attitude.\n\nIf you want to collaborate with other people, first you need to get to know them. You need to understand their business – and you need to become their friends. \n\nUsually I reach out to them and do a self-introduction to let them know what I do and what my team can do. Let's go out for lunch, let's grab a cup of coffee and talk for 15 minutes to see what kind of business difficulties you are having now.\n\nIf you are a sales team, are you worrying about how to increase the volume of sales? If you are a loan origination team, are you worried about how to increase the capture rate?\n\nLet's talk about that. Then I will see, how can I connect my data set knowledge with the problem you are facing now? I can see whether I can build a model to help you solve that problem you have.\n\nUsually, the collaboration starts with this.\n\n_____________\n\nIf you want to build a data science team from scratch (25:51) :\n\n1. Figure out what your team can do for the business. If data science has little to do for the business, it will create very little value there and it doesn’t make sense for you to build a team. You probably need to go to a new company.\n\n2. If you determine that data science can provide value to the business, you need to do some public relations. You need to let everybody, all the leaders in the company, know and understand this. \n\n3. Reach out to the leaders in your organization and ask them to provide feedback for your work. Tell them “My goal is to build a data science team and become a data science leader in this company. What do I need to do to make this happen?” Everything starts from the people, the buy-in from other leaders.\n\n4. If you are a data scientist wanting to move into leadership, you need to show ambition to leadership. The job market for data science is hard. This is the right time for you to show the company that you want to invest in yourself - that you don’t want to just code and build models, but also increase your influence, learn more about the whole business, and contribute to the entire organization.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\nTwitter: https://twitter.com/posit_pbc\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)"
