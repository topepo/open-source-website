[[videos]]
url = "https://www.youtube.com/watch?v=F4osY469UoY"
title = "Mark Rieke | Intro to Workboots: Make Prediction Intervals from Tidymodel Workflows | Posit (2022)"
slug = "2022-10-24_mark-rieke-intro-to-workboots-make-prediction-intervals-from-tidymodel-workflows-posit-2022"
date = "2022-10-24T17:08:00Z"
description = "Sometimes, we want a model that generates a range of possible outcomes around each prediction. Other times, we just care about point predictions and may opt to use a fancy model like XGBoost. But what if we want the best of both worlds: getting a range of predictions while still using a fancy model? That’s where bootstrapping comes to the rescue! By using bootstrap resampling, we can create many models that produce a prediction distribution – regardless of the model type! In this talk, I’ll give an overview of bootstrap resampling for prediction, the pros/cons of this method, and how to implement it as a part of a tidymodel workflow with the workboots package.\n\nTalk materials are available at https://github.com/markjrieke/rstudio-conf-2022\n\nSession: Machine learning"
