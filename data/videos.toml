title = "Tiger Tang | Saving 1,000 hours with RStudio: selling R in your workplace | RStudio (2022)"
slug = "2022-10-24_tiger-tang-saving-1000-hours-with-rstudio-selling-r-in-your-workplace-rstudio-2022"
date = "2022-10-24T17:07:59Z"
description = "There are many benefits to using R and no lack of packages that help you solve technical difficulties, but you may still get stuck at selling it to decision-makers or implementing it at work. Tiger's recommendation is to start a project that focuses on automating work with R and gets everyone involved. Once the value of R has been established, selecting RStudio Workbench and RStudio Connect for streamlining tasks would not be a difficult choice.\n\nSeveral years ago, Tiger's organization moved away from SAS in favor of R for modeling projects, but there wasn’t much initiative taken company-wide to move everything to a new tool. To help change that, he started a work automation project using R that has saved 12K+ hours of manual work.\n\nIn this talk, he will share the key parts of the project, lessons learned, and a structure you can follow if you would like to do something similar in your organization.\n\nTalk materials are available at https://tigertang.org/rst_conf_2022_talk/\n\nSession: Take a sad process and make it better: project and process makeovers"
