[[videos]]
url = "https://www.youtube.com/watch?v=_-hY_YIrvzQ"
title = "Lucy D'Agostino McGowan | Designing Randomized Studies using Shiny | RStudio"
slug = "2021-02-20_lucy-dagostino-mcgowan-designing-randomized-studies-using-shiny-rstudio"
date = "2021-02-20T17:00:10Z"
description = "This talk will walk through building a self-contained randomized study using Shiny and learnr modules. We will discuss building informed consent, the randomization process, demographic surveys, and R-based studies into a single online framework to allow users to seamlessly enroll and participate in randomized studies via a single URL. The talk will include both practical recommendations as well as technical code snippets.\n\nAbout Lucy:\nLucy D'Agostino McGowan is an assistant professor of statistics at Wake Forest University, where she leads the WFU Data Science Lab. Her research focuses on causal inference, human-data interaction, and statistical communication."
