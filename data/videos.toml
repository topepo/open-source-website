description = "Learn how to use QueryChat to add natural language querying to your Python data applications. This tutorial shows you how to let users ask questions about data without building complex filters or dashboards.\n\nIn this video, data scientist Veerle Eeftink demonstrates how to integrate QueryChat with Shiny for Python to create interactive data exploration tools powered by LLMs (Claude, GPT-4, Gemini).\n\nWhat You'll Learn:\n- Set up QueryChat in minutes with any data source\n- Understand how QueryChat translates natural language to SQL\n- Build custom dashboards with reactive data frames\n- Configure LLM behavior with greetings, data descriptions, and instructions\n- Ensure safety and read-only access for production environments\n\nKey Features:\n✓ Works with Claude, GPT-4, Gemini, and other LLMs\n✓ Transparent SQL generation (no black box)\n✓ Integrates with Shiny, Streamlit, and other frameworks\n✓ Uses DuckDB or bring your own SQL database\n✓ Read-only operations for data safety\n✓ Enterprise-ready with private LLM support\n\nResources:\n- QueryChat Documentation: [https://posit-dev.github.io/querychat/py/index.html]\n- Blog Post: \"Where Questions Become Queries\" [https://shiny.posit.co/blog/posts/querychat-python-r/]\n- SheScores Demo App [https://github.com/hypebright/shescores-dashboard/tree/main/Python]\n\n#Python #DataScience #LLM #AI #Shiny #QueryChat #NaturalLanguage #SQL #DataVisualization\n\nTimestamps\n\n00:00 - Introduction: The dashboard problem\n01:28 - What is QueryChat?\n02:36 - Demo: Three things you'll learn today\n03:00 - Setup: LLM API keys and installation\n04:04 - Quick start: First QueryChat app in 5 lines\n04:27 - Live demo: Natural language queries\n06:10 - How QueryChat works under the hood\n07:19 - Four benefits: Reliability, transparency, reproducibility, safety\n08:17 - Tool calling explained\n08:54 - Schema information and DuckDB integration\n09:29 - Building custom interfaces\n09:45 - Customizing behavior: Greetings and data descriptions\n11:16 - Adding custom instructions to the LLM\n11:35 - Building a Shiny dashboard with QueryChat\n13:09 - Code walkthrough: Sidebar chat and reactive data frames\n14:14 - Complete dashboard demo\n14:52 - Safety and security deep dive\n16:22 - Resources and links"
