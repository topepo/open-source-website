[[videos]]
url = "https://www.youtube.com/watch?v=bcY1PyeJXx4"
title = "Intro to Functional Data Analysis - Part 2 | Matthew Malloure, Dow Chemical"
slug = "2022-08-16_intro-to-functional-data-analysis-part-2-matthew-malloure-dow-chemical"
date = "2022-08-16T17:14:36Z"
description = "RStudio Meetup: Functional Data Analysis (Part 2)\nLed by Matthew Malloure, Dow Chemical\n\nLink to slides: https://github.com/MatthewMalloure/RStudioMeetup_FDA\n\nIntro to Functional Data Analysis (Part 1) https://youtu.be/nA9fVOCD8yM\n\nTimestamps:\n3:00 - Start of presentation\n7:50 - Recap, what is functional data analysis (FDA)?\n12:00 - Why do we need FDA?\n16:40 - Initial step in FDA applications - smoothing\n22:21 - What made you first interested in FDA?\n25:38 - What is your decision framework for which basis function to choose?\n27:50 - Screening additives compared to control\n41:27 - Specific FDA problems can pop up at work and I'm not sure which analysis is right. Is there a recommended resources for selecting approaches?\n44:40 - Can you define \"functional\" as it is used in the FDA context?\n49:30 - Functional regression\n58:50 - Alternative modeling approaches\n\nAbstract:\nThe primary purpose of this presentation is to continue the introduction of functional data analysis methods that was kicked-off during the March RStudio Energy Meetup by Santiago Rodriguez. During that session’s Q&A, two specific methods were frequently mentioned: Functional Principal Components Analysis (FPCA) and Functional Regression. In this talk, both methods are introduced in more detail, applied to a simulated example from the chemical industry, and compared to their univariate/multivariate analogues. Though no code will be shown in the presentation, commented R code used to produce all data, analyses, and figures will be provided.\n\nSpeaker Bio:\nMatt is an associate research data scientist supporting new product development within the Packaging and Specialty Plastics business at The Dow Chemical Company. His specialty areas include functional data analysis, Bayesian hypothesis testing, computational statistics, and experimental design. Prior to joining Dow he earned a BS in Statistics and MS in Biostatistics at Grand Valley State University and a PhD in Statistics from Texas A&M University"
