description = "00:00 Introduction\n00:09 The magic of bs_theme_preview()\n01:43 The interactive widget provided by bs_theme_preview()\n02:12 Using Bootswatch themes\n02:57 Using the interactive widget to adjust your theme in real time\n03:38 Integration with Google Fonts\n04:22 Thematic is enabled in bs_theme_preview()\n04:45 DT tables is enabled in bs_theme_preview()\n05:30 Going from the interactive widget to your R code\n07:03 Using interactive theming on your own Shiny app\n09:01 Interactive theming with R Markdown documents\n\nThe bs_theme_preview() function launches an example shiny app via run_with_themer() and bs_theme_dependencies(). This is useful for getting a quick preview of the current theme setting as well as an interactive GUI for tweaking some of the main theme settings. Link to docs: https://rstudio.github.io/bslib/reference/bs_theme_preview.html\n\nYou can read more about the bslib package here: https://rstudio.github.io/bslib/\nAnd you can learn more about Shiny here: https://shiny.rstudio.com/\n\nGot questions? The RStudio Community site is a great place to get assistance: https://community.rstudio.com/\n\nContent: Carson Sievert (@cpsievert)\nDesign and editing: Jesse Mostipak (@kierisi)"
