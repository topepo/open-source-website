[[videos]]
url = "https://www.youtube.com/watch?v=K7K6yMjinVI"
title = "Data Science in the Energy Industry | Frank Hull | Data Science Hangout"
slug = "2025-08-05_data-science-in-the-energy-industry-frank-hull-data-science-hangout"
date = "2025-08-05T16:00:29Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Frank Hull, Director of Data Science and Analytics at ACES, to chat about forecasting energy demand and prices, managing over a thousand data models, full-stack data science, and advanced machine learning techniques for time series analysis.\n\nIn this Hangout, we explore the necessity of managing a vast number of data models in the energy industry. Frank's team at ACES oversees over a thousand models (nearly 2,000, actually!), a staggering number explained by the complexity and fragmentation of the wholesale energy market. The United States is divided into various Independent System Operators (ISOs), each possessing unique regulations and diverse resource mixes. Each of ACES's 40+ portfolios can operate in different geographical areas within an ISO, presenting distinct challenges that necessitate individual modeling. These models are used to simulate a wide range of time horizons, from the next hour or day-ahead market to long-term financial planning and infrastructure decisions spanning 25 years. This intricate modeling helps in understanding hourly price shapes, demand patterns, supply mixes, and evaluating the effectiveness of new energy generators or hedging strategies, all with the goal of lowering variable costs for cooperatives and mitigating critical risks like blackouts during peak demand. \n\nResources mentioned in the video and zoom chat: \n🔗 Tidymodels → https://www.tidymodels.org/ \n🔗 Orbital Project → https://orbital.tidymodels.org/ \n🔗 U.S. Energy Information Administration (EIA) Open Data → https://www.eia.gov/opendata/ \n🔗 Kuzco R Package → https://posit.co/blog/kuzco-computer-vision-with-llms-in-r/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about handling imbalanced binary classification models. Participants discussed why techniques like SMOTE might not perform well in production with real-world data, shared experiences with alternative methods such as standard up/downsampling, and highlighted challenges in maintaining prediction accuracy in deployment despite strong training results. Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n04:05 \"What's ISO?\" \n08:20 \"What are your go to models for analysis in the energy field?\" \n10:48 \"Do you tend to use traditional stochastic models for time series analysis or more of the recent ML methods?\" \n13:30 \"What is a full stack data scientist? What's the overlap between a full stack data scientist and something like an ML engineer or a data engineer?\" \n18:38 \"Is there a specific data science skill set that's needed to get into energy analysis?\" \n19:59 \"What is the portfolio model?\" \n23:36 \"How have you found convincing regulators and other stats oriented stakeholders to trust and believe your AI fancy machine learning models that they can't really dive in and and prove to themselves that that's being statistically valid? Or have you found some good ways to demonstrate that?\" \n26:50 \"Are there any good examples of open data in energy?\" \n27:54 \"How are you keeping on top of the documentation for all of these models? Over a thousand models is a lot. Is there any learning you could share from that experience to help other people keep on top of their documentation?\" \n30:33 \"How would you suggest handling missing data in time series forecasting?\" \n33:10 \"Do you see long term electricity prices decreasing in the next twenty five years due to the abundance of renewables like wind and solar in lower population areas?\" \n35:14 \"Do you have any career advice?\" \n36:50 \"How do you see data science evolving within the energy industry?\" \n38:39 \"How do you keep up to date on new packages?\""
