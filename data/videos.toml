url = "https://www.youtube.com/watch?v=DVSFpLJgldo"
title = "Hannah Frick - \"Censored: A tidymodels package for survival models\""
slug = "2022-11-12_hannah-frick-censored-a-tidymodels-package-for-survival-models"
date = "2022-11-12T16:03:55Z"
description = "10 November 2022. \"Censored: A tidymodels package for survival models\" Hannah Frick, Software Engineer and Statistician, RStudio. CANSSI Ontario Statistical Software Conference.\n\nAbstract: Survival analysis is an important field in modeling, and there are many R packages available that implement various models, from \"classic\" parametric models to boosted trees. While they cover a great variety of model types, they also come with considerable amounts of heterogeneity in syntax. The tidymodels framework is a collection of R packages for modeling and machine learning using tidyverse principles. It provides a consistent interface to a variety of modeling functions, along with tools for resampling, assessing performance, and hyperparameter tuning. The censored package now extends the model coverage of tidymodels's parsnip package for survival analysis. It offers a tidymodels interface to parameteric survival models, (regularized) proportional hazards models and various tree-based models such as decision trees, boosted trees, and random forests for survival analysis. Additionally, it offers predictions of time to event, linear predictor, survival probability, or hazard in a tibble format consistent across different models."
