[[videos]]
url = "https://www.youtube.com/watch?v=qwkokAQ8rYk"
title = "Data Science Hangout featuring all of us!"
slug = "2023-05-24_data-science-hangout-featuring-all-of-us"
date = "2023-05-24T21:00:26Z"
description = "We did things a bit different this week as our featured leader had to reschedule - and we were all the featured leaders for the week, asking questions to each other. Libby & Mike put Rachael, our Pro Community Lead in the hot seat to start and then we all answered the questions the came in 🙂\n\nFeeling all the community feels on this week's call especially with everybody jumping in! 💛\n\nA few topics that came up in discussion:\n6:02 - How your skills & knowledge that help you in your career can come from places outside work\n7:43 - Being a part of the initiation process to use data science tools in your organization / value of open source\n11:29 - What are people thinking about using ChatGPT in their companies?\n17:02 - What have you learned from a marketing background that can help us sell our data tools?\n25:55 - Is there a way for people to connect after the Hangout? (https://www.linkedin.com/groups/12610075/)\n26:45 - Favorite data science podcasts or YouTube Channels? (thanks Faythe for consolidating! https://www.linkedin.com/feed/update/urn:li:activity:7057411912606617602?utm_source=share&utm_medium=member_desktop)\n32:35 - Relationship dynamics in organizations, organizational network analysis\n35:47 - Data storytelling courses, how do you present data to be able to persuade people?\n41:25 - What makes it hard to get in the door with decision makers?\n47:44 - Tips on public speaking\n55:42 - How to give an unbiased approach to what you're presenting?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\nTwitter: https://twitter.com/posit_pbc\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nData Science Hangout site: posit.co/data-science-hangout"
