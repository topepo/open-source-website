date = "2021-09-10T18:24:57Z"
description = "Setting Up Secure Systems for Growth\r\nPresentation by Gordon Shotwell, Lead Data Scientist at Socure\r\n\r\nAbstract:\r\nOne of the main challenges of doing data science is getting access to the data in the first place. Data scientists need to be able to look at data in detail to do their work effectively, but that necessarily creates data security and data governance problems for the organization and its clients. In this presentation, we go through the social and technical processes that can create a secure data analytics environment and set your team up for success.\r\n\r\nSpeaker Bio:\r\nGordon Shotwell is a Lead Data Scientist at Socure where he helps develop tools for data scientists to securely and efficiently work on sensitive data.\n\nThey're hiring too! https://www.socure.com/about/careers\n\nTimestamps:\n09:45 - Make friends with the security team in your org\n19:40 -  Set up child-proof [data science environments] \n22:11 - Developer experience is a security problem - people will do the easy thing, make the right thing easy\n35:34 - Buy [tools] don't build them - economic lesson in understanding cost centers\n\nRead the related blog post here: https://blog.rstudio.com/2021/10/26/how-data-scientists-and-security-teams-can-work-together/"
