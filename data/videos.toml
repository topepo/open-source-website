[[videos]]
url = "https://www.youtube.com/watch?v=EBAvQkP9Kyc"
title = "Yanina Bellini Saibene | On programming, teaching, and building tutorials with learnr | RStudio"
slug = "2021-02-19_yanina-bellini-saibene-on-programming-teaching-and-building-tutorials-with-learnr-rstudio"
date = "2021-02-19T18:00:10Z"
description = "Full title: On programming, teaching, and building interactive tutorials with learnr\n\nTeaching R is part of my activities as a community organizer, an RStudio Certified Instructor, a conference chair, and a researcher. Since 2019, I use the learnr package to generate interactive tutorials to teach R synchronously and asynchronously. The addition of the Tutorials panel in RStudio IDE and the need for virtual classes made the use of this package even more interesting. In this talk, I will tell you how to generate interactive tutorials, how to add pedagogical tools to them, what other packages you can use with {learnr} and show multilingual examples.\n\nAbout Yanina:\nYanina Bellini Saibene is a researcher at INTA (National Institute of Agricultural Technology) dedicated to applying data science to the agricultural sector and a professor in several regional specializations about Digital Agriculture and Data Analysis. Yanina is formally trained as a Licenciate in Information System with a Master degree in Data Mining and Knowledge Management. She is an active member of the R Community as an R-Ladies organizer and part of the R-Ladies Global Team. She also is a co-founder and co-chair of LatinR and part of the organizing team of useR!2020 and user!2021 (co-chair). She is also co-founder of MetaDocencia, a open, free, volunteer-lead, not-for-profit educational organization and part of the teams that translate educational and technical material to Spanish."
