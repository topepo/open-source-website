[[videos]]
url = "https://www.youtube.com/watch?v=wK3vPbcSoFE"
title = "Reproducible data science with webR and Shinylive | George Stagg | Posit"
slug = "2024-09-09_reproducible-data-science-with-webr-and-shinylive-george-stagg-posit"
date = "2024-09-09T17:35:11Z"
description = "A fundamental principle of the scientific method is peer review and independent verification of results. Good science depends on transparency and reproducibility. However, in a recent study a substantial 74% of research code failed to run without errors, often caused by diverse computing environments. This talk will discuss the principles of numerical reproducibility in research and show how software can be pinned to specific versions and self-contained as a universal binary package using WebAssembly. This ensures seamless reproducibility on any machine equipped with a modern web browser and, using tools such as Shinylive, could provide a new way for researchers to share results with the community.\n\nwebR demo website: \nhttps://webr.r-wasm.org/v0.3.2/\n\nShinylive examples: \nhttps://shinylive.io/r/\nhttps://shinylive.io/py/\n\nDocumentation:\nhttps://docs.r-wasm.org/webr/v0.3.2/\nhttps://github.com/posit-dev/shinylive\nhttps://github.com/quarto-ext/shinylive"
