[[videos]]
url = "https://www.youtube.com/watch?v=J2JJMZR_HDk"
title = "Colin Rundel | parsermd - parsing R Markdown for fun and profit | RStudio"
slug = "2021-02-20_colin-rundel-parsermd-parsing-r-markdown-for-fun-and-profit-rstudio"
date = "2021-02-20T16:00:12Z"
description = "parsermd is a new R package for parsing and programmatically interacting with R Markdown (Rmd) documents. This package implements a formal grammar for Rmd documents in C++ using Boost's Spirit X3 library and provides additional user facing functions for the resulting abstract syntax tree. In this talk we will provide background on the structure and grammar of Rmd documents as well as discuss the ways in which the parsing of these documents enables a variety of automatable tasks. Specifically, we will focus on demonstrating how these tools can be used to provide automated feedback on student submissions in a statisical programming course.\n\nAbout Colin:\nColin is a lecturer in Statistics and Data Science at the University of Edinburgh. He has been teaching statistics and data science courses, with a focus on computing and spatial modeling, for the last 8 years."
