url = "https://www.youtube.com/watch?v=HNfBXB40FTE"
title = "People Analytics at different stages of company growth | Adrian Perez | Data Science Hangout"
slug = "2026-02-03_people-analytics-at-different-stages-of-company-growth-adrian-perez-data-science-hangout"
date = "2026-02-03T21:00:25Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Adrian Perez, Head of People Analytics at GitLab, to chat about the role of people analytics in business, how he's navigated the changing HR-data-sphere, advice for moving from an individual contributor to a manager, and the modern data stack used at GitLab.\n\nIn this Hangout, we explore one of our favorite topics here: People Analytics! Adrian discusses the scale at which companies should establish a dedicated function and shares a specific case study from his time at H-E-B where survival analysis was used to improve recruiting processes. He also provides insights on how to manage relationships with stakeholders who may be skeptical of data results, emphasizing the importance of partnership over purely proving someone wrong. (Libby heavily agrees - it's about human relationships and trust!)\n\nResources mentioned in the video and zoom chat: \n🔗 GitLab Company Handbook (AMAZINGLY open resource) → https://handbook.gitlab.com/ \n🔗 GitLab People Analytics Team Page → https://handbook.gitlab.com/handbook/people-group/people-ops-tech-analytics/people-analytics/ \n🔗 Positron IDE → https://positron.posit.co/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about advice for first-time managers, including a recommendation for the book \"The Making of a Manager\" by Julie Zhuo. Let us know below if you’d like to hear more about the IC-to-manager move!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction\n03:58 \"Do you have a enormous team? Are you guys small and mighty?\" \n06:26 \"Is there a minimum company size before people analytics becomes worthwhile?\" \n09:25 \"Can you share some specific types of analysis or modeling tasks that are done in people analytics?\" \n15:30 \"How do you manage HR professionals when they don't like the results that the data showed them?\" \n19:28 \"Does that include implementing third party applicant tracking systems, keyword analysis?\" \n24:26 \"Any advice you're willing to share for a first time manager?\" \n30:35 \"What tools do you use at GitLab?\" \n33:59 \"Have you tried Positron?\" \n35:00 \"How do you think that this would work in the sports industry?\" \n39:24 \"How do you manage to respect privacy of the data you work with?\" \n44:18 \"Have you done any work on skills analysis and or leveraging graph databases?\" \n46:42 \"Is there a qualitative element to your analysis as well?\" \n48:19 \"Is people analytics considered a subset of human factors?\" \n50:35 \"Is it possible to break into people analytics with data experience but no HR experience?\" \n51:12 \"Could you leave us with a piece of career advice?\""
