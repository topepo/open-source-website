title = "Can I trust that package? (Colin S Gillespie, Jumping Rivers) | posit::conf(2025)"
slug = "2025-11-07_can-i-trust-that-package-colin-s-gillespie-jumping-rivers-positconf2025"
date = "2025-11-07T16:13:58Z"
description = "Can I trust that package?\n\n💬 Speaker(s): Colin S Gillespie\n\n📝 Abstract:\n\nWe often forget, surrounded by hex stickers and bad R package puns, that not everyone is as trustworthy as us. This, I suppose, means that when IT asks, “Is this package valid, secure, and trustworthy?” it’s not that unreasonable a question. But this throws up multiple issues. There are thousands of R packages on CRAN, and that doesn’t include the R-universe, Bioconductor, and GitHub. Packages are updated all the time, so how do we keep up? More to the point what does valid, secure and trustworthy even mean?\n\nIn this talk, I’ll discuss the litmusverse. A suite of packages for assessing a package risk. Importantly, it’s not one size fits all. Instead, it’s about defining your risk appetite and acting accordingly. posit::conf(2025) Subscribe to posit::conf updates: https://posit.co/about/subscription-management/"
