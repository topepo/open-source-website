[[videos]]
url = "https://www.youtube.com/watch?v=kyMlO805hHE"
title = "Data Science Career Growth | Pallas Horwitz | Data Science Hangout"
slug = "2025-06-09_data-science-career-growth-pallas-horwitz-data-science-hangout"
date = "2025-06-09T13:30:39Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Pallas Horwitz, Analytics Consultant & Professional Development Coach, to chat about data career growth, effectively communicating business value in the AI era, navigating workplace dynamics, and future-proofing data science careers.\n\nIn this Hangout, we explore how data science projects, even those that don't yield expected results, contribute to valuable organizational learning. Pallas emphasized that what might seem like a \"failure\" is actually an opportunity to learn what doesn't work, saving future time and resources. This broader definition of \"impact\" helps data professionals frame their contributions effectively on resumes and in conversations, by focusing on moving business conversations forward and enabling informed decision-making. She also highlighted the importance of translating technical insights into language that resonates with business stakeholders, often by understanding their underlying goals rather than just their explicit requests. This approach helps turn a \"not yet\" into a yes by empathizing with the audience and understanding what they care about.\n\nResources mentioned in the audio recording and zoom chat.txt: \n🔗 Pallas Horwitz's Coaching Calendar → https://tidycal.com/pallashorwitz/45-minute-introductory-session \n🔗 Pallas Horwitz LinkedIn → https://www.linkedin.com/in/pallashorwitz/ \n🔗 Posit Conf 2025 Virtual Experience Registration → https://posit.co/blog/posit-conf-2025-virtual-experience-registration/ \n🔗 How to Network in a Non-Slimy Way by Ted Laderas → https://laderast.github.io/articles/2021-09-13-how-to-network-in-a-non-slimy-way/how-to-network-in-a-non-slimy-way.html \n🔗 Libby Heeren's talk, Stop Networking and Start Making Friends→ https://www.youtube.com/watch?v=V3XdLVAwmX0\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the role of Excel in data analysis, with many participants affirming that there's \"no shame in excel!\" and even calling it \"the gateway drug to data management\". The chat also highlighted the importance of networking, with attendees sharing personal success stories of finding jobs through connections made in unexpected places like the gym. You really should join live!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co/\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
