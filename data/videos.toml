description = "Stop guessing which channels drive growth.\n\nJoin Isabella Velásquez and Daniel Chen for this end-to-end workflow demo on modeling marketing spend, building 'what-if' scenario planners in Shiny, and deploying automated Quarto reports that give non-technical stakeholders a clear, data-backed view of ROI.\n\nWe will explore:\n1. The Workflow Architecture: A look at the “plumbing” required to move from data to insights.\n2. The Interface: Wrapping an existing model in a Shiny dashboard for real-time “what-if” scenario planning.\n3. The Delivery: Automating communication via Quarto reports to keep stakeholders aligned.\n4. The Deployment: Using Posit Connect to turn your code into an accessible business asset for leaders.\n\nThis workflow demo grew out of the incredible energy at our recent Data Science Hangout with Ryan Timpe at LEGO. We were so inspired by the community’s interest in MMM that we decided to build this session to address your specific questions. Thank you for the great discussion. We’re excited to show you what we’ve put together!\n\n📍 Demo References\nMMM Demo GitHub Repo (https://github.com/chendaniely/dashboard-mmm)\nMMM Demo Dashboard (https://danielchen-dashboard-mmm.share.connect.posit.cloud/)\nRyan Timpe’s posit::conf(2023) talk, tidymodels: Adventures in Rewriting a Modeling Pipeline - posit::conf(2023) (https://www.youtube.com/watch?v=R7XNqcCZnLg)\n\n📍 MMM Resources\nBayesian Media Mix Modeling for Marketing Optimization, PyMC Labs (https://www.pymc-labs.com/blog-posts/bayesian-media-mix-modeling-for-marketing-optimization)\nModernizing MMM: Best Practices for Marketers, IAB (https://www.iab.com/wp-content/uploads/2025/12/IAB_Modernizing_MMM_Best_Practices_for_Marketers_December_2025.pdf)\nThe Future of Media Mix Modeling, Measured (https://info.measured.com/hubfs/Guides/Measured_Guide%20The%20Future%20of%20Media%20Mix%20Modeling.pdf?hsCtaAttrib=184767817336)\nMedia Mix Modeling: How to Measure the Effectiveness of Advertising, Hajime Takeda, PyData (https://www.youtube.com/watch?v=u4U_PUTasPQ)\nAn Analyst's Guide to MMM, Meta (https://facebookexperimental.github.io/Robyn/docs/analysts-guide-to-MMM/)\nFull Python Tutorial: Bayesian Marketing Mix Modeling (MMM) SPECIAL GUEST: PyMC Labs, Matt Dancho (https://www.youtube.com/watch?v=lJ_qq_IVUgg)\nReading MMM Outputs: Dashboards and Decisions for Small Teams, SmartSMSSolutions (https://smartsmssolutions.com/resources/blog/business/reading-mmm-dashboards-article)"
