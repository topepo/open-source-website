slug = "2022-10-24_ivonne-carrillo-dominguez-r-shiny-from-conception-to-the-cloud-posit-2022"
date = "2022-10-24T17:13:00Z"
description = "I will share how we published an R Shiny application to AWS, the decisions we made, and what we learned in the process.\n\nOne challenge we faced was figuring out how we could develop collaboratively. We needed to define our development workflow, including version control, dependency management, and quality assurance.\n\nThen, we needed to define the deployment method. RStudio is great for development, but it may hide many of the aspects that break the application. We used CI/CD workflows as much as possible to ensure our code was robust before pushing the changes to production.\n\nLastly, our infrastructure team designed a replicable framework, so we are ready to deploy new R Shiny applications quickly and focus on data analysis.\n\nSession: Data science in production"
