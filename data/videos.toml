[[videos]]
url = "https://www.youtube.com/watch?v=1A84E_GftnM"
title = "Data Science Hangout | Tiger Tang, CARFAX | Quantifying the Hours Saved"
slug = "2022-09-13_data-science-hangout-tiger-tang-carfax-quantifying-the-hours-saved"
date = "2022-09-13T13:09:06Z"
description = "We were joined by Tiger Tang, Manager, Data Science at CARFAX. Tiger (Chongtai) Tang is dedicated to building the Data Science team specializing in NLP and forecasting. He is a big fan of Shiny and he has a passion for the Data Science community.\n\nWe recommend checking out Tiger's 2022 RStudio Conference Talk as well, \"Saving 1000 hours with RStudio:\" https://www.rstudio.com/conference/2022/talks/saving-1000-hours-rstudio/\n\nHow do you sell RStudio in your workplace?\n➡️ Build a work automation process 👇🏼\n\nHow do you build an automation process?\n1️⃣ Look at a typical report & identify all the manual steps\n2️⃣ These manual steps can usually be tied into 3 portions: getting the data, wrangling/analysis/visualization, and communication\n3️⃣ You can replace these portions with R code, with the help of various R packages\n\nWhat are the three types of automation?\n1️⃣ Attended automation - reports that still need human involvement: use R code in RStudio\n2️⃣ Unattended automation - don’t need human input, but need to happen at the same time: use RStudio + RStudio Connect\n3️⃣ Hybrid - combination of the previous 2, human input will come from the stakeholder & they can kick off processes to get answers: use Shiny + RStudio Connect\n\nOk, time to sell it to decision makers\n\nWhat are the benefits?\n✨ Reproducibility\n✨ Less human error\n✨ Cost benefit (hours saved)\n\n❌ Why weren’t they interested when you shared these?\n \nThe benefits listed above are great for selling to an R user who is concerned about the day to day workflow, but not decision makers who are more concerned about ROI.\n\nUpdate your strategy in highlighting the benefits:\n✨ Cost benefit (hours saved) - If we go through with this we might be able to save 1,000 hours per year\n✨ Less human error\n✨ Reproducibility (as a free add-on travel insurance)\n\nIt’s still the same benefits, just in a slightly different order. Start with one that does not require too much context to understand.\n\nWhat do you need to do the actual automation?\n\nUnderstand the current process and document it. This includes understanding:\n⬢ the business reasons\n⬢ the occurrence (daily, weekly, ad-hoc) \n⬢ how you will communicate \n⬢ how often to update the process so it will not become obsolete \n⬢ you are not always the original report owner, so you need to know when to stop and call for additional help.\n\nFrom this you will understand the complexity, impact, and stability & can help you decide which project to start with as well.\n\nTop 3 recommendations for automation:\n1️⃣ Always start with components: For ex, if you have a process that involves: SQL, Excel, and Outlook - code them individually because the same team will need this again and you can reuse the code.\n\n2️⃣ Test, Test, Test: Capture all the scenarios possible. \n\n3️⃣ Be practical and stay on target: Not everything needs to be fully automated. It’s not about building something cool with R but building something impactful with R.\n\n✅ Structure for you:\n\n1️⃣ Identify tasks in your workplace\n2️⃣ Build a proposal with the benefits that matter to decision makers in your workplace\n3️⃣ Build a requirement doc that identifies the right task to start with\n4️⃣ Code by component and do plenty of tasks, while staying on target\n5️⃣ Share the progress from time to time\n\nWhere to find more?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n► Data Science Hangout site: rstudio.com/data-science-hangout\n► Add the Data Science Hangout to your calendar: rstd.io/datasciencehangout\n\nFollow Us Here:\nWebsite: https://www.rstudio.com\nLinkedIn:https://www.linkedin.com/company/rstudio\nTwitter: https://twitter.com/rstudio"
