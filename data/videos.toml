description = "In Part 2 of our conversation with Wes McKinney, we go beyond the code and into the mission-driven world of open source funding, community-building, and product strategy. Wes talks about what it takes to make critical tools like Arrow sustainable — from pitching to mavericks at Two Sigma to navigating the politics of Apache Software Foundation governance. Also, Wes gives a peek behind the curtain on the origins of Positron. And, yeah, metal.\n\nIn part two of our conversation with Wes McKinney, we dig into the challenges and realities of sustaining open source software. Wes shares how funding actually works (or doesn’t), why corporate buy-in is essential, and what it’s like building tools across languages, communities, and IDEs. We also talk about the Apache Software Foundation’s role in open governance and the origin of the Positron IDE.\n\nWhat’s Inside:\n• Why passion isn’t enough for open source to scale\n• Apache Arrow’s origin story and how it was pitched\n• How open governance enables trust between competitors\n• The thinking behind Positron, Posit’s next-gen IDE\n• Polyglot programming – Designing tools that bridge the R/Python divide\n• LLMs and data UX: Why modern IDEs need to serve both humans and models\n• Day-to-day coding, advising, investing, and context-switching\n• Metalheads unite"
