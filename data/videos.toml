[[videos]]
url = "https://www.youtube.com/watch?v=XMQD180XS9c"
title = "6 core ideas for public speaking | Blythe Coons & Acacia Duncan @ Articulation | DS Hangout"
slug = "2024-09-11_6-core-ideas-for-public-speaking-blythe-coons-acacia-duncan-articulation-ds-hangout"
date = "2024-09-11T13:00:44Z"
description = "A must-see episode of the Hangout, especially if you have ever needed to give a presentation (and who hasn’t??). Acacia and Blythe from Articulation are experts at helping presenters craft their messages, and they’ve worked with many, many Posit Conference speakers over the years. If you’ve ever heard conf speakers gush about getting to work with Articulation to prepare their talks, you’ll understand why by the end of this discussion. There’s a reason more than 200 hangout members attended this one!\n\nTimestamps:\n07:15 What are threshold concepts? What does Articulation do?\n09:25 Threshold concept 1 - Speaking is habitual (not natural)\n10:15 Threshold concept 2 - Speaking is embodied\n11:30 Threshold concept 3 - Speaking is social\n12:50 Threshold concept 4 - Speaking is messy\n13:45 Threshold concept 5 - Speaking contains multiple genres\n15:25 Threshold concept 6 - Speaking requires feedback\n17:15 How do you construct a story when presenting data? What resources are there?\n19:40 How do you structure a story?\n21:05 Why is the Hero’s Journey the wrong structure for storytelling with data? (Your audience is Luke Skywalker, not you!)\n24:25 Where do data people go wrong? How can data communicators improve?\n25:40 How much information should you include in a presentation? How much is too much?\n29:00 Should you create a document to hand out alongside your slides?\n32:10 How do you change a company culture of having wordy PowerPoint slides?\n34:35 What happens when PowerPoint slides are too wordy?\n36:10 How do you reduce stress responses when giving a presentation?\n43:15 How can you slow down if you’re a fast talker or nervously speed up while presenting?\n46:20 What are some tools for planning presentations?\n48:20 How does presenting on Zoom differ from presenting in person?\n52:50 Tips for switching back and forth between in person and Zoom\n55:00 How do you coach someone on a technical presentation if you’re not an expert in it?\n57:45 How can you be yourself when giving a presentation?\n\nHere are a few of the key topics covered in the discussion:\n✨ The threshold Concepts of speaking. These are the core ideas you must understand in order to really succeed in public speaking.\n✨ Data Storytelling. Spoiler! There is more than one type of story in your data presentation, and you’re not the hero of any of them.\n✨ Structuring a story. The basics of structure, but also how to answer the right question (spoiler again, it’s not the question you’re interested in).\n✨ Common struggles in data communication. Do you bury the lede? Are you a non-linear thinker? Do you get super anxious and lost? Do you talk way too fast???\n✨ Coping with Zoom. Why presenting on zoom can be a challenge and what we can we do about it.\n\nLinks from this episode:\n🔗 Blythe on LinkedIn: https://www.linkedin.com/in/blythe-coons-05196485/ \n🔗 Acacia on LinkedIn: https://www.linkedin.com/in/acacia-duncan-919899b8/ \n🔗 Articulation’s website: https://www.articulationinc.com/\n🔗 Threshold Concepts: https://www.articulationinc.com/threshold-concepts-reflections-effective-speaker/ \n🔗 Storytelling with Data Podcast: https://www.storytellingwithdata.com/podcast\n🔗 Speeko, an app for analyzing your speaking pace and tone: https://www.speeko.co/ \n🔗 Milanote, a tool for organizing creative projects: https://milanote.com/ \n\nDid you miss joining us in person? If so, you missed out on some awesome resources from the chat! We’ve got you covered:\n\n✨ Isabella shared some hex wall Zoom backgrounds in the virtual swag bag for positconf2024: https://github.com/posit-marketing/posit-conf-virtual-swag-bag \n✨ Several people suggested the book Storytelling with Data by Cole Nussbaumer Knaflic: https://www.storytellingwithdata.com/books \n✨ Watch Laura Gast’s talk from PositConf2023 about why good design is worth the time when it comes to data communication: https://www.youtube.com/watch?v=Kp-LQe3WgDU\n✨ Tom Belanger shared the Stats + Stories Podcast: https://statsandstories.net/ \n✨ Jared Cornell suggested the book The Fearless Mind: https://abinoda.com/book/the-fearless-mind \n✨ Michael Kaminsky shared the book Resonate by Nancy Duarte: https://www.duarte.com/resources/books/resonate/ \n✨ Laura Gast shared the book “If I understood you would I have this look on my face” by Alan Alda about his days interviewing for PBS Nova: https://www.penguinrandomhouse.com/books/533869/if-i-understood-you-would-i-have-this-look-on-my-face-by-alan-alda/ \n✨ The Quarto Keeper! Like a Trapper Keeper, but in Quarto, and for making notes at big meetings or conferences: https://github.com/ats/quarto-keeper (by Alan Schussman)\n✨ Lydia Gibson shared that the last chapter of R4DS has some resources listed in the summary for effective communication in different types of formats (presentations, public speaking, etc.) https://r4ds.hadley.nz/quarto-formats \n✨ The Center Cam for making eye contact on Zoom: https://thecentercam.com/"
