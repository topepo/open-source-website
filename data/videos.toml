date = "2022-06-28T17:15:42Z"
description = "Led by Saiem Gilani, Director of Data Science and Engineering for the Houston Rockets & founder of the SportsDataverse\n\nSlides: https://slides.sportsdataverse.org\nRepo: https://github.com/sportsdataverse/sportsdataverse-rstudio/\n\nSave the next sports meetup to your calendar: rstd.io/sports-meetup\n\nIf you'd like to ask questions anonymously during the meetup, you can also use: rstd.io/meetup-questions\n\nAbstract:\nThe SportsDataverse is a set of open-source sports data packages that work in harmony because they share common data representations and API design. Many of the packages are backed by associated data repositories updated nightly which allow for easy loading of pre-scraped datasets, particularly play-by-play, team and player box scores and season schedule datasets. In this presentation, we will discuss the updated wehoop package, which now serves as a full WNBA Stats API wrapper (100+ functions added) and if time permits, one of the 10+ other packages in the sportsdataverse.\n\nBio:\nSaiem Gilani is the Director of Data Science and Engineering for the Houston Rockets and founder of the SportsDataverse, a community of developers building easy-to-use sports analytics packages and open-source data repositories. He holds a MS in Analytics from Georgia Tech and a BS in Mathematics from Florida State."
