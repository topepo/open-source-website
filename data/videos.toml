[[videos]]
url = "https://www.youtube.com/watch?v=lhAc51QtTHk"
title = "Polars, pandas, and Narwhals, oh my! | Marco Gorelli | Data Science Hangout"
slug = "2024-11-12_polars-pandas-and-narwhals-oh-my-marco-gorelli-data-science-hangout"
date = "2024-11-12T21:03:32Z"
description = "Welcome back to the Data Science Hangout! This week, we're joined by Marco Gorelli, a senior software engineer at Quansight Labs and a core developer of Pandas, Polars, and the author of Narwhals. Marco shares his insights on the evolving landscape of data frame libraries in Python, focusing on Polars, its advantages over Pandas, and the role of Narwhals in creating data frame agnostic tools.\n\nMarco discusses his journey into open source, highlighting the importance of finding your niche and contributing to areas that others might find \"boring\" but are essential for a project's success. He also emphasizes the significance of fostering welcoming and inclusive open source communities.\n\nThis episode explores several key topics:\nPolars: We learn about Polars' key features like lazy execution, its performance benefits, and the power of its expressions API. Marco explains how lazy execution can lead to significant performance gains and answers questions about its relevance even when working with smaller datasets.\n\nNarwhals: We discover how Narwhals enables developers to write tools that work seamlessly with various data frame libraries, promoting interoperability and simplifying development workflows.\n\nOpen Source Challenges: Marco addresses the challenges of maintaining work-life balance while being deeply involved in open-source projects. He offers practical advice on prioritization and managing the constant influx of tasks and requests.\n\nResources mentioned in the chat:\nPandas: https://pandas.pydata.org/\nPolars: https://pola.rs/\nNarwhals: https://narwhals-dev.github.io/narwhals/\nAwesome Polars: https://github.com/ddotta/awesome-polars\nIbis: https://ibis-project.org/\nPolars Plugins Tutorial: https://marcogorelli.github.io/polars-plugins-tutorial/\nUnderstanding Polars Expressions: https://www.youtube.com/watch?v=E7cHgN9rd9c\nGreat Tables: https://posit-dev.github.io/great-tables/articles/intro.html\nGreat Tables Blog - Polars Styling: https://posit-dev.github.io/great-tables/blog/polars-styling/\nGreat Tables Blog - BYODF: https://posit-dev.github.io/great-tables/blog/bring-your-own-df/\nRuff: https://astral.sh/ruff\nUV: https://docs.astral.sh/uv/\nR/Pharma 2024: https://rinpharma.com/\nPyladiesCon: https://conference.pyladies.com/\nBeeminder: https://www.beeminder.com/\nTodoist: https://todoist.com/\nNyctography: https://en.wikipedia.org/wiki/Nyctography\n\nThis episode offers valuable insights for anyone working with data in Python, particularly those interested in exploring the benefits of Polars and the power of Narwhals for building data-frame-agnostic tools.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
