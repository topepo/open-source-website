[[videos]]
url = "https://www.youtube.com/watch?v=jbR8P9UrsaQ"
title = "Yu-Hung Chang, Phillip Lear & Brendan Scully | R in Manufacturing & Consumer Products | RStudio"
slug = "2021-07-06_yu-hung-chang-phillip-lear-brendan-scully-r-in-manufacturing-consumer-products-rstudio"
date = "2021-07-06T13:54:31Z"
description = "Presentations from:\nPratt and Whitney - Brendan Scully\nKellogg Company - Phillip Lear\nAGCO - Dr. Yu-Hung Chang\n\nAbstract #1\nIn this talk, Brendan will showcase two of the tools developed at Pratt using R and hosted on RStudio Connect: a forecasting model for repair shop performance and a real-time dashboard for work management on the repair shop floor. In addition to these tools, he will talk about how to approach some common development and implementation challenges for decision analytics tools at large companies like Pratt.\n\nBio:\nBrendan Scully is the Decision Analytics Strategy Lead for Pratt and Whitney’s aftermarket operations business. In this role, he is focused on how decision analytics tools can be used to improve the maintenance, repair, and overhaul of aircraft engines. Before this, Brendan helped other companies make the most of their data as an actuarial consultant at Milliman and Deloitte, and as data scientist at the African Leadership University.\n\nAbstract #2\nPhillip will discuss his organization’s journey in transitioning a set of mixed analytic technologies to using a standardized analytic content platform. This talk will offer real life lessons learned in overcoming organizational barriers, getting stakeholders on board, and running a successful POC.\n\nBio:\nPhillip is a Principal Data Scientist at the Kellogg Company working with global sales, marketing and ecommerce teams. He also teaches R to economics students at Grand Valley State University and sits on the Advisory Board for the Economics department. He lives in Kalamazoo (yes there really is a Kalamazoo!) with his wife Jamie and their two corgis, Penny and Winston.\n\nAbstract #3\nDr. Yu-Hung Chang is an Advanced Analytics Specialist at AGCO. She’s going to showcase an interactive app developed at AGCO using R and hosted on RStudio Connect, which provides comprehensive insights for global manufacturing quality analysis. The real-time dashboard provides not only forecasting failure rate based on different levels of parts, but also varieties of diagrams of cost and claims in different aspects. In this talk, Yu-Hung will share what are the challenges for development of analytics tools and how to establish some common development in agricultural manufacturing world.\n\nDr. Yu-Hung Chang is an Advanced Analytics Specialist working for AGCO’s Global Field Quality group. Her multi-disciplinary background combines technical fundamentals with leading-edge research and big data applications, using the most advanced technologies. She has authored numerous articles, published in inter-disciplinary journals, covering topics from Statistics and Computational Physics to Aeronautics and Automotive."
