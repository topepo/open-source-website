[[videos]]
url = "https://www.youtube.com/watch?v=l_U3hQ6mm60"
title = "Mara Averick & Maya Gans | Data Visualization Accessibility | RStudio Meetup"
slug = "2022-03-10_mara-averick-maya-gans-data-visualization-accessibility-rstudio-meetup"
date = "2022-03-10T23:10:23Z"
description = "2:55 - A11Y in R: Adapting Sarah L. Fossheim's 10 dos and don'ts to keep in mind when designing accessible data visualizations | Maya Gans\n30:11 - Adventures with {highcharter} and the Highcharts accessibility module | Mara Averick\n58:07 - Q&A\n\nA11Y in R: Adapting Sarah L. Fossheim's 10 dos and don'ts to keep in mind when designing accessible data visualizations | Presented by Maya Gans\n\nAbstract: This talk will use R based visualizations and walk through examples of accessibility considerations when making plots and applications.\n\nSpeaker Bio: Maya Gans is a Data Visualization Engineer at Atorus Research where she develops custom applications using R and JavaScript. As an RStudio intern she designed TidyBlocks, a visual block based programming language. Maya also co-wrote JavaScript for Data Science. Maya uses `ggplot2` and `d3.js` to create music related infographics for JamBase.com. When Maya's not coding, she's climbing mountains.\n\nAdventures with {highcharter} and the Highcharts accessibility module | Presented by Mara Averick\n\nAbstract: Lessons learned about accessibility in data visualization through using the {highcharter} R package and the Highcharts visualization library's accessibility module.\n\nSpeaker bio: Mara is a developer advocate at RStudio. She is the author of neither the highcharter package nor the Highcharts charting library, but enjoys using both to make interactive, accessible data visualizations.\n\nSo many amazing resources shared yesterday on data visualization accessibility:\n\n🌟 Sarah L Fossheim's blog - intro to designing accessible data viz: https://lnkd.in/dAAXfE35\n🌟 Coblis - Color Blindness Simulator: https://lnkd.in/dJT-hJE4\n🌟 Web Content Accessibility Guidelines (WCAG): https://lnkd.in/dJKmvFTq\n🌟 Color Contrast Accessibility Validator: https://color.a11y.com/\n🌟 Google lighthouse (automated tool for improving quality of web pages): https://lnkd.in/d8xjSN5i\n🌟 A11y Project Checklist: https://lnkd.in/diFM_TBd\n🌟 Chartability (questions) for ensuring data visualizations, systems, and interfaces are accessible: https://lnkd.in/d_7wk3zx\n🌟 Accessible {highcharter} GitHub repo (Mara's charts, and source .Rmds): https://lnkd.in/dhvBwQ-f\n🌟 Mara's blog post series: https://lnkd.in/d9xz6VZ6\n🌟 10 Guidelines for DataViz Accessibility by Øystein Moseng: https://lnkd.in/dS-XsKxw\n🌟 Accessible visualization via natural language descriptions by Alan Lundgard and Arvind Satyanarayan: https://lnkd.in/dpdN4skK\n🌟 DataViz Accessibility Advocacy and Advisory Group: https://lnkd.in/d336ACn3\n🌟 Alt-texts: The Ultimate Guide by Daniel Göransson: https://lnkd.in/dsHcvPs2\n🌟 JooYoung Seo's Talk on non visual interactions with R packages: https://lnkd.in/dcid56BT\n🌟 Accessible Data Science for the Blind Using R: https://lnkd.in/dTWZbau8\n🌟 Maya's blog on skip links: https://lnkd.in/dFTYFxTk\n🌟 Twitter alt text: https://lnkd.in/d9bKqiPU\n🌟 Twitter account to follow: @alttextreminder\n🌟 Silvia Canelón's blog posts: https://lnkd.in/drwbE2Rf\n\nPackages shared:\n📦 ggpattern: https://lnkd.in/dyTBvvz4\n📦 gglabeler: https://lnkd.in/dumA8Um8\n📦 gghighlight: https://lnkd.in/d_m25j7x\n📦 sonfiy: https://lnkd.in/dyPwHimP\n📦 tuneR: https://lnkd.in/dWi2WZH8\n📦 brailleR package - https://lnkd.in/d_75cdnQ\n\nCaleb brought up a great point that visualizing data isn't new, so it cam be helpful to look at adjacent disciplines to see ways people have solved these before as well. For example, cartographers have had really creative ways to make things visible.\n\n🗺 Sarah Belle, cartographer who makes fonts / typography really legible on maps:\nsarahbellmaps.com/belltopo-sans-font-by-sarah-bell/\n🗺 Cynthia Brewer's work on color palettes. https://colorbrewer2.org/#\n🗺 cartographers who use 3d printing for tactile maps: https://touch-mapper.org/en/"
