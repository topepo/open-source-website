url = "https://www.youtube.com/watch?v=Eqlh3iE1BiU"
title = "Scaling a shiny app to 100K monthly users | Tan Ho | Data Science Hangout"
slug = "2025-11-05_scaling-a-shiny-app-to-100k-monthly-users-tan-ho-data-science-hangout"
date = "2025-11-05T15:30:18Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Tan Ho, Engineering manager at Teamworks Intelligence Soccer, to chat about scaling Shiny applications, working out loud and building a personal brand, defining \"code in production,\" and best practices for R package development.\n\nIn this Hangout, we explore how Tan built a successful Shiny application that scaled to serve thousands of users, challenging the misconception that R does not scale. Tan shared his firsthand experience running the Dynasty Process Shiny app which peaked at 200,000 monthly users. He explained that the app was able to handle this load because user sessions were kept very short (around 30 seconds to a minute). Key advice for performance optimization includes focusing on small round-trip times for users, moving as much logic out of the app as possible (such as pre-computing or caching common requests), reducing the interface, and optimizing the actual queries (for instance, by rewriting them in data.table).\n\nResources mentioned in the video and zoom chat: \n🔗 DynastyProcess GitHub → https://github.com/DynastyProcess \n🔗 Tan Ho's Github → https://github.com/tanho63\n🔗 Tan Ho talk: A minimum viable Shiny infrastructure for serving 95,000 monthly users → https://www.youtube.com/watch?v=zb3umo3Ka2g&t=3s \n🔗 Tan Ho talk: Shiny in Production 2023: Tan Ho - Effective logging for Shiny → https://www.youtube.com/watch?v=wbUXrK_YWfI \n🔗 Show Your Work by Austin Kleon → https://austinkleon.com/show-your-work/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about display setups, with participants debating whether one screen is better for focus or if multiple screens (up to four!) are essential for data science work. How many monitors do you roll with? Libby can't live without at least two external monitors, but admits that sometimes just one laptop monitor is better for focusing.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n04:15 \"Tell us just, like, a snippet of your journey into R/Shiny\" \n07:36 \"How many users did you have on your shiny app?\" \n09:44 \"How did the techniques and skills you learned in NFLverse help translate to your professional role?\" \n13:03 \"Do you feel like working out loud played a big part in building a personal brand?\" \n15:29 \"What is your top advice for thinking about code in production?\" \n21:30 \"Do you have resources for people starting their Shiny journey?\" \n25:01 \"What's the trigger point when you decide to bundle products into one package?\" \n27:25 \"What were the biggest hurdles faced in scaling the Shiny app with high user load?\" \n31:23 \"How can I do a better job of evaluating fantasy football players than ESPN projections?\" \n32:59 \"What packages are most helpful for benchmarking and writing fast code?\" \n35:29 \"Do you start with use case first or generic code and then refine?\" \n37:48 \"What soft skills or personality traits help manage bugs efficiently?\" \n41:49 \"Did you have instances when you felt you were going overboard with curiosity?\" \n45:25 \"What are the best practices for reproducible production workflows for non-technical teams?\" \n49:00 \"What piece of career advice would you give?\""
