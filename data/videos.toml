url = "https://www.youtube.com/watch?v=NTtcTF2tFEA"
title = "posit::conf(2023) Workshop: Introduction to tidymodels"
slug = "2023-05-09_positconf2023-workshop-introduction-to-tidymodels"
date = "2023-05-09T21:18:23Z"
description = "Register now: http://pos.it/conf\nInstructors: Hannah Frick, Simon Couch, Emil Hvitfeldt\nWorkshop Duration: 1-Day Workshop\n\nThis workshop is for you if you:\n•   have intermediate R knowledge, experience with tidyverse packages, and either of the R pipes\n•   can read data into R, transform and reshape data, and make a wide variety of graphs\n•   have had some exposure to basic statistical concepts such as linear models, random forests, etc.\n\nIntermediate or expert familiarity with modeling or machine learning is not required.\n\nThis workshop will teach you core tidymodels packages and their uses: data splitting/resampling with rsample, model fitting with parsnip, measuring model performance with yardstick, and basic pre-processing with recipes. Time permitting, you’ll be introduced to model optimization using the tune package. You’ll learn tidymodels syntax as well as the process of predictive modeling for tabular data."
