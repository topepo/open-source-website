description = "Transform messy Jupyter notebooks into polished HTML reports with Quarto. Learn how to create professional, client-ready reports that effectively communicate data science insights to stakeholders. Using a telecom customer churn analysis example, we'll cover:\n- Converting notebooks to formatted HTML reports\n- Customizing layouts and interactive elements\n- Adding business context to technical analysis\n- Publishing and sharing reports effectively\n\nPerfect for data scientists and analysts who need to present technical work to business audiences.\n\n\n\nLink to Code: https://github.com/KeithGalli/telecom-churn-analysis \nQuarto Crash Course Video: https://youtu.be/_VKxTPWDhA4?si=kcbQ8M9p6HH5QE2w\nShare your work with Posit Connect Cloud: https://pos.it/keith_qc \n\nVideo by @KeithGalli \n\nVideo timeline!\n0:00 - Video Overview & Accessing Code/Data\n1:46 - Rendering Jupyter Notebook as HTML Output\n3:30 - Making quick improvements to our HTML Report (adjusting YAML parameters, hiding code/output cells)\n8:15 - Understanding the Business Context & Insights from our Analysis and adding written details to report. \n14:30 - Improving page formatting (margins, body size, etc)\n17:30 - Adding business recommendations for our telecom client\n21:00 - Further aesthetic improvements (larger font-size, organizing info into columns, using a qmd file, etc.)\n30:17 - Publishing our HTML report using Posit Connect Cloud\n\n#python  #jupyter #quarto"
