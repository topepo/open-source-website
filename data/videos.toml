[[videos]]
url = "https://www.youtube.com/watch?v=91RSrxbxHUE"
title = "The importance of relevant analytics | Nechama Katan @ Pfizer | Data Science Hangout"
slug = "2024-10-22_the-importance-of-relevant-analytics-nechama-katan-pfizer-data-science-hangout"
date = "2024-10-22T18:49:35Z"
description = "We were recently joined by Nechama Katan, Director of Innovative Data Analytics at Pfizer, for a conversation about relevant analytics, the importance of understanding business context, and strategies for bridging silos within organizations. \n\n✨  \"Technology on its own doesn't do you any good.\"\n\nNechama highlighted the common pitfall of organizations prioritizing technology over business needs. She stressed that technology is only valuable when it directly addresses a business problem. Often, companies invest in complex data infrastructure and tools without a clear understanding of how they will be used to answer critical business questions. This can lead to frustration and a lack of adoption by business users.\n\nNechama encouraged data professionals to prioritize understanding the business context behind the data. By asking questions, collaborating with colleagues in other departments, and actively seeking to understand the challenges and goals of the business, data scientists can ensure their work delivers tangible value.\n\n✨ How would you recommend acquiring the business background needed to succeed?\n\nIn our Hangout chat, Nechama stressed the importance of building relationships and breaking down silos within organizations. She encouraged data professionals to:\n\n● Be curious: Ask questions relentlessly, seeking to understand the perspectives and challenges of colleagues in other departments.\n● Offer help: Identify areas where your expertise can be valuable to others and proactively offer assistance.\n● Be kind: Approach interactions with empathy and a genuine desire to build connections.\n\nIn sharing her career advice, Nechama advocated for \"managing down,\" prioritizing collaboration and support for peers. Building strong relationships and fostering a culture of teamwork is essential for solving problems and achieving impactful outcomes\n\nResources from the Chat:\n\n🔗 [Mosaic Crochet Shiny App](https://apps.machlis.com/shiny/crochetapp/)\n🔗 [Cascades: How to Create a Movement that Drives Transformational Change by Greg Satell](https://www.amazon.com/Cascades-Create-Movement-Drives-Transformational/dp/1260454010)\n🔗 [Launching DyslexicU, the World's First University of Dyslexic Thinking](https://www.virgin.com/branson-family/richard-branson-blog/launching-dyslexicu-the-worlds-first-university-of-dyslexic-thinking)\n🔗 [Move Fast and Break Shit: Burning Man's Lessons for Success in Work and Life by Heather White](https://www.amazon.com/Move-Fast-Break-Shit-Burn-ebook/dp/B08JNWBQ9Y)\n🔗 [One Data Scientist’s Assimilation of the Product Lexicon](https://medium.com/@eugene.geis/one-data-scientists-assimilation-of-the-product-lexicon-3dd0e7b05be1)\n🔗 [Spurious Correlations](https://tylervigen.com/spurious-correlations)\n🔗 [There's Only One R in Pfizer](https://www.youtube.com/watch?v=bnRdI6jvGpM)\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\nTwitter: https://twitter.com/posit_pbc\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
