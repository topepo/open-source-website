description = "Led by Isabella Velásquez\n\nA few helpful links upfront:\n✨ Quarto documentation https://quarto.org/\n✨ Meetup presentation: https://rstd.io/build-quarto-blog\n✨ Blog exercise GitHub repo https://rstd.io/quarto-blog-exercise-repo \n✨ Blog exercise Cloud project https://rstd.io/quarto-blog-exercise-cloud \n✨ Upcoming events: rstd.io/community-events\n✨ Welcome to Quarto Workshop: https://youtu.be/yvi5uXQMvu4\n\nFor the examples above, please ensure you are running Quarto Version: 1.0 or higher.\n\nTimestamps: (to be updated)\n42:03 - Add a blog post\n\nAbstract:\nA blog is a fantastic opportunity to record your data stories, gain exposure for your expertise, and support others in their data science journey. In this talk, I will discuss building a blog with Quarto. Quarto is the multi-language, next-generation publishing system from RStudio, with many new features and capabilities. Quarto websites include integrated support for blogging. You can quickly get up and running with a blog and focus on customization and style. Quarto also allows you to publish executable code blocks to include R, Python, Julia, or Observable JS output in your blog posts.\n\nSpeaker Bio:\nI am a content strategist, data enthusiast, and author. My main goal is to drive engagement around all the awesome things happening at RStudio."
