[[videos]]
url = "https://www.youtube.com/watch?v=ivEoeyWJzVY"
title = "Data-level permissions using Posit Connect (with Databricks, Snowflake, OAuth)"
slug = "2024-09-25_data-level-permissions-using-posit-connect-with-databricks-snowflake-oauth"
date = "2024-09-25T15:00:22Z"
description = "Should one viewer of your app be able to see more (or different) data than another? Maybe colleagues in California should only see data relevant to them? Or managers should only have access to their own employee data?\n\nThe Connect team joined us for a demo on inheriting data-level permissions using Posit Connect and Databricks Unity Catalog. While this workflow uses Databricks to illustrate federated data access controls, this same methodology can also be applied to Snowflake or any external data source that supports OAuth.\n\nDuring this workflow demo, you will learn:\n1. How to define row-level access controls in Databricks Unity Catalog\n2. How to create a Databricks OAuth integration in Posit Connect\n3. How to write interactive applications that utilize the viewer’s Databricks credentials when reading data from Databricks Unity Catalog, providing the viewer with a personalized experience depending on their level of data access\n4. How to deploy this application to Posit Connect and share it within your organization\n\nIf you’d like to talk further with our team 1:1 about doing this, you can find a time to chat here: https://posit.co/schedule-a-call/?booking_calendar__c=WorkflowDemo\n\nPs. To enable OAuth integrations, your team will need to upgrade to Posit Connect 2024.08.0. This feature is available in Enhanced and Advanced product tiers. \n\nHelpful resources for this workflow:\n✨ Full examples to get you started: https://github.com/posit-dev/posit-sdk-py/tree/main/examples/connect\n✨ Admins will likely be most interested in starting here: https://docs.posit.co/connect/admin/integrations/oauth-integrations/databricks/\n✨ End users will be most interested here: https://docs.posit.co/connect/user/oauth-integrations/\n✨ Q&A Link: https://youtube.com/live/TZQY6rm6hU4?feature=share\n\nAdditional resources shared:\n✨ Release Blurb: https://docs.posit.co/connect/news/#posit-connect-2024.08.0\n✨ Security: https://docs.posit.co/connect/admin/integrations/oauth-integrations/security.html\n✨ Publishing Quarto: https://docs.posit.co/connect/how-to/basic/publish-databricks-quarto-notebook/\n✨ sparklyr: https://github.com/sparklyr/sparklyr?tab=readme-ov-file#connecting-through-databricks-connect-v2\n✨ odbc: https://github.com/r-dbi/odbc?tab=readme-ov-file#odbc-"
