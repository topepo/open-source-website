[[videos]]
url = "https://www.youtube.com/watch?v=k3PuGGmA7Hg"
title = "Tom Schenk & Bejan Sadeghian | Making Microservices Part of Your Data Team"
slug = "2022-06-10_tom-schenk-bejan-sadeghian-making-microservices-part-of-your-data-team"
date = "2022-06-10T13:23:04Z"
description = "Making microservices a part of your data science team\nLed by Tom Schenk & Bejan Sadeghian at KPMG\n\nTimestamps:\n1:09 - Start of presentation\n4:00 - Challenges and trade-offs of a growing team (how I stopped worrying about hiring)\n8:14 - What are microservices? (help separate out the different layers of an app)\n9:36 - Hosting other web technologies on RStudio Connect (ex. React)\n12:25 - Simple Hello World example of microservices \n16:00 - Reason to separate out logging\n17:15 - How to design & plan microservices (moving from a monolithic Shiny app)\n17:51 - Challenges to getting started with microservices\n21:02 - How do you address getting started? (domain driven design)\n23:17 - Applying cloud design patterns\n25:37 - Separation of development duties\n27:22 - Addressing any risks that come with microservices\n29:17 - Considering costs and benefits\n30:11 - Microservices in action: demo of KODA app (making changes to the organization)\n36:21 - PowerBI interacting with the same microservice from Connect\n38:30 - Growing teams face a trade-off of complexity and simplicity (KPMG's path)\n\nQuestions:\n43:28 - Can you use a Shiny front end together with a microservice backend?\n44:09 - Do you hire separately for back-end data science development and front-end Shiny UI development?\n46:00 - Are all microservices managed by a centralized unit?\n47:02 - Who can access RStudio Connect in your organization?\n48:29 - When you decided to go the microservice route, what was your first step?\n50:47 - What roles are you hiring for?\n52:20 - Might you suggest some web service servers that host R-based or Python services?\n53:33 - Are apps build with microservices as responsive as those that adopt a monolithic architecture or do microservices introduce a lag?\n55:09 - Can you show the back-end response data through developer tools?\n56:45 - Can you speak more about the logging microservice? Did you build it ground-up or did you adopt an off-the-shelf package or app?\n\nAbstract:\nWhether or not you’ve heard of microservices architecture, you may want to know how microservices can help you scale R-based applications across an enterprise.\n\nAs data science teams—and their applications—grow larger, teams can experience growing pains that make applications complex, difficult to customize, or challenging to collaborate across large teams. This meetup will discuss what microservices are, how it compares to Shiny, how it can help a data science team, and how you can deploy microservices using your RStudio Connect environment.\n\nThis meetup will help you understand several key items:\n• The basic concept of microservices and benefits, such as making your code modular, domain-driven design, and reducing the complexity of application development, and facilitate larger development teams.\n• How to use the Plumber package to deploy APIs as part of a microservices architecture.\n• How you can work with front-end development teams using their preferred framework (e.g., React, Angular, Vue) using RStudio Connect.\n\nWe will show a widely-used application built using a microservices architecture and hosted in RStudio, including before-and-after comparisons to show the strengths of a microservices framework leads to a better-looking and better-functioning application. Our team will discuss the journey and growth to arrive at the new approach to make development easier within a quickly growing group.\n\nSpeaker Bios:\nTom Schenk Jr. is a researcher and author on applying technology, data, and analytics to make better decisions. He's currently a managing director at KPMG. He has previously served as Chief Data Officer for City of Chicago.\n\nBejan Sadeghian is a director of analytics at KPMG and leads data science development, which spans from advanced analytics to machine learning engineering.\n\nFor upcoming events: rstd.io/community-events-calendar\nInfo on RStudio Connect: https://www.rstudio.com/products/connect/\nTo chat with RStudio: rstd.io/chat-with-rstudio"
