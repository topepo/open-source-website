url = "https://www.youtube.com/watch?v=U48y0_yzEPY"
title = "Company-branded reports, apps, and dashboards made easier with brand.yml & Posit"
slug = "2025-02-26_company-branded-reports-apps-and-dashboards-made-easier-with-brandyml-posit"
date = "2025-02-26T16:00:26Z"
description = "You will learn: How to apply consistent company branding across reports, dashboards, and apps\n\nKey Links:\n1. GitHub Repo for Example: https://github.com/skaltman/brand-yml-demo\n2. brand.yml GitHub repo: https://posit-dev.github.io/brand-yml/\n2. Follow-along blog post: https://posit.co/blog/unified-branding-across-posit-tools-with-brand-yml/\n3. Q&A after the Demo: https://youtube.com/live/kuEbRfmm4G4?feature=share\n\nAdditional Resources Mentioned in Q&A:\n1. Quarto specific page on brand: https://quarto.org/docs/authoring/brand.html\n2. Typography: https://posit-dev.github.io/brand-yml/brand/typography.html\n3. brand.yml + pkgdown: https://github.com/rstudio/bslib/tree/main/pkgdown\n4. LLM brand.yml prompt: https://posit-dev.github.io/brand-yml/articles/llm-brand-yml-prompt/\n5. Inspiration/gallery: https://posit-dev.github.io/brand-yml/inspiration/\n\nWhy we think this is important:\nConsistent company branding in your reports and apps (with your logo, colors, and fonts) can help make your work look more professional, but are often tricky to get right.\n\nCommon challenges we’ve heard from the community:\n1. Excessive manual effort: Applying colors, fonts, and logos across reports, apps, and dashboards takes time and is prone to errors.\n2. Difficult to update: When brand guidelines change, it’s difficult to update all products consistently.\n3. Team consistency: Ensuring all contributors follow branding guidelines is challenging to manage.\n\nHow to join future events:\nWe host workflow demos the last Wednesday of every month. You can add them to your calendar with this link: https://www.addevent.com/event/Eg16505674\n\nFull playlist of workflow demo recordings: https://www.youtube.com/playlist?list=PL9HYL-VRX0oRsUB5AgNMQuKuHPpNDLBVt\n\nHave suggestions? Comment below.\n\nThank you for joining us!"
