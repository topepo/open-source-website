[[videos]]
url = "https://www.youtube.com/watch?v=1sPSvt3wmxs"
title = "RStudio Sports Analytics Meetup: NFL Big Data Bowl 2022 Winners discuss the Math behind the Path"
slug = "2022-09-13_rstudio-sports-analytics-meetup-nfl-big-data-bowl-2022-winners-discuss-the-math-behind-the-path"
date = "2022-09-13T17:06:13Z"
description = "RStudio Sports Analytics Meetup: NFL Big Data Bowl 2022 Winners discuss the Math behind the Path\n\nLed by Robyn Ritchie, Brendan Kumagai, Ryker Moreau, Elijah Cavan\n\nHelpful Links:\nKaggle: https://www.kaggle.com/code/robynritchie/punt-returns-using-the-math-to-find-the-path\nGithub: https://github.com/ritchi12/punt_returns_using_the_math_to_find_the_path\nOptimal Path Generator Shiny app: https://rstd.io/meetup-shiny-app\nRelated blog post, Tips for Getting Started With the NFL Big Data Bowl: https://www.rstudio.com/blog/tips-for-getting-started-with-the-nfl-big-data-bowl/\n\nTimestamps:\n3:02 - Start of presentation\n4:07 - Meet the team\n5:25 - Quick overview of 2022 NFL Big Data Bowl subject\n7:00 - Finding the best path to the end zone\n9:12 - Penalized Expected Arrival Time (PEAT)\n13:10 - Take the PEAT to find the safest route (A-star algorithm)\n15:11 - Comparing the optimal path to the observed path\n18:30 - Key R functions for this project\n23:37 - Optimal Path Generator Shiny app demo\n33:38 - Comparing optimal paths (risk/reward)\n35:44 - \"Aiming for the side won't provide\"\n37:54 - The precision of a good decision\n38:38 - How do you have a good submission for the big data bowl\n40:40 - Elements of a good big data bowl submission\n\nTalk Abstract:\nSimon Fraser University has been a force in the NFL's Big Data Bowl for years. Focusing on punt returns, this team used tracking data to develop an algorithm to find the optimal path for a successful return, quantify player formations on the field and predict yards remaining on any frame of the return. This year's winning team will discuss their entry, the R code behind the optimal path and advice for this year's entrants.\n\nSpeaker Bio:\nRobyn, Brendan, Ryker and Elijah are all graduate students in statistics at Simon Fraser University in Vancouver, Canada. They each have a passion for sports analytics and enjoy applying their stats knowledge to the game.\n\nQ&A Timestamps: \n*rough estimate :)\n15:00 - Do you think being in a general Statistics graduate program was beneficial to your work? As opposed to more specific like \"Data Science\" or \"Sports Analytics\"?\n19:00 - Did you calculate PEAT at just a single point in time (at catch), or at multiple points during the return?\n30:00 - Is it possible to share the code for future reference?\n43:00 - What were the biggest challenges when going through the data?\n45:00 - In terms of all your data inputs, do you see this extending to performance data like expected speed, fatigue etc., perhaps from practice etc.?\n46:00 - At any point during the project, did you feel like you had hit a cul-de-sac or impasse?\n48:20 - How do you get started working with player tracking data?\n56:00 - Sounds like you were running the code locally? Were there any specific roadblocks to offloading that to the cloud, or was that just not really necessary?\n\n\nUpcoming community events: rstd.io/community-events\nFeedback & Suggestions: rstd.io/meetup-feedback"
