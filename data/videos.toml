[[videos]]
url = "https://www.youtube.com/watch?v=cFLV25fbh4E"
title = "Data driven decision making in pharma | Ning Leng @ Roche-Genentech & Jing Huang @ Veracyte"
slug = "2024-08-07_data-driven-decision-making-in-pharma-ning-leng-roche-genentech-jing-huang-veracyte"
date = "2024-08-07T20:18:38Z"
description = "We were recently joined by both Ning Leng, Global Head, Data Sciences Acceleration at Roche-Genentech & Jing Huang, SVP of Bioinformatics and Data Science at Veracyte to chat about embedding modernized data science solutions in pharma to enable data driven decision making.\n\nLinks mentioned in the chat:\n🔗 R Consortium R Submissions Pilot 4 documentation portal: https://rconsortium.github.io/submissions-pilot4/\n🔗 Bay Area Biotech-Pharma Statistics Workshop: https://www.bbsw.org/\n🔗 San Francisco Bay Area Chapter of American Statistical Association: https://sites.google.com/view/sfasa-org/home?authuser=1/\n🔗 Dahshu Data Science Symposium: https://dahshu.wildapricot.org/\n🔗 DS Hangout Survey/Feedback: https://docs.google.com/forms/d/e/1FAIpQLSdqXKPCPOwC7tSLygc43gf2ezkNO4bhM4TAgjUQMeoPe_GOmg/viewform\n\nSpeaker Bios:\nNing Leng: Ning Leng is the ad-interim Global Head of the Data Science Acceleration Enabling Platform, under Roche Product Development Data Sciences. Ning joined Roche-Genentech in 2016 as a statistician and worked on both early and late phase oncology development, with a special interest in utilizing diverse data sources and advanced methodologies to generate insights for personalized healthcare. Since then she has been driving a number of internal and cross-industry projects on modernizing Data Science solutions in pharma. Prior to joining Roche-Genentech, Ning obtained her PhD in Statistics from University of Wisconsin-Madison and worked at the Morgridge Institute for Research.\n\nJing Huang: Jing Huang holds a B.A. in Statistics and Probability from Peking University and a Ph.D. in Statistics and M.S. in Epidemiology from Stanford University. With over 20 years in the biomedical field, her research focuses on statistical methodologies in clinical trial design, genomic analysis, and machine learning. As SVP of Bioinformatics & Data Science at Veracyte Inc., she oversees bioinformatics pipelines, algorithm development, and statistical analyses for product development. Jing has co-authored over 30 peer-reviewed articles, with more than ten thousand citations, and is a co-inventor on over 20 patent filings. She actively promotes data science through volunteer work, including as founding president of DahShu, 2024 president of BBSW, and chapter representative of the American Statistical Association San Francisco Bay Area Chapter (SFASA). In 2023, she was elected as a Fellow of the American Statistical Association to recognize her outstanding contributions to the medical research community in the field of statistics; for numerous statistical innovations in genomic tests; and for exemplary leadership and community service to the profession.\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nThe Hangout is a gathering place for the whole data science community to chat about data science leadership and questions you're all facing that happens every Thursday at 12 ET.\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh \n\nWe'd love to have you join us in the conversation live!\n\nThanks for hanging out with us! 💛"
