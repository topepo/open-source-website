date = "2025-05-14T16:00:06Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Nick Wan, Senior Director of Baseball Analytics at the Cincinnati Reds, to chat about baseball analytics, data sources and tools, applying analytics in practice, and streaming data science.\n\nIn this Hangout, we explore the types of data used in baseball analytics, ranging from traditional box score data collected since the late 1890s to modern high-tech measurements. This includes physics-based data like pitch speed and spin rate, influenced by environmental factors. Computer vision and radar tracking capture detailed information. Recent advancements allow for skeletal data capture from multiple high-frame rate cameras, quantifying biomechanical stress to help prevent injury. Data is also gathered via computer vision models tagging events and manual official scorers. This diverse data is used to predict events, evaluate players, and inform strategies such as optimizing lineups based on matchups or recommending adjustments to pitch movement. We all learned A LOT about baseball in this hangout!\n\nResources mentioned in the video and zoom chat: \n🔗 Nick Wan's Twitch Stream → https://www.twitch.tv/nickwan_datasci \n🔗 Nick Wan's Free Data Science Bootcamp (Day 1) → https://www.youtube.com/watch?v=pocp0KdrIdk \n🔗 VizBuzz YouTube Playlist → https://www.youtube.com/playlist?list=PL6PX3YIZuHhwZ-C-jZ427D-XkLGNWFPVB \n🔗 baseballr R package (for baseball data) → https://r.lib.hash.kr/baseballr/ \n🔗 Sports-reference website → https://www.sports-reference.com/ \n🔗 Vestaboard (Split-Flap Display) → https://shop.vestaboard.com/products/vestaboard \n🔗 Posit + Databricks Integrations → https://posit.co/blog/databricks-and-posit-announce-new-integrations\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the Vestaboard behind Nick (see linked resources above!). Chat members were curious about what it was and how it worked, with Nick explaining that it's connected to his Twitch stream and can display messages from chat. How cool is that?!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn: https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
