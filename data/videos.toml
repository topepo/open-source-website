description = "R in Public Sector\nPresentation by Hlynur Hallgrímsson \n\n# The data you were promised… and the data that you got\n## A story about Reykjavík’s Thermal Pools\n\nAbstract:\nWhen a team within your organization comes to you with a way to launch a highly sought-after data product as a quick win, how should you respond? With open arms of course, but also, as it turns out, with a healthy dose of skepticism. Hlynur Hallgrímsson, a senior data scientist with the City of Reykjavík, Iceland, talks about putting predictive modeling in production when your data doesn’t tell you the whole story. Using the real-world example of Reykjavík’s public thermal pools, Hlynur goes through the process from idea through to implementation of a “simple” app that tells you which public pools are currently the most crowded.\n\nSpeaker Bio:\nHlynur Hallgrímsson is a senior data scientist within the City of Reykjavík’s Office of Data Services, the city’s centralized data science team.\n\nA few helpful links:\nThe slides are online here: https://hlynurhallgrims.github.io/the_data_you_were_promised/#1\nThe github repo is at: https://github.com/hlynurhallgrims/the_data_you_were_promised\nCalendar of upcoming events: https://www.addevent.com/calendar/wT379734\nSpeaker submission form: https://forms.gle/gxHXgHcfZUKhiHZU8\nAnonymous feedback form: https://forms.gle/bLRjnfqUYmkLaDc46\nR for Data Science Online Learning Community Slack: r4ds.io/join (channel #chat-government)"
