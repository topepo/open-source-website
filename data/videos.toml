[[videos]]
url = "https://www.youtube.com/watch?v=NjHMlL_jYV8"
title = "Dara Straussman @ Stripe | Partnership-model when forecasting | Data Science Hangout"
slug = "2023-03-15_dara-straussman-stripe-partnership-model-when-forecasting-data-science-hangout"
date = "2023-03-15T14:09:25Z"
description = "We were joined by Data Straussman, Data Science Manager at Stripe. Dara's team focuses on forecasting, machine learning, and analytics in the Finance and Operations spaces.\n\nWe were able to get a glimpse into their financial modeling methodology at Stripe after a question from Alan at 12:59\n\nQuestion:\n\nHow do you get buy-in from business stakeholders who historically would have been setting targets (like salespeople and their leaders) that the forecasting you're doing seems like a realistic enough picture of the world?\n\nAnswer:\n\nIt's an ongoing evolution for how we do this interaction because it's very important to get the input from stakeholders.\n\nThere might be a big sales deal coming down the pipeline that no statistical model will know about. There might be some product launch plans that we're just not going to be able to learn from history. So we find that interaction very important.\n\nWhen we started doing the – we call it the statistical forecasting and the adjustments — it was all done in spreadsheets by finance folks. We did really have to prove our value and show how a statistical model will actually help.\n\nSo our current system:\n\n1. We have the statistical model that's all done by data science.\n\n2. We do backtesting and reports to be able to build confidence in each level of the hierarchy so that people can understand where do they expect accuracy, where do they expect less accuracy.\n\n3. We have a whole process with the finance and strategy team, where they make adjustments to the forecast and are pretty clear about where they are doing adjustments and how it's affecting the total.\n\n4. Then we track both - the statistical versus the adjusted forecast. What we've learned over time is that making adjustments in certain ways or certain places is very important and very effective. We sort of encouraged the finance and strategy team to focus their efforts there. Whereas in other places, the statistical model is quite accurate, and it's best to spend effort elsewhere.\n\nSo that's the baseline of how we think about it– again, ever evolving.\n\nWe also have an embedded model so we sit with finance and strategy. We work really closely with them and really understand their problems.\n\nIt's very much a partnership-type model rather than a \"throw a model over the wall\" type model.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\nTwitter: https://twitter.com/posit_pbc\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)"
