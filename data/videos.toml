description = "The Belmaker lab fieldwork involves underwater surveys where we document the observed marine species. Historically, Microsoft’s Access was used for data input. But as the number of surveyors increased, a new user-friendly platform was needed to avoid bottlenecks. In this talk, I share my experience of developing such a platform for the lab using tidyverse packages. This experience demonstrates the concept of Minimum Viable Products as the use of Google Sheets evolved from manually creating the sheets to a single line of code. We encourage other researchers to expand their use of R to create a tailor made data processing workflow - from the data input stage.\n\nSession: Take a sad process and make it better: project and process makeovers"
