[[videos]]
url = "https://www.youtube.com/watch?v=a8lF2YybtVQ"
title = "Laboratory science to data science & the art of the growth gig | Lisa Elkin | Data Science Hangout"
slug = "2025-09-05_laboratory-science-to-data-science-the-art-of-the-growth-gig-lisa-elkin-data-science-hangout"
date = "2025-09-05T14:30:00Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Lisa Elkin, Senior Principal Computational Toxicologist at Pfizer, to chat about her career transition from a lab scientist to a data scientist, building Shiny apps for scientific audiences, and the value of internal programs for up-skilling and data literacy.\n\nIn this Hangout, we explore how to foster data science skills and build communities within a large organization. Lisa shares her experience with programs like an \"Analytics Exchange,\" where employees could dedicate 20% of their time to working on data science projects from across the company, allowing them to learn by doing. She provides tips on how to propose similar \"growth gig\" opportunities to leadership, highlighting the value of up-skilling the entire department to increase efficiency and innovation without necessarily hiring more specialists. \n\nLisa also gives advice for starting a new internal community from the ground up, emphasizing the need for a few passionate individuals and the importance of repeating introductory sessions to support newcomers. Lisa runs a Data Science Hangout internally at Pfizer!!\n\nResources mentioned in the video and zoom chat: \n🔗 Mastering Shiny Book → https://mastering-shiny.org/ \n🔗 Jenny Bryan - Code Smells and Feels Talk → https://github.com/jennybc/code-smells-and-feels \n🔗 Posit Academy → https://posit.co/products/enterprise/academy/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about what a \"mainframe\" computer is. The conversation sparked memories of punch cards, floppy disks, and how the cloud is in some ways a return to the mainframe paradigm. Let us know below if you’d like to hear more about it! Better yet, join us live on Thursdays :) pos.it/dsh\n\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps\n00:00 Introduction \n04:50 \"What is toxicology?\" \n06:19 \"What are the data types that your tool users are interfacing with?\" \n07:19 \"What is an assay?\" \n08:15 \"How does your science background benefit or disadvantage you as a data scientist?\" \n14:55 \"What kind of audience do you build Shiny apps for and what is your workflow?\" \n18:05 \"What made you decide to switch to industry and what were the bottlenecks between academia and industry?\" \n24:39 \"Do you have any tips on proposing an 'analytics exchange' program to leadership?\" \n28:38 \"What tools or systems do you use for sharing apps and what tools do you use daily?\" \n32:33 \"How much oversight do you have on your analysis and do you ever get stuck in skeptic paralysis?\" \n35:18 \"Do you have any podcast recommendations?\" \n38:01 \"How can organizations resolve the tension between allowing employees space to learn and being productive?\" \n41:12 \"What advice would you give to somebody starting a brand new community within their company?\" \n46:05 \"Any resources for learning modular Shiny apps or tool building in general?\" \n47:40 \"What is the career progression like for a data scientist and is it possible to grow as an individual contributor?\""
