description = "We were recently joined by Benedikt Kahmen, Head of Analytics, Data & AI at Generali Deutschland AG to chat about building new things with data: new insights, new algorithms, new teams.\n\nSpeaker bio: Benedikt is the Head of Analytics, Data & AI at Generali Deutschland AG, one of the largest primary insurers in Germany. He has spent the last 10 years building and scaling data science teams in insurance. Together with his teams, he launches and operates a wide range of data science applications from marketing and sales to customer service and claims in a heavily regulated environment. Before coming to insurance, he completed his doctorate in philosophy at the universities of Bielefeld and Oxford. He holds an M.phil. in philosophy from LMU University of Munich.\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
