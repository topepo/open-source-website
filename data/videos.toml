[[videos]]
url = "https://www.youtube.com/watch?v=FPbRUGsimTo"
title = "Running unified attribution at scale | Martin Stein @ Conversion Logix | Data Science Hangout"
slug = "2024-11-07_running-unified-attribution-at-scale-martin-stein-conversion-logix-data-science-hangout"
date = "2024-11-07T14:06:20Z"
description = "Join us for a conversation with Martin Stein, Chief Analytics Officer at Conversion Logix,  to chat about running unified attribution at scale, the tools they leverage, languages Conversion Logix's uses, and the workflow and operations to make it all happen. \n\nFeatured Leader Bio: Martin Stein is a seasoned data scientist, entrepreneur, and Chief Analytics Officer at Conversion Logix. With over 20 years of experience in AI, machine learning, and data science, he brings a wealth of expertise to the multifamily industry, developing cutting-edge MarTech solutions that empower marketing leaders to make data-driven decisions to maximize their investments. Stein is also the co-founder of Bend.ai, an AI/machine learning company acquired by Conversion Logix. His career includes significant roles at Apple, IDG/IDC, G5, RStudio, and startups like FileThis, Defined.ai, and Union.ai. Throughout his career, he has demonstrated a proven ability to build and scale products to over $200 million in revenue.\n\nMartin shares insights on topics like:\n\n✨ The problem with \"last-touch\" attribution in marketing and how his team is building solutions to provide a more comprehensive understanding of marketing channel effectiveness. \n✨ Common data science struggles, including data access, data inconsistency, production challenges, and team dynamics.\n✨ The value of community in a data scientist's journey, particularly for those exploring new areas like AI. \n✨ Tips for effectively communicating data science concepts and building business cases, both internally and with clients.\n✨ Approaches to measuring channel success in marketing and comparing it to copy success, emphasizing the importance of considering factors beyond individual channel performance.\n✨ How tools like Pins and Connect facilitate data management, workflow efficiency, and model deployment.\n✨ Insights into the use of vetiver for model evaluation, highlighting its ability to assess model behavior with known and unknown data and its relevance to MLOps practices.\n\nDon't miss this insightful episode packed with practical advice and real-world examples for data scientists at all levels! A few people in the chat said it felt like they were listening to a really great mentor speak, and we agree ❤️\n\nResources mentioned in the episode and chat:\n\n🔗 Causal Analysis: Impact Evaluation and Causal Machine Learning with Applications in R by Martin Huber\nhttps://mitpress.mit.edu/9780262545914/causal-analysis/ \n🔗 Causal Inference: The Mixtape by Scott Cunningham\nhttps://mixtape.scunning.com/ \n🔗 Kevin Ushey’s R Studio Conf talk on Renv\nhttps://www.youtube.com/watch?v=4wRiPG9LM3o \n🔗 Rami Krispin’s VS Code and R setup\nhttps://github.com/RamiKrispin/vscode-r \n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn:  (https://www.linkedin.com/company/posit-software)\nTwitter:  (https://x.com/posit_pbc)\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
