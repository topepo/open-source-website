description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by John Stanton Geddes, Senior Manager for the Advanced Analytics Marketing Team at HP, Inc., to chat about his career path from academia to marketing data science, the challenges and opportunities in marketing valuation using data, the evolution of marketing data science teams, and the impact of data privacy on user tracking.\n\nIn this Hangout, we explore the work of John's team at HP, which involves global marketing valuation. This includes developing media mix models to understand the return on investment across diverse marketing activities, from sponsorships like F1 to digital advertising like Google paid search and in-store promotions. John discussed the complexity of integrating data from these varied sources and the ongoing efforts to refine their models and use experimentation to drive effective marketing decisions.\n\nResources mentioned in the video and zoom chat: \n🔗 FRED (Federal Reserve Economic Data) → https://fred.stlouisfed.org/ \n🔗 R package fredr → https://cran.r-project.org/web/packages/fredr/vignettes/fredr.html \n🔗 Semrush → https://www.semrush.com/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about whether Excel is the \"gateway\" to data science, with many attendees sharing their agreement and experiences. Was Excel your gateway?!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here: \nWebsite: https://www.posit.co \nHangout: https://pos.it/dsh \nLinkedIn: https://www.linkedin.com/company/posit-software \nBluesky: https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
