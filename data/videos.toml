description = "To hear more about how Roche and other major pharmaceutical companies are transitioning to open source data science you can watch talks from this year’s R in Pharma conference: https://www.youtube.com/@RinPharma/playlists\n\nIn the Roche presentation you'll hear a few specific pieces of tooling mentioned, including:\n⬢ The pharmaverse - a series of packages designed specifically for clinical workflows: https://posit.co/blog/pharmaverse-packages-for-clinical-reporting-workflows)\n⬢ Posit Professional Team Products like Posit Connect - a publishing platform for Life Sciences teams that need to deploy, collaborate on, and automate clinical reporting and data science tasks. (https://posit.co/products/enterprise/connect)\n\nIf your team is transitioning to R for clinical trials and looking for training, Posit Academy is currently accepting cohorts for organizations that want to teach their workforce leading open-source languages like R and Python. Our team has worked with many pharmas and we offer specific curriculums and expertise for statistical programmers and data scientists working in pharma. (https://posit.co/products/enterprise/academy/)\n\nAt Posit, we have a dedicated Pharma team to help organizations migrate and utilize open source for drug development. To learn more about our support for life sciences, please see our dedicated Pharma page where you can book a call with our team. (https://posit.co/solutions/pharma)"
