slug = "2022-03-24_santiago-rodriguez-intro-to-functional-data-analysis-rstudio-meetup"
date = "2022-03-24T18:39:23Z"
description = "Energy Meetup - Intro to functional data analysis\nPresented by Santiago Rodriguez\n\n2:49 - Start of talk\n12:15 - First Q&A point\n23:23 - Second Q&A point\n31:56 - Third Q&A point\n40:44 - Final Q&A point\n\nAbstract\nThe focus of this talk is to introduce functional data analysis (FDA) and to showcase some of its applications in the utility space. A primary source of data in a utility are meter reads. This data is periodic and appears discrete, but energy consumption is continuous, which makes meter reads a perfect use case to apply FDA. The talk will highlight two applications: load profiles and segmentation. The talk will be non-technical - no math or code - because the goal of the talk is to persuade you to investigate FDA on your own.\n\nSpeaker Bio\nSantiago is a data scientist in the marketing department at Consumers Energy, a Michigan-based, public utility. He focuses on data engineering, data science, and MLOps. Santiago has about a decade of experience working in the analytics space across energy, aviation, automotive, and contact centers. He has a bachelor’s in finance from Florida State University and a master’s in statistics from Texas A&M.\n\nResources shared in the chat:\n✨ FDA descriptive statistics blog post: https://lnkd.in/gZjauTdt\n✨ Intro to FDA Blog Post: https://lnkd.in/gM5NCbHe\n✨ Refund package is introduced in 'Introduction to Functional Data' by Kokoszka and Reimherr: https://lnkd.in/gd5Bt3tE\n✨ Gaussian Process Regression Analysis for Functional Data by Shi & Choi: https://lnkd.in/gAig-AZa\n✨ GAMs in R, free course - Noam Ross: https://lnkd.in/gput2QbK\n✨ Jiguo Cao - Intro to FDA on YouTube: https://lnkd.in/ga4qfGDr\n✨ Feedback: rstd.io/meetup-feedback\n✨ Talk submission: https://lnkd.in/gJ7EUSCk\n✨ If you'd like to find out about upcoming events you can also add this calendar: rstd.io/community-events\n\nPackages shared in the chat:\n✨ Task view https://lnkd.in/gBqtuV2b\n✨ FDA: https://lnkd.in/ge85i6UE\n✨ Refund package: https://lnkd.in/gXGcT79t\n✨ FDA.USC: https://lnkd.in/ggHdUaEe"
