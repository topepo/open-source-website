description = "The Data Science Lab is a live weekly call. Register at pos.it/dslab! Discord invites go out each week on lives calls. We'd love to have you! \n\nThe Lab is an open, messy space for learning and asking questions. Think of it like pair coding with a friend or two. Learn something new, and share what you know to help others grow.\n\nOn this call, Libby Heeren is joined by Andrew Heiss as he demonstrates some tips and tricks about his personal workflow and tools that he actually uses to make life easier in Positron. This is the ultimate list of data life hacks to make your workflow soooo much nicer. Check out Andrew's blog post here to follow along with the tools he mentions: https://andhs.co/dsl\n\nHosting crew from Posit: Libby Heeren, Isabella Velasquez\n\nAndrew's Website: https://www.andrewheiss.com/\nAndrew's Bluesky: https://bsky.app/profile/andrew.heiss.phd\nAndrew's LinkedIn: https://www.linkedin.com/in/andrewheiss/\n\nResources from the hosts and chat:\n\n🔗 Andrew's blog post containing links to all of the tools he mentions: https://www.andrewheiss.com/blog/2026/01/13/dsl-positron-workflow/\n🔗 Open VSX Registry: https://open-vsx.org/\n🔗 DataPasta: https://milesmcbain.github.io/datapasta/\n🔗 Pastum (like datapasta for Positron): https://open-vsx.org/extension/atsyplenkov/pastum\n🔗 Positron Project docs: https://positron.posit.co/migrate-rstudio-rproj.html\n🔗 Garrick's data science extension bundle package: https://github.com/gadenbuie/positron-plus-1-e\n🔗 Emil's keyboard shortcut blog post: https://emilhvitfeldt.com/post/positron-key-bindings/\n🔗 Native Tabs for Mac: https://lucasprag.com/posts/underrated-vscode-feature-native-tabs/\n🔗 Andrew's posit::conf(2025) Talk: https://youtu.be/UCloM4GcfVY\n🔗 Arc browser that Andrew is using: https://arc.net/\n🔗 Andrew's YAML headers he sets up using espanso: https://github.com/andrewheiss/espanso/blob/52da6c43c6d1ebaf3231770b1b66971d1dfb374a/match/markdown-pandoc-quarto.yml#L118\n\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nThe Lab: https://pos.it/dslab\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for learning with us! 💛\n\nTimestamps:\n00:00 Introduction \n01:50 Switching to Positron full-time \n03:19 Extensions in Positron \n04:44 How to evaluate if an extension is safe \n07:05 Air extension (auto-formatting) \n08:21 Better Comments extension \n10:15 Moving the Activity Bar \n12:20 Pastum extension (DataPasta equivalent) \n14:26 Rainbow CSV extension \n15:34 Spell Right extension \n17:34 Managing projects in Positron vs RStudio \n20:18 \"Do you know if there are extensions... that will conditionally format cells?\" \n20:40 \"Do you explicitly add a dot here file?\" \n21:44 Project Manager extension \n25:34 \"How did you discover all of these?\" \n26:38 \"How is GitHub integrated into Positron?\" \n29:10 Peacock extension \n31:16 The Connections pane \n36:38 \"When I change the Peacock color, it's changing colors for everything.\" \n37:59 \"Does he use any DuckDB extensions?\" \n39:05 Raycast 43:35 Raycast scripts \n44:30 NotebookLM \n45:31 \"Is there a hack to manage a repo that is both a project and an R package?\" \n48:00 Espanso \n53:15 \"Is Raycast a replacement for Spotlight and Bartender?\" \n54:00 \"Is there an easy way to see all of the shortcuts?\""
