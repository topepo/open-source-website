slug = "2025-04-28_gaining-trust-driving-change-victoria-l-prince-data-science-hangout"
date = "2025-04-28T19:00:47Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you! \n\nWe were recently joined by Dr. Victoria L. Prince, Senior Manager of Statistics at Takeda Pharmaceuticals, to chat about career paths for statisticians, navigating career transitions, building foundational knowledge, and earning respect and influence in the workplace.\n\nIn this Hangout, we explore Dr. Prince's journey transitioning from academia to the pharmaceutical industry. Dr. Victoria L. Prince is a statistician and data scientist with 15 years of experience spanning academia and industry.\n\nDon't miss this hangout if you're interested in gaining trust and driving change (for example, adopting R or Python) in your org. Dr. Prince discussed her deliberate effort to become an unofficial go-to person for questions about R across different parts of her company. She learned through trial and error that gaining trust involves understanding your strengths and adding value to others' lives by being generous with your knowledge. She achieved this by volunteering her expertise, not saying no to help requests unless in a complete time crunch, and openly sharing information. She believes that as you share, people share back, which enriches your own knowledge. She also mentioned making herself more visible by organizing and sending invitations to R workshops. Consequently, colleagues would recognize her name and connect it to \"R\" when they saw it. \n\nResources mentioned in the video and zoom chat:\n🔗 Victoria Prince on LinkedIn → https://www.linkedin.com/in/viktoriialiublinska/\n🔗 Takeda Pharmaceuticals Careers → https://jobs.takeda.com/\n🔗 Statistics courses on edX → https://www.edx.org/learn/statistics\n🔗 ShinyConf website → https://www.shinyconf.com/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the varied titles for entry-level data roles across different organizations. Libby asked attendees to share the entry-level data person job title at their organization and attendees shared all kinds of titles, including: \"specialist\", \"strategy and planning analyst\", \"associate\", \"data analyst\", \"Statistical Programmer I\", \"Biostatistician I\", \"Data Architect\" (in a small organization), \"Staff 1\", \"Intern\", \"Policy & Planning Analyst I\", \"Graduate analyst\", and \"Associate Scientist\". This just shows the importance of understanding the actual responsibilities behind a job title when exploring opportunities, as job names can be deceiving. Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co/\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
