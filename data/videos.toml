url = "https://www.youtube.com/watch?v=W_a80br7t2A"
title = "Quarto Live: WebAssembly powered data science learning | pyOpenSci"
slug = "2025-02-28_quarto-live-webassembly-powered-data-science-learning-pyopensci"
date = "2025-02-28T17:19:50Z"
description = "🚀 How Quarto Live Brings Code to Life in the Browser! 🌍✨\n\nQuarto Live takes interactive coding & publishing to the next level with WebAssembly-powered execution—run Python & R right in the browser, no setup needed!\n\n🔹 Real-time code execution without servers 🖥️⚡\n🔹 Dynamic exercises & instant feedback for learners 📚💡\n🔹 Full integration with Quarto for publishing & sharing 🌐\n🔹 Works on any device—even mobile! 📱\n\nWatch as George Stagg (Posit) who develops and works on Quarto Live breaks down how it works & why it matters!\n\n-----------------------------\nCHAPTERS\n00:00:00 Intro\n00:01:00 What is Quarto? \n00:03:15 Add functionality to Quarto with extensions  \n00:03:30 Quarto and other interactive technologies like pyodide and web assembly\n00:06:03 Web assembly powers interactive data science in the browser\n00:07:53 How to use Quarto Live to create your own online interactive data science environment with Quarto \n00:13:24 Create interactive data science enviornments for mobile  \n00:14:27 Demo interactive data science activities using quarto and quarto live\n00:16:38 Wrap up and summary!\n\n--------------------------------\npyOpenSci makes learning open source and open science concepts easier. \n\n📦 LEARN PYTHON PACKAGING\nBuild a pure Python package tutorial: https://www.pyopensci.org/python-package-guide/tutorials/intro.html\nExplore packaging tools & best practices:  https://www.pyopensci.org/python-package-guide/\n\n🤝 SCIENTIFIC PYTHON SOFTWARE REVIEW \n📚Learn how peer review works: https://www.pyopensci.org/software-peer-review/\n🔍 Check out our peer-reviewed packages: https://www.pyopensci.org/python-packages.html\n🔭 We partner with the Journal of OpenSource Software and other communities - learn more: https://www.pyopensci.org/software-peer-review/partners/scientific-communities.html\n\n🔍 Get Involved\n\n📥 Submit your packagei for review: https://github.com/pyopensci/software-submission/\n👩🏽‍⚖️ pyOpenSci governance: https://www.pyopensci.org/governance/\n\n🌍Connect with pyOpenSci  \n🌐 pyopensci.org\n🦣 fosstodon.org/@pyOpenSci\n🦋 bsky.app/profile/pyopensci.bsky.social\n🔗 www.linkedin.com/company/pyopensci\n\n💜 ABOUT pyOpenSci 💜\npyOpenSci is an inclusive and vibrant community of practice that breaks down technical and social open source barriers. promotes open and reproducible research through peer-review of scientific Python packages. Through peer review, education, and community support, we help make scientific Python software more accessible, citable, and impactful.\n\n🔗 Join our community & level up your open source game and support open science!🔥\n\n#pyopensci #opensource #openscience"
