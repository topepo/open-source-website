[[videos]]
url = "https://www.youtube.com/watch?v=GoDtWHBJ8WE"
title = "Posit Meetup | Ryan Derickson, VA | Collecting & Acting on Employee Engagement with Shiny"
slug = "2022-09-06_posit-meetup-ryan-derickson-va-collecting-acting-on-employee-engagement-with-shiny"
date = "2022-09-06T17:00:58Z"
description = "Led by Ryan Derickson, Veterans Affairs\nShiny Executive Dashboards in VA\n\n1:46 - Start of presentation\n3:34 - The data used for the application\n5:18 - Executives need to know how to help and what to watch out for (AES Exec Dashboard briefs ~2,000 people)\n9:08 - Shiny app (Exec dashboard) demo\n12:20 - Storytelling within the application\n19:22 - Q&A: Is the url available? This is an internal app for VA behind our firewall, so external users aren't able to access \n19:33 - Q&A: My employer would like their data source reference daily, is Shiny the recommended method? \nA: We have large single efforts (annual survey) rather than continuously updated data, but I've seen really effective use cases of that. It depends a lot on how the data is stored and that you can access it through API or database.\n20:24 - Q&A: Is there any concern from IT regarding open source tools? \nA: There is inertia to overcome. You need executive sponsorship to be able to say why the ultimate outcome matters. IT cares about security and maintainability, not the details of the app. A leader who has sway with IT leadership can help them in seeing the value. In VA, there is a really detailed process to go through to get on our federal Azure space, which is slow but you do get there eventually.\n21:51 - Q&A: What has been your experience with R and VA? \n23:22 - Q&A: Are there limitations on the packages used?\n23:44 - Employee engagement & burnout communicated through the app\n29:01 - Q&A: How many people are using the app at one time?\n30:15 - Q&A: Is the UI done with bslib or javascript and css?\n30:49 - Q&A: Where can we learn more about the click and drill-down interface function?\n41:20 - Q&A: How long did it take to get the app up and running?\n43:22 - Q&A: What was the process for designing the UI?\n45:38 - Q&A: What is the return on investment for the VA?\n47:00 - Q&A: What would you recommend for learning Shiny?\n50:27 - Q&A: For other public sector employees making the case for open source, is there other advice you have?\n\nAbstract:\nData analysis and visualization is becoming increasingly accessible, yet the difficulty in translating data into action often remains persistent. VA has adopted an integrated approach to collecting & acting on employee engagement data, with a (robust) Shiny app as the centerpiece for the executive-focused portion of that approach. This talk will cover that approach, demonstrate the app, and discuss organizational and service improvements that have followed. \n\nSpeaker Bio:\nRyan Derickson leads VA's quantitative approach to improving employee engagement, primarily through feedback and related outcome data."
