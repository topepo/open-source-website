date = "2025-05-28T23:01:29Z"
description = "When we think of LLMs (large language models), usually what comes to mind are general purpose chatbots like ChatGPT or code assistants like GitHub Copilot. But as useful as ChatGPT and Copilot are, LLMs have so much more to offer—if you know how to code. In this demo Joe Cheng will explain LLM APIs from zero, and have you building and deploying custom LLM-empowered data workflows and apps in no time.\n\nPosit PBC hosts these Workflow Demos the last Wednesday of every month. To join us for future events, you can register here: https://posit.co/events/\n\n✨ Slides: https://jcheng5.github.io/workflow-demo/\n✨ GitHub repo: https://github.com/jcheng5/workflow-demo\n\nResources shared during the demo:\n✨ Ellmer https://ellmer.tidyverse.org/\n✨ Chatlas https://posit-dev.github.io/chatlas/\n\nEnvironment variable management:\n✨ For R: https://docs.posit.co/ide/user/ide/guide/environments/r/managing-r.html#renviron\n✨ For Python https://pypi.org/project/python-dotenv/\n\nShiny chatbot UI:\n✨ For R, Shinychat https://posit-dev.github.io/shinychat/\n✨ For Python, ui.Chat https://shiny.posit.co/py/docs/genai-inspiration.html\n\nDeployment\n✨ Cloud hosting https://connect.posit.cloud\n✨ On-premises (Enterprise) https://posit.co/products/enterprise/connect/\n✨ On-premises (Open source) https://posit.co/products/open-source/shiny-server/\n\nQuerychat\n✨ Demo: https://jcheng.shinyapps.io/sidebot/\n✨ Package: https://github.com/posit-dev/querychat/\n\nIf you have specific follow-up questions about our professional products, you can schedule time to chat with our team: pos.it/llm-demo"
