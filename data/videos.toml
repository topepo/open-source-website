[[videos]]
url = "https://www.youtube.com/watch?v=PITfti4JRiU"
title = "Joshua Cook - Quarto: A Multifaceted Publishing Powerhouse for Medical Researchers"
slug = "2024-10-31_joshua-cook-quarto-a-multifaceted-publishing-powerhouse-for-medical-researchers"
date = "2024-10-31T13:56:27Z"
description = "Traditional medical research dissemination is slow and cumbersome, often culminating in a diverse array of outputs: reports for our sponsors and regulators, manuscripts for peer-reviewed journals, summaries for online platforms, and presentations for conferences. However, it takes a great deal of time and effort to organize all these outputs so that our findings can enter the patient setting. Quarto can change that. It's a tool that lets us efficiently create various polished formats from a single source while meeting diverse submission requirements. This talk will showcase how Quarto can revolutionize our communication, making research more impactful and speeding up the delivery of treatments to our patients.\n\nTalk by Joshua J. Cook\n\n\nSlides: https://1drv.ms/u/s!Aqkk_opBQPkyjOQ79CnnFHt8zPio-Q?e=5d9Xpq\nGitHub Repo: https://github.com/jjc54/posit_2024_quarto_presentation"
