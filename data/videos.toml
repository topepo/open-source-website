[[videos]]
url = "https://www.youtube.com/watch?v=l9lrRhFZs8Y"
title = "Oliver Bridges - Smart DCC | Energy Meetup | RStudio"
slug = "2021-08-06_oliver-bridges-smart-dcc-energy-meetup-rstudio"
date = "2021-08-06T16:34:33Z"
description = "Navigating the Analytics Journey at Smart DCC\nPresentation by Oliver Bridges\n\nAbstract:\nThis talk will highlight the journey we have been (and still are) on that took us from outsourcing our analytics, to running some basic SQL and using graphical-based visualization tools, to open-source RStudio, and eventually to RStudio Team.\n\nOur evolution has been shaped by the huge volumes of data and demands from our customers that really led us to RStudio. While none of us are defined as data scientists, rather data engineers, our whole team has been on this journey with us and we're continually learning as we go.\n\nFrom creating our own packages, APIs, pins, and Shiny dashboards we have now created workflows that allow us the deal with 10s of millions of records of aggregated data. As you start (or continue) on your own journey, I'd love to help share what we've learned along the way.\n\nBio:\nOliver Bridges is the Head of Data Science and Analytics at Smart DCC, designing and now managing a team of 15. Ollie has 15 years of experience in telecommunication and 10 years in smart metering. He has worked all around the world, including Cape Town, Copenhagen, Sydney, Amsterdam, Brussels, Dublin, and the UK. Ollie lives in Cornwall UK, and has worked remotely since the start of the pandemic, but before that worked in Manchester (about 300 miles from my house). In his spare time, he loves sport and coding!\n\nSmart DCC's mission is to help digitise Britain’s energy network, and make a critical contribution in the effort to achieve net-zero greenhouse gas emissions, and improve the nation’s connectivity"
