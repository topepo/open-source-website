description = "The marginaleffects package for R and Python offers a single point of entry to easily interpret over 100 types of models using a simple and consistent interface. Marginaleffects has become an indispensable tool for moving away from tables of regression coefficients and towards easily interpretable estimates. In addition to making regression models more interpretable, marginaleffects offers flexible plotting tools, efficient implementations, validated results against Stata, and a thoroughly documented website abundant with examples and vignettes. \n\n This talk is for data scientists and data analysts who analyze data with regression models. We’ll cover how to estimate and visualize a variety of effect summaries with marginaleffects.\n\nTalk by Demetri Pananos\n\nWebsite: https://marginaleffects.com/\nR CRAN: https://cran.r-project.org/web/packages/marginaleffects/index.html\nPython: https://marginaleffects.com/vignettes/get_started.html"
