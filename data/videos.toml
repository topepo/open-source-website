[[videos]]
url = "https://www.youtube.com/watch?v=1Bxk2wReFzE"
title = "Ellis Hughes | R Package Validation Framework | Posit"
slug = "2021-03-17_ellis-hughes-r-package-validation-framework-posit"
date = "2021-03-17T16:00:00Z"
description = "From rstudio::global(2021) Pharma X-Sessions, sponsored by ProCogia: in this talk I discuss the process developed for validating internally generated R packages at SCHARP (Statistical Center for HIV/AIDS Research and Prevention) - the R Package Validation Framework. I cover the elements of the framework and basics of applying it with some examples. By using tools native to the R package building infrastructure, validation can become an integrated part of your package development, improving the quality of both the package and validation.\n\nAbout Ellis Hughes:\nI am a statistical Programmer at Fred Hutch Cancer Research Center where I work on a team that evaluates potential HIV vaccine candidates. Having graduated from Washington State University with a degree in Bioengineering, I found a passion for programming in R. I now organize the Seattle UseR group, and enjoy building packages to automate my workflows.\n\nLearn more about the rstudio::global(2021) X-Sessions: https://blog.rstudio.com/2021/01/11/x-sessions-at-rstudio-global/"
