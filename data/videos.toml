[[videos]]
url = "https://www.youtube.com/watch?v=yvi5uXQMvu4"
title = "Welcome to Quarto Workshop! | Led by Tom Mock, RStudio"
slug = "2022-08-09_welcome-to-quarto-workshop-led-by-tom-mock-rstudio"
date = "2022-08-09T18:33:02Z"
description = "Welcome to Quarto 2-hour Workshop | Led by Tom Mock, RStudio\n\nContent website: https://jthomasmock.github.io/quarto-2hr-webinar/\nFULL Workshop Materials (this was from a 2-day workshop): rstd.io/get-started-quarto\nOther upcoming live events: rstd.io/community-events\n\n✅ Double-check: Are you on the latest version of RStudio i.e. v2022.07.1 or later?\n\n📦 Packages used: tidyverse, gt, gtExtras, reactable, ggiraph, here, quarto, rmarkdown, gtsummary, palmerpenguins, fs, skimr\n\n☁️ Pre-built RStudio Cloud with workshop materials already installed: https://rstudio.cloud/content/4332583\n\nFor follow-up questions, please use: community.rstudio.com/tag/quarto\n\nTimestamps:\n7:16 - What is Quarto?\n8:28 - How does R Markdown work?\n9:40: Quarto, more than just knitr\n13:56 - Quarto can support htmlwidgets in R and Jupyter widgets for Python/Julia\n14:18 - Native support for Observable Javascript\n19:28 - Quarto in your own workspace (Jupyter Lab, VSCode, RStudio)\n20:26 - RStudio Visual Editor mode\n23:30 - VS Code YAML\n26:02 - Quarto for collaboration\n26:55 - How do you publish Quarto? (Quarto Pub, GitHub Pages, RStudio Connect, Netlify)\n28:44 - What about Data Science at Work?\n29:59 - Formats baked into Quarto (basic formats, beamer, ppt, html slides, advanced layout, cross references, websites, blogs, books, interactivity)\n32:13 - What to do with my existing .Rmd or .ipynb?\n33:16 - Why Quarto, instead of R Markdown?\n40:50 - Text Formatting\n41:30 - Headings\n41:51 - Code (also merging R and Python in one document)\n43:29 - What about the CLI?\n44:55 - Navigating in the terminal\n57:56 - PART 2: Authoring Quarto\n1:00:22 - Output options\n1:04:46 - Quarto workflow\n1:12:06 - Quarto YAML intelligence\n1:13:20 - Divs and Spans\n1:22:13 - Figure layout\n1:34:40 - Code chunk options\n1:41:00 - Quarto and R Markdown (converting R Markdown to Quarto)\n\nThis 2-hour virtual session is designed for those who have no or little prior experience with R Markdown and who want to learn Quarto.\n\nWant to get started with Quarto?\n- Install RStudio v2022.07.1 from https://www.rstudio.com/products/rstudio/download/#download - this will come with a working version of Quarto!\n- Webinar materials/slides: https://jthomasmock.github.io/quarto-2hr-webinar/\n- Workshop materials on RStudio Cloud: https://rstudio.cloud/content/4332583\n\nWhat is Quarto? \n\nQuarto is the next generation of R Markdown for publishing, including dynamic and static documents and multi-lingual programming language support. With Quarto you can create documents, books, presentations, blogs or other online resources.\n\nShould I take this?\n\nAs with all the community meetups, everyone is welcome. This will be especially interesting to you if you have experience programming in R and want to learn how to take advantage of Quarto for literate data science programming in academia, science, and industry.\n\nThis workshop will be appropriate for attendees who answer yes to these questions:\n\nHave you programmed in R and want to better encapsulate your code, documentation, and outputs in a cohesive “data product”?\nDo you want to learn about the next generation of R Markdown for data science?\nDo you want to have a better interactive experience when writing technical or scientific documents with literate programming?\n\nFor more info on Quarto: quarto.org"
