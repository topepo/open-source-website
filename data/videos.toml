[[videos]]
url = "https://www.youtube.com/watch?v=RcwvG7dtMqU"
title = "{shinylive}: Serverless Shiny Apps | Barret Schloerke | Posit"
slug = "2024-06-06_shinylive-serverless-shiny-apps-barret-schloerke-posit"
date = "2024-06-06T20:47:48Z"
description = "In the rapidly evolving landscape of web technologies, the integration of R (and Python) with modern web frameworks has become increasingly important for data scientists and developers. This presentation introduces {shinylive}, a new R package that exports Shiny applications to be run within statically hosted websites. We will explore the capabilities of {shinylive} through its use of the innovative R package {webR}, which allows for the execution of R code in the browser (via WebAssembly and service workers) without the need for a centralized server.\n\nThe presentation will cover the technical foundation of {shinylive}, including its architecture and the integration process with Quarto documents. We will also discuss the practical aspects and drawbacks of exporting Shiny apps with {shinylive}, highlighting the ease of exporting apps to a folder for local use or hosting them on GitHub pages.\n\n{shinylive} bridges the gap between Shiny and static websites, making it a valuable resource for interactive data analysis and presentation.\n\nLink to app: https://schloerke.com/presentation-2024-04-18-appsilon-shinylive/\nLink to script: https://github.com/posit-dev/r-shinylive/blob/main/examples/deploy-app.yaml\nLink to use_github_action(): https://github.com/posit-dev/r-shinylive#github-pages\nShinylive website: https://posit-dev.github.io/r-shinylive/\n{webr} docs: https://docs.r-wasm.org/webr/latest/"
