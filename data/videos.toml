[[videos]]
url = "https://www.youtube.com/watch?v=oxiLzbBud2k"
title = "Integrating Shiny with Epic EHR | Matt Maloney | Data Science Hangout"
slug = "2026-01-15_integrating-shiny-with-epic-ehr-matt-maloney-data-science-hangout"
date = "2026-01-15T00:01:03Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Matt Maloney, Director of Applied AI and Data Science at City of Hope, to chat about applying data science to cancer care operations, integrating open source data science tools like Shiny with Electronic Health Records (like Epic), and the evolving governance of generative AI in healthcare.\n\nIn this Hangout, we explore the technical and operational strategies behind integrating custom data science applications directly into clinical workflows. Matt discusses how his team moves beyond standalone tools by embedding Shiny apps and other solutions into Epic, allowing medical coders and providers to access predictions and summaries without leaving their primary software environment-of-choice. He also mentions the \"build vs. buy\" decision-making process as vendors release their own AI solutions, emphasizing the importance of validating external models against their specific patient population.\n\nResources mentioned in the video and zoom chat: \n🔗 City of Hope → https://www.cityofhope.org \n🔗 Unity Health Toronto Customer Story → https://posit.co/about/customer-stories/unity-health-toronto/ \n🔗 pointblank (Data Validation package) → https://rstudio.github.io/pointblank/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about *where* data science teams sit within community members' organizations and whether they like it or not, specifically the pros and cons of being housed within IT versus embedded inside business units. Participants debated access to infrastructure versus proximity to business stakeholders, with several sharing their own experiences of shifting between these departments (or between companies with different structures). Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n03:37 \"What does the data science function at City of Hope help with?\" \n08:52 \"Tell us a little bit more about how you're integrating Posit with Epic\" \n16:08 \"How do you handle the needs of privacy with the push to adopt AI?\" \n18:40 \"How do you manage to stay abreast of technical advancements?\" \n22:45 \"At what point do you hand off your data work to the software engineering team?\" \n27:23 \"How much has development that involves LLMs and generative AI taken hold?\" \n30:38 \"Does your team evaluate a lot of the things that Epic might be throwing your way?\" \n34:41 \"How does Epic pass an encounter number or a patient ID to Posit Connect?\" \n35:57 \"How does your team handle these nuanced pieces of clinical information?\" \n40:29 \"Do the administrators appreciate the time that it takes to do things?\" \n44:22 \"What happens in the academic division?\" \n46:10 \"Do you have a piece of career advice for us?\""
