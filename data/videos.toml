[[videos]]
url = "https://www.youtube.com/watch?v=ErBZL-AogXU"
title = "Sports analytics, baseball metrics, and Shiny apps  | Brian Chase | Data Science Hangout"
slug = "2025-08-20_sports-analytics-baseball-metrics-and-shiny-apps-brian-chase-data-science-hangout"
date = "2025-08-20T18:22:00Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Brian Chase, Vice President of Baseball Systems at the Miami Marlins, to chat about the role of baseball systems and data analytics in professional sports, leveraging technology and hardware for player performance and team strategy, the evolution of sports analytics since the \"Moneyball\" era, and career insights for breaking into niche industries (like baseball!).\n\nIn this Hangout, we explore how the Miami Marlins leverage advanced technology and data analytics to enhance player performance and team strategy. Brian details the use of innovative hardware like the Trajekt robotic pitching machine that allows batters to practice against simulated versions of opposing pitchers with exact spin rates and velocities. He also discusses the Hawkeye cameras and other systems, which capture real-time player and ball tracking data, including bio-mechanical information, using 12 cameras at LoanDepot Park. This extensive data is then platformed in tools like Snowflake and Google Cloud for analysis. The team also utilizes wearables to track bat speed and other metrics. Insights are delivered to coaches and players through pre-game and post-game reports and dashboards, often built using Posit Connect and Shiny apps, which helps translate complex data into easily digestible stories.\n\nResources mentioned in the video and zoom chat: \n🔗 Miami Marlins Job Opportunities → https://www.teamworkonline.com/baseball-jobs/miamibaseball/miami-marlins \n🔗 Technology & AI Magazine Feature on Miami Marlins → https://technologymagazine.com/brochure/miami-marlins-using-ai-to-accelerate-competitive-sport \n🔗 Trajekt Sports (Trajekt pitching machine) → https://www.trajektsports.com/ \n🔗 MIT Sloan Sports Analytics Conference → https://www.sloansportsconference.com/ \n🔗 Astroball by Ben Reiter → https://www.porchlightbooks.com/products/astroball-ben-reiter-9780525576648\n🔗 The MVP Machine by Ben Lindbergh and Travis Sawchik → https://www.sandmanbooks.com/book/9781541698925?srsltid=AfmBOorVPNYGMdhNFsiaUfJ2N88em1qiGfEf6Kok5Z3LmaREs-Iv25ac\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about mascots! Libby shared her love for mascots, especially the San Antonio Missions \"puffy taco\". Attendees chimed in, sharing their favorite team mascot pics - you really have to be there live to appreciate all the fun in the chat!!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction\n00:55 \"Tell us a little bit about what you do and how you got here?\" \n09:15 \"How did you get your foot in the door for an MLB job?\" \n14:02 \"What coding languages, tools, and systems do your teams work with the most?\" \n19:35 \"What does data analytics have to do with baseball hardware?\" \n23:51 \"What do pre-game and post-game reports look like, and how do you use Shiny?\" \n26:39 \"How do you measure ROI for technologies, and how do you get buy-in?\" \n30:41 \"How has stats analytics evolved since the Moneyball era?\" \n34:25 \"Is qualitative analysis still used alongside quantitative data from scouts?\" \n35:27 \"Who will play you in the future of Moneyball 2?\" \n36:27 \"Will AI benefits plateau if all teams have similar access to tools and data?\" \n40:22 \"Are you measuring off-field factors like sleep, nutrition, and injuries in your models?\" \n42:57 \"What's the thought process behind developing new features and actionable metrics in sports analytics?\" \n47:53 \"What might someone be surprised by when turning a hobby into a job?\" \n50:40 \"Did you ever feel discouraged during your 4-year job search?\" \n50:50 \"Was getting your MBA worth it for your career in sports?\""
