url = "https://www.youtube.com/watch?v=fCLw_XgaWsk"
title = "Hackathons for education, not competition | Allissa Dillman | Data Science Hangout"
slug = "2026-02-18_hackathons-for-education-not-competition-allissa-dillman-data-science-hangout"
date = "2026-02-18T15:01:09Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Allissa Dillman, Founder and CEO at Biodata Sage LLC, to chat about her transition from NIH to entrepreneurship, the importance of social learning and community in coding (Libby's favorite topic!!), organizing hackathons for education rather than just competition, and strategies for networking regardless of whether you are an introvert or an extrovert.\n\nIn this Hangout, we explore the power of social learning and community. Allissa discusses why she believes we learn and grow more confidently when working with others rather than in isolation, noting how shared struggles can actually help overcome imposter syndrome. She also shares her philosophy on running hackathons that prioritize networking and experiential learning over high-pressure competition, and talks about how she navigated the leap from a stable job to starting your own business.\n\nResources mentioned in the video and zoom chat: \n🔗 Allissa’s posit::conf(2025) Talk: From Solo to Social → https://youtu.be/HP3VfGkHQ1c \n🔗 How to network in a non-slimy way (Article by Ted Laderas shared in the chat) → https://laderast.github.io/articles/2021-09-13-how-to-network-in-a-non-slimy-way/how-to-network-in-a-non-slimy-way.html \n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the dynamics of introverts versus extroverts in networking. Attendees discussed the benefits of finding a friendly neighborhood extrovert to help navigate conferences and even proposed the idea of \"willing to adopt an introvert\" stickers for future events. Would you be open to buddying up with an introvert at conf? Would you like an extrovert friend to adopt you?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction\n04:11 \"Recap what you talked about at posit::conf\" \n07:58 \"What would you say are the largest challenges of setting out on your own as an entrepreneur?\" \n11:47 \"How did you make that transition from NIH to entrepreneurship smoothly?\" \n16:01 \"What were some of your wins at NIH?\" \n19:15 \"Could you expand a little bit on your work at NIH?\" \n22:45 \"Any advice for introverts on networking?\" \n26:45 \"Any tips on standing up those little community based groups within organizations?\" \n32:17 \"What are some of the success stories that you've had with helping communities learn to code?\" \n35:23 \"What conditions were met for you to feel comfortable bringing someone on as an employee?\" \n40:12 \"How do you go from having connections to clients without experiencing much friction?\" \n45:18 \"Do you market yourself on purpose?\" \n49:05 Rapid Fire: \"Have you used tidy models in your work?\" \n49:18 Rapid Fire: \"Was there a specific moment where you decided to turn your boss/colleagues into your clients?\" \n49:54 Rapid Fire: \"Are there things you miss about the NIH?\" \n51:05 \"When you organize hackathons, how do you ensure the well-being of participants and make it a fun experience?\" \n52:45 \"Do you have a piece of career advice for us?\""
