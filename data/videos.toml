[[videos]]
url = "https://www.youtube.com/watch?v=vIiQJY5V__E"
title = "Daniela Garcia & Julieta Nieva | R en la Administración Pública & R Markdown | RStudio"
slug = "2021-12-13_daniela-garcia-julieta-nieva-r-en-la-administracion-publica-r-markdown-rstudio"
date = "2021-12-13T13:41:55Z"
description = "R en la Administración Pública & informes de técnicas psicométricas con R Markdown | RStudio\n\nThank you to Sergio Garcia Mora for hosting this meetup.\n\nR en la Administración Pública: Cuando la Big Data te empuja a salir de la zona de confort\nDaniela Garcia\n\nAbstract:\nMuchas veces no tenemos motivación para programar debido a que el Excel lo resuelve todo fácilmente, sin embargo, cuando en mi trabajo nos solicitaron información detallada y actualizada sobre puestos y costos laborales de cada escuela de nuestra provincia (más de 2.000) era aprender o morir en el intento.\n\nEn esta presentación veremos como a través de R automatizamos un reporte para toma de decisiones gubernamentales con gran precisión y escaso esfuerzo.\n\nBio:\nDaniela García, Lic. en Relaciones Laborales, Analista de Datos de la Dirección General de Personal - Ministerio de Hacienda y Finanzas Corrientes, Argentina. Scrum Master en Starter - Consultora en Tecnología e Innovación. Colaboradora activa del Club de R para Recursos Humanos.\nhttps://www.linkedin.com/in/claudiadanielagarcia/\n\nR Markdown aplicado a informes de técnicas psicométricas\nJulieta Nieva\n\nAbstract:\nLos psicólogos que realizamos investigación podemos tener algunas limitaciones a la hora de dar devoluciones personalizadas a los participantes voluntarios de nuestros proyectos. Poder analizar gran cantidad de datos, procesarlos rápidamente y poder ahorrar horas de trabajo manual, hicieron que R Markdown se convierta en nuestro aliado. En la presentación se explicará cómo utilizamos estas herramientas en el International Cognitive Research Consortium y cuáles fueron nuestros resultados.\n\nBio:\nJulieta Nieva, Licenciada en Psicología. UX Researcher en Banco Galicia. Investigadora en ICRC.\nhttps://www.linkedin.com/in/julieta-nieva/"
