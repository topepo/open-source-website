[[videos]]
url = "https://www.youtube.com/watch?v=5gqksthQ0cM"
title = "Jenny Bryan | Help me help you: creating reproducible examples | RStudio (2018)"
slug = "2021-04-03_jenny-bryan-help-me-help-you-creating-reproducible-examples-rstudio-2018"
date = "2021-04-03T16:00:05Z"
description = "What is a reprex? It’s a reproducible example. Making a great reprex is both an art and a science and this webinar will cover both aspects. A reprex makes a conversation about code more efficient and pleasant for all. This comes up whenever you ask someone for help, report a bug in software, or propose a new feature. The reprex package (https://reprex.Tidyverse.org) makes it especially easy to prepare R code as a reprex, in order to share on sites such as https://community.rstudio.com, https://github.com, or https://stackoverflow.com. The habit of making little, rigorous, self-contained examples also has the great side effect of making you think more clearly about your programming problems.\n\nWebinar materials: https://rstudio.com/resources/webinars/help-me-help-you-creating-reproducible-examples/\n\nAbout Jenny:\nJenny is a software engineer on the tidyverse team. She is a recovering biostatistician who takes special delight in eliminating the small agonies of data analysis. Jenny is known for smoothing the interfaces between R and spreadsheets, web APIs, and Git/GitHub. She’s been working in R/S for over 20 years and is a member of the R Foundation. She also serves in the leadership of rOpenSci and Forwards and is an adjunct professor at the University of British Columbia."
