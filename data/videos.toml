[[videos]]
url = "https://www.youtube.com/watch?v=FI2wYLR_4pA"
title = "RStudio Pro Product Lightning Series Meetup ⚡️"
slug = "2022-10-11_rstudio-pro-product-lightning-series-meetup"
date = "2022-10-11T17:11:30Z"
description = "Recording from our October 11th meetup: a lightning series with our RStudio Product Managers to hear what's new, ask questions, and provide feedback.\n\nLightning talks:\n3:16 - Sharing Internal Packages with RStudio Package Manager\n18:07 -  Running RStudio workloads in the Cloud with Amazon SageMaker\n40:02 - Content execution in Kubernetes with RStudio Connect\n\nResources and links shared during the meetup:\n🖇 A Package Manager demo tutorial on GitHub: https://github.com/rstudio/package-manager-demo\n🖇 Remote API Quickstart: https://docs.rstudio.com/rspm/admin/getting-started/configuration/#quickstart-remote-cli\n🖇 Differences between RStudio Workbench and RStudio Workbench on SageMaker: https://docs.aws.amazon.com/sagemaker/latest/dg/rstudio.html#rstudio-differences\n🖇 RStudio Workbench release notes: https://www.rstudio.com/products/rstudio/release-notes/\n🖇 Remote Content Execution with RStudio Connect and Kubernetes Conference talk: https://www.rstudio.com/conference/2022/talks/remote-content-execution-rstudio-connect/\n\nProduct Links:\nPackage Manager, control and distribute packages throughout your organization: https://www.rstudio.com/products/package-manager/\nWorkbench, premiere development environment for data science professionals: https://www.rstudio.com/products/workbench/\nConnect, easily share your insights: https://www.rstudio.com/products/connect/\n\nTimestamps:\n22:43 - Demo of RStudio Workbench on Amazon SageMaker\n\nSharing Internal Packages with RStudio Package Manager | Presented by Joe Roberts\n\nMany know that RSPM can be used to mirror public packages from CRAN or PyPI, but it can also be used to share your private, internally developed packages.  We'll explore the latest features to make internal packages easier to deploy within your organization.  \n\nRunning RStudio workloads in the Cloud with Amazon SageMaker | Presented by James Blair\n\nRStudio Workbench on SageMaker enables users to “right-size” their environment for any given analysis. We’ll showcase how this flexibility enables users to effectively meet the workload demands of various analyses.\n\nContent execution in Kubernetes with RStudio Connect | Presented by Kelly O'Briant\n\nNew and interesting ways to configure RStudio Connect: A quick introduction to off-host content execution in Kubernetes\n\nWe're looking forward to learning from you and hearing your feedback as well! \n\nMeetup recordings are always shared here: https://www.youtube.com/playlist?list=PL9HYL-VRX0oRKK9ByULWulAOO5jN70eXv"
