description = "Ripples of Change with R: It’s more than just coding\n\n💬 Speaker(s): Yvonne Kienast\n\n📝 Abstract:\n\nSwitching from SAS to R is not just a technical shift – it requires a whole new way of thinking! This journey of moving a SAS-centered coding team to R was filled with strategies, challenges, and unexpected roadblocks. Change can be frustrating, but with the right mindset and approach, it becomes an opportunity for growth and empowerment. As a forward-thinking R strategist and advocate for growth, I am excited to help you discover practical strategies to ease the transition, overcome resistance and frustration, and empower teams to embrace R with confidence. Whether you team is starting on a similar path or is struggling, I will share insights on how to navigate challenges, avoid pitfalls, and hopefully leave you with a roadmap for success. posit::conf(2025) Subscribe to posit::conf updates: https://posit.co/about/subscription-management/"
