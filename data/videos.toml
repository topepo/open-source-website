description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Josh VanderLeest, Manager of Data Analytics in People Analytics at Progressive Insurance, to chat about how he got into analytics, the uses of people analytics data, ethical concerns when using AI with employee data, and a bit of career advice, too.\n\nThis one is a must-listen if you're interested in learning about actual examples of applied people analytics. Josh gives examples of actual projects he's been involved in that aim to improve the experiences of employees, such as onboarding... and we all know that the onboarding experience can be make-or-break!\n\nResources mentioned in the video and zoom chat:\n🔗 Handbook of Regression Modeling in People Analytics by Keith McNulty → https://peopleanalytics-regression-book.org/ \n🔗 SIOP → https://www.siop.org/ \n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about ways to remember to document your accomplishments for your \"brag sheet\". Let us know below if you’d like to hear more about this topic! Many of us struggle to record our wins. Libby has been testing out using a google form to submit all of her \"brags\" easily to a google sheet and keep track of them that way.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
