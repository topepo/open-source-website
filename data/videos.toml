[[videos]]
url = "https://www.youtube.com/watch?v=PJUHRI30HBs"
title = "Jim Kloet | Garbage Data, And What To Do About Them | RStudio (2022)"
slug = "2022-10-24_jim-kloet-garbage-data-and-what-to-do-about-them-rstudio-2022"
date = "2022-10-24T17:07:59Z"
description = "No matter the requirements of the project, data are rarely ready for analysis without some intervention up front, often described as cleaning or tidying up your data. Researchers and data professionals employ many tools to make their data usable for their needs; but, there exist data that are so far beneath the threshold for usefulness that they cannot be used responsibly for analysis or decision-making, i.e. “bad data.” This talk proposes a framework for identifying bad data, with examples from both academic and industry; identifies challenges you might face from stakeholders when you identify bad data; and suggests concrete steps you can take to overcome those challenges now and in the future.\n\nSession: Generating high quality data"
