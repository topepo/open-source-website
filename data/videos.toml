date = "2022-06-22T19:03:44Z"
description = "RStudio Healthcare Meetup:\n\nTranslating facts into insights at Children's Hospital of Philadelphia\nLed by Jake Riley, data analyst at The Children's Hospital of Philadelphia\n\n✨Abstract:✨\n{headliner} is a new R package to add dynamic, insightful text to plots and reports. {headliner} generates useful talking points that users can string together using {glue} syntax. This makes it easy to write an informative sentences without adding a lot of technical debt to a project. Learn how to get started with {headliner} and ways we have used it at The Children's Hospital of Philadelphia.\n\n✨Speaker Bio:✨\nJake Riley is a data analyst at The Children's Hospital of Philadelphia. He is the author of several R packages related to data visualization and automated exploratory analysis. You can find his published work [simplecolors] and [shinyobjects] on CRAN with more packages on the way.\n\nTimestamps:\n0:49 - Start of talk\n1:25 - Dashboards focused on facts vs. insights\n2:56 - What's a good title for a chart?\n5:09 - Intro to headliner package\n7:41- using glue() under the hood\n14:04 - helpers for working with data frames: compare_conditions()\n18:41 - using ggtext\n21:27 - example using pixar_films\n23:40 - how they've used it at CHOP\n28:05 - Next steps for headliner package\n29:32 - Start of Q&A session\n\nQuestions:\n29:32 - Can you use any package you want in your organization?\n31:13 - How do you load previous datasets to compare to current datasets?\n32:48 - When you mentioned a front page on RStudio Connect (with the headlines), what is that?\n33:25 - Is anyone using this for manuscripts at CHOP now?\n36:24 - What has the adoption of R or Python been within the hospital analytics team?\n37:28 - My manager is very leery of R because of technical depth. Any suggestions for convincing her of R's value?\n42:22 - How does CHOP use R for non-clinical analysis?\n43:36 - How do you train new people to use R?\n46:28 - How do you compare last week's analysis to this week's?\n49:37 - Were there any major challenges in creating the hospital's internal package?\n\n✨Resources/links shared:✨\nJake's LinkedIn: https://www.linkedin.com/in/jake-riley-70736a3/\nheadliner package: https://github.com/rjake/headliner\nwaldo package: https://www.tidyverse.org/blog/2020/10/waldo/\nExamples of R in Life Science & Healthcare: https://www.rstudio.com/champion/life-science\nChris Bumgardner's talk on building an R-based analytic practice at Children's Wisconsin: https://youtu.be/pHZ8dsc0PhY\nsimplecolors  package to generate hex codes using uniformly named colors: https://rjake.github.io/simplecolors/\nR Packages book by Hadley Wickham & Jenny Bryan: https://r-pkgs.org/\n\n✨Meetup Links:✨\nFuture events: rstd.io/community-events-calendar\nIf anyone's interested in speaking at a future meetup, we’d love to hear from you too! rstd.io/meetup-speaker-form"
