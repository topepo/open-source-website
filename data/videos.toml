[[videos]]
url = "https://www.youtube.com/watch?v=IF-TmmEQnC8"
title = "Estimating & communicating ROI for data science projects"
slug = "2024-01-08_estimating-communicating-roi-for-data-science-projects"
date = "2024-01-08T15:15:38Z"
description = "A recurring topic in Data Science Hangouts, meetups, and 1:1 chats is the ability to estimate, measure, and communicate the Return on Investment (ROI) for data science projects to business stakeholders. A specific question was: “Are you ever asked to estimate the ROI from an analytics project before the business is willing to invest in anything?\"\n\nI asked the community if anyone had something to share on this topic, and they delivered! A special thank you to Derek Beaton, Director of Advanced Analytics at St. Michael’s Hospital and Joe Powers, Principal Data Scientist at Intuit who kicked off the group conversation last month by sharing their own experiences.\n\nTips for communicating the ROI for data science projects:\n\n✨ Engage stakeholders & identify gatekeepers\n✨ Align evaluation metrics to stakeholder objectives\n✨ Establish clear success criteria\n✨ Anticipate where things can go awry\n✨ Consistently communicate your central message\n✨ Prioritize what’s most impactful\n✨ Promote transparency while measuring project performance\n✨ Ensure the benefit is unquestionably worth the time investment\n\nAdditional ROI Resources Mentioned:\n✨ Analytics Power Hour Podcast - Estimating the Effort for Analytics Projects: https://analyticshour.io/2023/10/31/231-estimating-the-effort-for-analytics-projects/\n✨ CDO Matters Podcast with Malcom Hawker: https://open.spotify.com/show/2OJXB8v32CrKbbsv9Uq2vn\n✨ How to Measure Anything by Douglas Hubbard: https://hubbardresearch.com/7-simple-principles-for-measuring-anything/\n\nIf you want to continue conversations like this, we invite you to also join us at the Data Science Hangout every Thursday from 12-1 ET. Every week we're joined by a different data leader from the community to share their perspectives and experience. \n\nYou can add it to your calendar using this link: pos.it/dsh"
