url = "https://www.youtube.com/watch?v=liyJparRz2c"
title = "RStudio Cloud Demo with Dr. Mine Çetinkaya-Rundel"
slug = "2022-01-21_rstudio-cloud-demo-with-dr-mine-cetinkaya-rundel"
date = "2022-01-21T19:05:27Z"
description = "Much has been written in the statistics and data science education literature about pedagogical tools and approaches to provide a practical computational foundation for students. However a common friction point for getting students (and faculty) started with computing is installation and setup. Circumventing the installation and setup steps early in the course by having students access R and RStudio in the cloud can minimize frustration and improve buy in. RStudio Cloud is a lightweight and easy to set up / use solution to this problem. In this talk we will discuss pedagogical reasons for teaching computing with R on the cloud as well as share best practices and tips for setting up your learners for success on RStudio Cloud. We will also provide an opportunity for the audience to experience computing in RStudio Cloud first hand, demo its newest features, and highlight a suite of ready to use resources for teaching R to new learners.\n\nRead more in the follow-up blog post: https://www.rstudio.com/blog/teaching-data-science-in-the-cloud/"
