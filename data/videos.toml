[[videos]]
url = "https://www.youtube.com/watch?v=Rfi5sDVyngo"
title = "Data science and automation in publishing | Sophia Tee | Data Science Hangout"
slug = "2025-01-09_data-science-and-automation-in-publishing-sophia-tee-data-science-hangout"
date = "2025-01-09T13:00:30Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Sophia Tee, Senior Director of Data Science at Penguin Random House, to chat about marketing automation, the use of data science in publishing, and the transition from ID to manager in the realm of data science.\n\nIn this Hangout, we explore lots of topics, like how Sophia's team has automated the campaign creation process, reducing a two-week process to 30 minutes, while also improving campaign performance. That's pretty amazing! Needless to say, we had lots of questions. \n\nShe also had some great insights to share on the data science skills to strive for in the world of publishing as she experiences it. How organized is your code? It needs to be well-organized so that it \"can be shared and understood by a lot of different people.\" She recognizes that not all data scientists have experience productionizing models, but that it's important in her line of work to be a full stack data scientist. Communication is paramount. Sophia says, \"at the end of the day it doesn't matter how great your model is if you can't explain it. It's really hard to sell it. So, I think being able to speak in plain English about what you did, and what the outcome is, and what you expect people to do about it is really important.\" She stresses the importance of understanding the underlying data and the business context, too. Remember who you are speaking to and how your results relate to their KPIs. You'll have to listen in to hear more!\n\nResources mentioned in the video and zoom chat: \n🔗 Sophia Tee on LinkedIn → https://www.linkedin.com/in/sophia-tee-7069b65/ \n🔗 Today's Top Books at Penguin Random House → https://www.penguinrandomhouse.com/interactive/todays-top-books \n🔗 CloseRead Prize → https://posit.co/blog/closeread-prize-announcement/\n🔗 Bioinformatics Training & Education Program from the NIH → https://bioinformatics.ccr.cancer.gov/btep/\n🔗 Prefect AI workflow tool → https://www.prefect.io/controlflow\n🔗 Pixi and uv integration blog → https://prefix.dev/blog/uv_in_pixi\n\nWe also talked about book recommendations! Of course we did, this was a discussion about Penguin Random House! Here are some of the data-flavored recommendations mentioned by the community live and in the chat:\n📕 The Bayesian Hitman by Robert Kubinec: https://www.amazon.com/Bayesian-Hitman-Robert-M-Kubinec/dp/B0D6M4WNRZ\n📘 The Cult of Statistical Significance: How the Standard Error Costs Us Jobs, Justice, and Lives by Deirdre Nansen McCloskey & Steve Ziliak : https://press.umich.edu/Books/T/The-Cult-of-Statistical-Significance2\n📙  The Lady Tasting Tea: How Statistics Revolutionized Science in the Twentieth Century by David Salsburg: https://us.macmillan.com/books/9781466801783/theladytastingtea/\n\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about different perspectives and advice on transitioning from academia to industry (or the reverse!). Let us know below if you’d like to hear more about this topic.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
