[[videos]]
url = "https://www.youtube.com/watch?v=rQ8drf18MzA"
title = "Claire Bai - Translating clinical guidance to actionable insights with R"
slug = "2024-10-31_claire-bai-translating-clinical-guidance-to-actionable-insights-with-r"
date = "2024-10-31T13:56:03Z"
description = "COTA’s team of oncologists and data scientists curate real-world data used by life science companies and healthcare partners to inform drug development and patient care. Over time, we have received many of the same questions from our data users, which indicated a dire need for translating our internal clinical guidance and data model knowledge into a tool for successfully navigating our data. We developed rwnavigator, an R package that helps users easily prepare COTA data for analysis with time-to-event packages. As first-time package developers, we ran into many challenges as we created, tested, and deployed rwnavigator. We hope to share with the greater R community our motivations for developing this package and best practices we learned along the way.\n\nTalk by Claire Bai\n\n\nSlides: https://github.com/rstudio/rstudio-conf/blob/master/2024/clairebai/rwnavigator_FINAL.pptx"
