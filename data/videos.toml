url = "https://www.youtube.com/watch?v=UDGeLpiMSj4"
title = "Barret Schloerke | plumber + future: Async Web APIs | RStudio"
slug = "2021-02-18_barret-schloerke-plumber-future-async-web-apis-rstudio"
date = "2021-02-18T20:00:04Z"
description = "plumber is an R package that allows users to create web APIs by decorating R functions using roxygen2-like comments. In the latest release, asynchronous code (using future or promises) may be inserted at any stage of a plumber route execution, enabling parallel processing using multiple workers. In this talk, I will go through how you can set up your own asynchronous plumber API to leverage your full computing potential.\n\nAbout Barret:\nI specialize in Large Data Visualization where I utilize the interactivity of a web browser, the fast iterations of the R programming language, and large data storage capacity of Hadoop."
