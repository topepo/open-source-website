[[videos]]
url = "https://www.youtube.com/watch?v=s9m2mxNHZaY"
title = "Data Science Hangout | Jennifer Listman, Statespace | Culture that Helps Avoid Burnout"
slug = "2022-04-28_data-science-hangout-jennifer-listman-statespace-culture-that-helps-avoid-burnout"
date = "2022-04-28T15:30:10Z"
description = "We were joined by Jennifer Listman, Director of Research at Statespace. Jenny likes mining multidimensional datasets to find valuable unknown unknowns.\n\nOne of the questions that had a lot of people sharing in the chat as well was:\n\n\"\"How do you ensure a work-life balance to avoid burnout?\"\" ⚖️\n\nA few thoughts:\n\n🔑 The culture of the team matters. Make it okay to take personal time in the middle of the week to go to doctors, take children somewhere, etc.  If it’s a family member's birthday, let people do what they need to help them celebrate that person. Having that freedom is important.\n\n🔑 As a manager, take time off yourself to set a good example.\n\n🔑 Managers have to be really careful and be on top of that with your employees. Understand who has to take responsibility for certain things and if they are at risk of experiencing burnout.\n\n🔑 A good manager recognizes when the team needs a break is key. Know when they've had a crazy week & let them allocate mental health days accordingly\n\n🔑 Especially for companies that have nebulous working hours and lack of specific vacation time, ensure that people are taking vacation. \n\n🔑 HR may keep tabs on if people are taking enough time off, and will make people take off. Try quarterly check-ins to make sure that people are on-track to take enough time off.\n\n🔑 Some people make the choice to not have any work stuff on my phone at all or delete those apps from your phone on the weekend.\n\n🖇 Links shared about burnout\n⬢ https://lnkd.in/g5GssAck\n⬢ https://lnkd.in/g5DUVj8r\n\n\n🎉 Speaking of culture, Statespace is hiring!\n⬢ Statespace ​​Data Scientist (Remote) - Data & Analytics team: https://lnkd.in/ddxpp3Ep\n⬢ Statespace Manager of Marketing Analytics and Data Science (Remote) - Data & Analytics team: https://lnkd.in/da-9J9aw\n⬢ Statespace Biostatistician / Data Analyst, Digital Health (Remote) - Digital Health team: https://lnkd.in/d2ni-7vu\n\n\n🖇 Other resources shared:\n⬢ Jenny shared a paper Statespace recently published (all of my analyses were done in R!): https://lnkd.in/dWFE-Cqx\n⬢ Rachael shared Resume Review Club form: https://lnkd.in/gjtQDS9D\n⬢ Antti shared a thread on R-related podcasts: https://lnkd.in/gTNtZhdg\n⬢ Book on importance of sleep: https://lnkd.in/gUtWb8YF\n⬢ Bala shared a link on keeping your mind young: https://lnkd.in/g9XiGmmb\n⬢ Antti shared this post on LinkedInHardMode (content challenge): https://lnkd.in/giKWzeYh\n⬢ Upcoming Shiny conference (April 27-29): https://shinyconf.com/\n⬢ Bala shared podcasts he enjoys: Datacast (https://lnkd.in/gJtSURsh), AI Podcast (https://lnkd.in/gVddYDT2) and Data Science Imposters (https://lnkd.in/gMEUMUWN)\n\n\nWhere to find more?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n► Data Science Hangout site: rstudio.com/data-science-hangout\n► Add the Data Science Hangout to your calendar: rstd.io/datasciencehangout\n\nFollow Us Here:\nWebsite: https://www.rstudio.com\nLinkedIn:https://www.linkedin.com/company/rstudio\nTwitter: https://twitter.com/rstudio"
