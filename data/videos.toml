date = "2023-07-12T12:00:19Z"
description = "Today, I had the pleasure of interviewing J.J. Allaire. J.J. is the founder of RStudio and the creator of the RStudio IDE. He is an author of several packages in the R Markdown publishing ecosystem including rmarkdown, flexdashboard, learnr, and distill, and also worked extensively on the R interfaces to Python, Spark, and TensorFlow. J.J. is now leading the Quarto project, which is a new Jupyter-based scientific and technical publishing system. In this episode, we learn about why RStudio has now repositioned itself as Posit, how it maximizes its open-source nature as a B Corp, and how J.J. as an open-source advocate views the private nature of many LLMs. I really enjoyed this conversation, and I hope you will as well! \n\nPosit - https://posit.co/\n\nPodcast Sponsors, Affiliates, and Partners:\n- Pathrise - http://pathrise.com/KenJee | Career mentorship for job applicants (Free till you land a job)\n- Taro - http://jointaro.com/r/kenj308 (20% discount) | Career mentorship if you already have a job \n- 365 Data Science (57% discount) - https://365datascience.pxf.io/P0jbBY | Learn data science today\n- Interview Query (10% discount) - https://www.interviewquery.com/?ref=kenjee |  Interview prep questions\n\nListen to Ken's Nearest Neighbors on all the main podcast platforms! \nOn Apple Podcasts: https://podcasts.apple.com/us/podcast/kens-nearest-neighbors/id1538368692 (Please rate if you enjoy it!)\nOn Spotify: https://open.spotify.com/show/7fJsuxiZl4TS1hqPUmDFbl\nOn Google: https://podcasts.google.com/feed/aHR0cHM6Ly9mZWVkcy5idXp6c3Byb3V0LmNvbS8xNDMwMDQxLnJzcw?sa=X&ved=0CAMQ4aUDahcKEwjQ2bGBhfbsAhUAAAAAHQAAAAAQAQ\n\nMORE DATA SCIENCE CONTENT HERE:\n🐤My Twitter - https://twitter.com/KenJee_DS\n👔 LinkedIn - https://www.linkedin.com/in/kenjee/\n📈 Kaggle - https://www.kaggle.com/kenjee\n📑 Medium Articles - https://medium.com/@kenneth.b.jee\n💻 Github - https://github.com/PlayingNumbers\n🏀 My Sports Blog - https://www.playingnumbers.com\n🗣️ 66DaysOfData Discord Server - https://discord.com/invite/4p37sy5muZ"
