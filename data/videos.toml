[[videos]]
url = "https://www.youtube.com/watch?v=aKSrptGegeo"
title = "A first look at Positron - Julia Silge"
slug = "2025-08-01_a-first-look-at-positron-julia-silge"
date = "2025-08-01T05:00:03Z"
description = "Description\nPositron is a next generation data science IDE built by the creators of RStudio. It has been available for beta testing for a number of months, and R users may have wondered if they should try it or if it will be a good fit for them. This new IDE is an extensible tool built to facilitate exploratory data analysis, reproducible authoring, and publishing data artifacts, and it is an IDE that supports but is not built only for R. How should an R user think about Positron, compared to the other options out there?\n\nIn this talk, learn about how and why Positron is designed the way it is, what will feel familiar or new coming from other IDEs such as RStudio, and when (or if) people who use R should consider giving it a try. You’ll hear about different choices when it comes to defaults and ways of working, such as how to think about your projects or folders and how to manage multiple versions of R. You will also learn about new functionality for R users and package developers that we have never had before, like new approaches for managing R package tests and the ability to customize an IDE using extensions. If you are curious about Positron and how it fits into the R ecosystem, you’ll come away from this talk with more details about its capabilities and more clarity about whether it may be a good choice for you.\n\nAdditional Material or Paper\n*Visit https://positron.posit.co for documentation and installers\n*Find us on GitHub at https://github.com/posit-dev/positron\n*Positron is currently available on Posit Workbench in preview"
