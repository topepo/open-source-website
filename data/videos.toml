title = "Sigrid Keydana | Dissecting the quick fix: Analysing tech-solutionist solutions | RStudio (2022)"
slug = "2022-10-24_sigrid-keydana-dissecting-the-quick-fix-analysing-tech-solutionist-solutions-rstudio-2022"
date = "2022-10-24T17:07:59Z"
description = "Machine learning models, applied in the real world, can have unanticipated, harmful side effects. Recommended counter-measures include structured documentation of models (\"Model Cards for Model Reporting\") and training data used (\"Data Sheets for Datasets\").\n\nIn this talk, I'd like to propose a similar, multi-dimensional approach to analyzing the \"solution\" as a whole - \"solution\" as in \"tech solutionism\", the common term for technical \"fixes\" that have unintended, harmful consequences.\n\nThe idea here is that, by asking WHAT a solution is doing, WHO is providing it and WHY, as well as WHERE and HOW it will be used, we should be able to systematically assess whether we are, in fact, confronted with an instance of tech solutionism.\n\nSession: Machine learning"
