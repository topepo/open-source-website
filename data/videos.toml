[[videos]]
url = "https://www.youtube.com/watch?v=-02iNI-YhqQ"
title = "People over computers: engineering leadership | Elliot Murphy | Data Science Hangout"
slug = "2025-11-04_people-over-computers-engineering-leadership-elliot-murphy-data-science-hangout"
date = "2025-11-04T15:30:01Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Elliot Murphy, a VP of Engineering at Posit, to chat about engineering leadership philosophy, balancing maintenance versus innovation and risk, non-traditional career paths and the value of lifelong learning, and data science tool breakdowns including Posit Cloud, Posit Connect Cloud, and shinyapps.io.\n\nIn this Hangout, we explore some philosophical approaches to engineering and management, where Elliot stresses that focusing on people is more important than computers, and human relationships tend to outlast relationships with a given company or employer. Elliot discusses his role as primarily listening and synthesizing the brilliance of others, creating a supportive environment, and making space for people to take on risk and propose new ideas. He also highlighted the value of clear communication when addressing high-pressure environments (like when you're sunsetting a software product).\n\nResources mentioned in the video and zoom chat: \n🔗 Cognition in the Wild (Book discussed regarding joint cognition) → https://mitpress.mit.edu/9780262581462/cognition-in-the-wild/ \n🔗 datapasta (R package) → https://github.com/MilesMcBain/datapasta \n🔗 AI Capabilities in Positron Workflow Demo → https://pos.it/workflow-demos\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the surprising value and broad resources offered by local libraries, including free access to services like LinkedIn Learning, paid periodicals like the NY Times, and streaming platforms like Kanopy. Attendees praised libraries as the \"best resource we hardly hear about\" and key providers of freedom of information. Do you love your local library?!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n02:04 \"Can you tell us a little bit about your journey to where you are?\" \n04:10 \"What does a VP of engineering do? And what types of things are important to you from a philosophical standpoint for engineering and management?\" \n06:21 \"What about your job lets you focus on the people?\" \n06:33 \"Is there also a pressure to innovate?\" \n09:28 \"How do you argue to leadership at a strategic level that that maintenance work is important to take up people's time?\" \n11:48 \"How do you balance engineers and data scientists wanting to incorporate best practices with fast prototyping?\" \n16:46 \"What distinguishes science from engineering in data and also more broadly?\" \n18:28 \"Any resources or any books that helped you bridge the gap between a non traditional background and your current position?\" \n23:00 \"What is the secret to creating a good environment for the team?\" \n25:23 \"Are there basics that you feel analysts or data scientists should be aware of in terms of engineering that would help their work?\" \n28:47 \"How do you make decisions about when to either sunset a project or change directions?\" \n31:20 \"What can those doing maintenance work do to add value to the organization to be safe from being displaced by automation?\" \n35:02 \"What do you think many data scientists or analysts are missing about engineering infrastructure today that could simplify their day to day workflows?\" \n35:52 \"How can a professional transition from a business intelligence role to a data scientist position?\" \n43:47 \"What is your mantra or best practice to crack these professional certification exams?\" \n45:22 \"Tell us the difference between Posit Cloud, Posit Connect Cloud, Posit Connect, and shinyapps.io.\" \n49:03 \"How can a team avoid the trap of over-engineering?\""
