[[videos]]
url = "https://www.youtube.com/watch?v=-uFpynLYuxo"
title = "RStudio Cloud | Inviting Co-instructors and Teaching Assistants | Instructor View"
slug = "2021-08-11_rstudio-cloud-inviting-co-instructors-and-teaching-assistants-instructor-view"
date = "2021-08-11T19:03:31Z"
description = "After creating a space, go to the Members area to manage its membership. You can add members to your space in three ways:\n\nTo add members one by one, choose the Invitation Required option, and send invitations to each person you’d like to add to the space via the Add Member button. Note that for security reasons, the invitation is good for 7 days from the time that it is sent.\nTo allow many people to join the space, choose the Sharing Link option, copy the sharing link and then share that link with all the people you’d like to join the space, either via an email or by posting the link on a web page. Keep in mind that anyone with that link will be able to join your space. If you would like to disable a link you previously shared, choose Reset Sharing Link; this will prevent any additional people from joining the space using that link.\nSpace membership can also be managed programatically. See API Access from R in the Advanced Topics section below for details.\n\nNote that you can switch the access option at any time - a common approach is to initially set the access option to Sharing Link, post the sharing link, then after all the people you want to join the space initially have done so, switch access to Invitation Only. The original sharing link will no longer allow additional people to join the space, but you can add any new members individually.\n\nABOUT RSTUDIO CLOUD:\nRStudio Cloud is a lightweight, cloud-based solution that allows anyone to do, share, teach and learn data science online.\n\nAnalyze your data using the RStudio IDE, directly from your browser.\nShare projects with your team, class, workshop or the world.\nTeach data science with R to your students or colleagues.\nLearn data science in an instructor-led environment or with interactive tutorials.\n\nThere is nothing to configure and no dedicated hardware, installation or annual purchase contract required. Individual users, instructors and students only need a browser to do, share,