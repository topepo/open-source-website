[[videos]]
url = "https://www.youtube.com/watch?v=3PSNMV7SdNE"
title = "With a little help from my friends: Tools for developing & deploying algorithms in the hospital"
slug = "2022-11-15_with-a-little-help-from-my-friends-tools-for-developing-deploying-algorithms-in-the-hospital"
date = "2022-11-15T18:18:19Z"
description = "The Data Science and Advanced Analytics (DSAA) team at Unity Health Toronto has successfully deployed prediction models to the hospital. This would not have been possible without trial-and-error, open source tools, and help from our friends at Posit. In this talk, we will share the various tools and approaches used to develop and deploy an early warning system in the hospital.\n\nSpeaker bio:\nChloé Pou-Prom is a data scientist with the Data Science and Advanced Analytics (DSAA) team at Unity Health Toronto. The DSAA team uses high quality healthcare data in innovative ways to catalyze communities of data users and decision makers in making transformative changes that improve patient outcomes and healthcare system efficiency.\n\nTimestamps:\n2:37 - Start of presentation\n4:41 - Projects their team works on\n7:39 - Team is split into 4 teams (data integration & governance, advanced analytics, product development, and support)\n8:00 - Successful deployment example (CHARTwatch - early warning systems for detecting patient deterioration)\n12:09 - How this was running before (one person's laptop, no logging, no dev environment)\n13:23 - Moving from before to now - What do you need for development?\n13:40 - Connections to databases\n16:25 - Reproducible environment\n17:50 - Package based development\n19:30 - Dev, staging, production environments\n20:24 - What do you need for deployment?\n30:21 - end of fire alarm break :)\n33:07 - Authentication with Posit Connect (with hospitals Active Directory)\n34:30 - Scheduling scripts on Posit Connect\n35:35 - Receiving alerts when there's downtime (internal package for monitoring applications)\n38:07 - Using internally developed packages with Posit Package Manager\n40:58 - Implementation plan\n49:29 - Monitoring\n54:25 - Summary of development and deployment tools needed\n56:12 - Start of Q&A\n\nHelpful resources:\n⬢ Slides: https://lnkd.in/ePEH5k6Z\n\nTools for Development:\n⬢ Database connections [https://lnkd.in/eFDHR4cF]\n⬢ Reproducible environment that lets multiple people collaborate on a project: [Renv: https://lnkd.in/e_DHddeA]\n⬢ Package-based development [Functions and utilities that you re-use: https://r-pkgs.org/]\n⬢ development, staging, production environments [https://lnkd.in/ezczn2Zz]\n\nTools for Deployment\n⬢ Authentication: [Posit Connect: https://docs.posit.co/rsc/ ]\n⬢ Downtime protocols\n⬢ A secure way to download internally-developed packages [Posit Package Manager:  https://docs.posit.co/rpm/]\n⬢ Implementation plan\n⬢ Monitoring [\"Monitoring Model Performance\": https://lnkd.in/eSUgRYNM &\n\"MLOps with vetiver in Python and R\": https://lnkd.in/efN4vcrg]\n\nAbout Data Science and Advanced Analytics at Unity Health Toronto: \n⬢ https://unitynet.unity.local/departments-programs-services/corporate-services/data-science-and-advanced-analytics/\n\nAbout CHARTwatch\n⬢ \"Preparing a Clinical Support Model for Silent Mode in General Internal Medicine\": https://lnkd.in/eJAWmYWk\n⬢ \"Implementing Machine Learning in Medicine\": https://lnkd.in/eFesPijY\n⬢ \"From Compute to Care: Lessons Learned from Deploying an Early Warning System into Clinical Practice\":  https://lnkd.in/e-D7aDDf\n\nWant to join us at a future event? pos.it/community-events"
