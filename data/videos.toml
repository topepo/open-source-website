[[videos]]
url = "https://www.youtube.com/watch?v=izV-qK3nlhA"
title = "Kara Woo | Always look on the bright side of plots | RStudio"
slug = "2021-02-19_kara-woo-always-look-on-the-bright-side-of-plots-rstudio"
date = "2021-02-19T14:00:10Z"
description = "Everyone who creates visualizations in R is bound to make mistakes that prevent their plots from looking as they should. Sometimes, these mistakes create beautiful \"accidental aRt\", though other times they're just plain frustrating. Either way, however, there's something to be learned. This talk will draw on years of watching both the ggplot2 issue tracker and the @accidental__aRt twitter account to highlight some common plot foibles and explain what they can teach us about how ggplot2 works.\n\nAbout Kara:\nKara Woo is a research scientist in data curation at Sage Bionetworks, where she builds tools to help researchers document and share their data. Kara is a core developer of ggplot2 and collects data visualizations gone beautifully wrong on a blog called accidental aRt."
