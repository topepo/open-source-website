title = "Jorge Valente Hernández Castelán | Algunas formas de ver a Uber en datos: Shiny en acción"
slug = "2022-04-15_jorge-valente-hernandez-castelan-algunas-formas-de-ver-a-uber-en-datos-shiny-en-accion"
date = "2022-04-15T17:08:17Z"
description = "*Please note, this meetup was hosted in Spanish.\n\nAlgunas formas de ver a Uber en datos: Shiny en acción\nJorge Valente Hernández Castelán\n\nApp: https://lnkd.in/evpSjden\n\n¿Cuál es el límite verdadero de la programación en R? Esta pregunta me rondó la cabeza cuando conocí este lenguaje por primera vez hace unos dos años. En aquel momento imaginé que era un lenguaje algo corto de posibilidades, que estaba orientado a estadística y, únicamente, obtener resultados de algunos cálculos. No pude haber estado más equivocado en aquel momento.\n\nCuando comencé a trabajar con Dashboards, probando primero cosas simples como Flexdashboard, me di cuenta de que el presentar información que se encuentra dentro de una base de datos, archivo de excel, etc, no solo se limita a crear estadísticos y un simple gráfico. Las aplicaciones web hechas con shiny no solo presentan información estadística, te cuentan una historia mediante los datos, la cuál puede ser presentada de muchísimas maneras.\n\nLa aplicación “Uber App” de hecho tiene ese objetivo: Contar mediante estadística y geografía una historia, conocer la lógica y la tendencia de los viajes en Uber dentro de la ciudad de Nueva York, pero ¿Cómo surgió la idea de hacer esta app? En realidad fue una experiencia interesante, ya que un día me encontraba visualizando ejemplos de apps hechas dentro de Python, por lo que una en específico me pareció bastante interesante y en ese momento me hice la pregunta: ¿Es posible realizar algo similar en R? La respuesta a la pregunta anterior fue la siguiente: No solo es posible, también es posible hacerla mejor, mucho mejor.\n\nAbstract in English:\nWhat is the true limit of programming in R? This question was on my mind when I first came across this language about two years ago. At that time I imagined that it was a language somewhat short of possibilities, that it was oriented to statistics and, only, to obtain results of some calculations. I couldn't have been more wrong at the time.\n\nWhen I started working with Dashboards, first trying simple things like Flexdashboard, I realized that presenting information found in a database, excel file, etc, is not just limited to creating statistics and a simple graph. Web applications made with shiny not only present statistical information, they tell you a story through data, which can be presented in many ways.\n\nThe application \"Uber App\" in fact has that objective: To tell a story through statistics and geography, to know the logic and the trend of Uber trips within the city of New York, but how did the idea of ​​making this app come about? It was actually an interesting experience, since one day I was viewing examples of apps made within Python, so one in particular seemed quite interesting to me and at that moment I asked myself the question: Is it possible to do something similar in R? The answer to the previous question was the following: Not only is it possible, it is also possible to do it better."
