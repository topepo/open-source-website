[[videos]]
url = "https://www.youtube.com/watch?v=op4Q_z5juZc"
title = "Alok Pattani - Google | Sports Analytics Meetup | RStudio"
slug = "2022-02-17_alok-pattani-google-sports-analytics-meetup-rstudio"
date = "2022-02-17T20:09:41Z"
description = "Abstract:\nThe increasing volume, variety, and velocity of sports data provides both great opportunities and challenges for data scientists working in sports. Using R with Google Cloud data science tools like BigQuery can help practitioners scale their analysis and impact in this \"new era\" of sports analytics. This presentation will include a demonstration of using R and Google Cloud together with an NCAA basketball data example, as well as a discussion of the application of such metrics and tools in the sports media and technology industries.\n\nSpeaker Bio:\nAlok is a Data Science Developer Advocate at Google, where he shows how to use Google Cloud tools for data science, in sports and otherwise. He is a sports analytics expert and a long-time user of R and RStudio. Before joining Google, Alok spent 8 years at ESPN, where he was a founding member of their Sports Analytics team and contributed significantly to the use of analytical content across all media platforms. Alok is originally from Cheshire, CT and earned a BA/MA in statistics from Boston University.\n\nAlok's Slides: https://lnkd.in/gxQUf8nV\n\nPackages shared:\n✨sportsdataverse: https://lnkd.in/g8UKAJgc\n✨ wehoop: https://lnkd.in/grBgmc33\n✨ hoopr: https://lnkd.in/gRHNWV4j\n✨ glmnet: https://lnkd.in/g4cuxYzs\n✨ googleAuthRverse: https://lnkd.in/gf5fRgcC\n✨ All of Mark Edmondson's Google packages: https://lnkd.in/gmTpvMsY\n\nOther resources shared:\n✨ Sports data: https://www.spotrac.com/\n✨ Analyzing NCAA Basketball with GCP: https://lnkd.in/gT-4vWwa\n✨ 2020 Google Cloud March Madness Insights: https://lnkd.in/gEWd9xtu\n✨ Alok's presentation on Innovating the MLB Fan Experience through Data: https://lnkd.in/g9XmFKsy\n✨ NFL Player Tracking Data Meetup recording:\n✨ Analyzing Soccer Data with BigQuery: https://lnkd.in/gbbCGKaK\n✨ Sports channel on the R for Data Science Online Learning\n✨ Community Slack: r4ds.io/join # chat-sports_analytics"
