slug = "2022-10-24_mike-stackhouse-dive-deep-into-metadata-with-tplyr-rstudio-2022"
date = "2022-10-24T17:07:59Z"
description = "Back in 2020, Atorus first released our package Tplyr. The aim of Tplyr was to build a reusable framework that makes all the data preparation for clinical reporting simple – and takes the hassle out of tedious things like decimal and parentheses alignment. But from the beginning, Tplyr was always meant to be more. Tplyr captures metadata about the table being built, and in Tplyr 1.0.0 we can leverage that metadata to its full advantage. Tplyr now let’s you dive in, and for any result provides the traceability of how that result was derived, and the data used to do-so. In our talk, we will explore this new functionality built into Tplyr, the mechanics that make it work, and how these new features are useful in the clinical world and beyond.\n\nSession: Drugs not bugs: effective use of R in pharma"
