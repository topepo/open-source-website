[[videos]]
url = "https://www.youtube.com/watch?v=Vf301YCxP1Q"
title = "Jeff Leek | Data Science Training in Communities with Limited Technology Resources | Posit (2022)"
slug = "2022-10-24_jeff-leek-data-science-training-in-communities-with-limited-technology-resources-posit-2022"
date = "2022-10-24T17:11:08Z"
description = "I'm so excited to be back with the data science community at rstudio::conf! Data science is a field that touches nearly every part of our modern lives - from the shows we watch, to our jobs, to the economy, to sports and entertainment. Moreover, modern technologies like cloud computing and access to increasing volumes of data have opened the door to incredible new opportunities for those with data skill. RLadies, Bioconductor, Data Carpentry, and RStudio have also done an incredible job of creating a supportive community for these new data scientists to flourish. But not everyone gets equal access to the training that can pull them into this field.\n\nIn this talk I will describe a collaborative effort to build DataTrail - a data science program created in partnership with local non-profits in Baltimore that seeks to spread awareness, knowledge, and opportunities into historically under-resourced and under-served communities. I will highlight the incredible work of the partners who made this training program possible, show examples of the achievements of DataTrail participants, discuss successes and challenges with the program, and talk about the rewards of being a part of community-based data science education. Finally, I will highlight opportunities to be a part of our DataTrail community or build a new DataTrail in yours.\n\nSession: Keynote"
