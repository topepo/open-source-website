date = "2024-07-10T15:18:22Z"
description = "We were recently joined by Will Hipson, Data Engineer at Halifax International Airport Authority to chat about scrappy data engineering for the 99% - managing the full data lifecycle from extraction to presentation with a team of one.\n\nSpeaker bio:\nWill Hipson is a data engineer at a medium-sized Canadian airport at the early stages of democratizing its data access. Will has a PhD in Psychology and Quantitative Analysis but transitioned out of academia after falling in love with R and data science. Now, he works across all areas of the data lifecycle, from building pipelines and maintaining databases to developing Shiny apps and Quarto docs for presenting data. He believes data engineering doesn't need to be synonymous with massive enterprise platforms or bleeding edge LLMs. Instead, most organizations simply need help finding data and making sense of it. At HIAA, he helped architect a data platform around data discovery, data literacy, and data governance. He built creative solutions for orchestrating data pipelines that resulted in the development of an R package called maestro (https://github.com/whipson/maestro/) that they recently released to the community.\n\nLinks mentioned:\n🔗 maestro package: https://github.com/whipson/maestro/\n🔗 HIAA x Posit Success Story: https://posit.co/about/customer-stories/halifax-airport/\n\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nThe Hangout is a gathering place for the whole data science community to chat about data science leadership and questions you're all facing that happens every Thursday at 12 ET.\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh \n\nWe'd love to have you join us in the conversation live!\n\nThanks for hanging out with us! 💛"
