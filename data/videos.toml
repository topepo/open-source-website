[[videos]]
url = "https://www.youtube.com/watch?v=xDrt6txplek"
title = "GSK's R Journey: From Pilot Projects to Enterprise Adoption | Hosted by Posit"
slug = "2024-11-07_gsks-r-journey-from-pilot-projects-to-enterprise-adoption-hosted-by-posit"
date = "2024-11-07T18:09:11Z"
description = "Discover how GSK, a leading pharmaceutical company, transforms its biostatistics toolkit by embracing R.\n\nIn this web event, you'll learn:\n-GSK's Open-Source Commitment and Journey: Discover how GSK began their journey with open-source software, particularly R, and the pilots they’ve initiated to foster broader acceptance across the organization.\n\n-Challenges and Goals in R Adoption: Understand the obstacles GSK faces in shifting to end-to-end use of R due to existing processes and timelines, and learn about their internal goals to achieve parity between R and other proprietary languages in their biostatistics toolkit.\n\n-Evolution of Training Programs: See how GSK upskills teams through evolving training programs while meeting key deliverables.\n\n-Contributing Back to Open-Source: Explore the importance GSK places on giving back to the open-source community as part of their adoption journey.\n\n-Ascending the Open-Source Mountain: Join us to uncover the steps GSK has taken from pilot projects to setting large-scale enterprise adoption goals.\n\nMeet the Speakers:\n\nAndy Nicholls is the Head of Data Science Innovation and Engineering Team at GSK. Andy brings nearly 20 years of experience working with and promoting the R language. Formerly a professional R trainer and advocate at Mango Solutions, he taught over 100 R training courses and authored the book \"R in 24 Hours\". Andy co-founded the R Validation Hub and co-authored an influential white paper on risk-based approaches to R package assessments. At GSK, he plays a vital role in defining and delivering the R strategy for Biostatistics.\n\nBen Arancibia is a Director of Data Science on GSK's Data Science Innovation and Engineering Team. Ben is a seasoned data scientist with 13 years of experience utilizing open-source languages. His career includes building analytical products for international finance and cloud computing environments for cybersecurity. At GSK, he leads teams developing tools for clinical trial analysis, focusing on innovative R training and upskilling approaches.\n\nBecca Krouse is a Data Scientist on GSK's Data Science Innovation and Engineering Team.  With over 14 years in clinical research, Becca is a trained biostatistician specializing in developing R-based tools. Her expertise bridges statistical theory and practical application, ensuring GSK's biostatistics remains innovative.\n\nWant to learn more about Posit's work in pharma? \nAccess the full pharma playlist through our YouTube channel!"
