date = "2025-05-16T15:01:31Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Cara Thompson, Data Visualization Consultant at Building Stories with Data, to chat about data visualization, consulting and niche specialization, working out loud, and her uniquely winding path to data visualization as a specialty.\n\nIn this Hangout, we explore all things data visualization. Cara emphasizes its role in helping data teams effectively communicate research outcomes, particularly assisting teams of specialists in communicating with a non-specialist audience. She sees the value in making viz understandable - not just making it pretty (though she's great at that part, too!). Cara advises sometimes starting the data visualization process with pen and paper before using digital tools. A common pitfall discussed is trying to include too much information in a single visualization, rather than focusing on what the user needs to see first. \n\nResources mentioned in the video and zoom chat: \n🔗 Cara Thompson's LinkedIn → https://www.linkedin.com/in/cararthompson/ \n🔗 Cara Thompson's Blog → https://www.cararthompson.com/posts \n🔗 Tidy Tuesday GitHub Repo → https://github.com/rfordatascience/tidytuesday \n🔗 Data Visualization Catalogue → https://datavizcatalogue.com/ \n🔗 Data to Viz → https://www.data-to-viz.com/ \n🔗 Cecilia Baldoni's Shrew Scrollytelling Website → https://cecibaldoni.github.io/projects.html \n🔗 Kinga Stryszowska-Hill, Ph.D.'s LinkedIn (mentioned for Canva use with plots) → https://www.linkedin.com/in/kingashill/ \n🔗 Libby's Favorite Data Viz Palette Tool (by Susie Lu)→ https://projects.susielu.com/viz-palette/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about... pie charts 🥧 While Cara mentioned they do have their place despite everyone loving to pick on them, the chat saw lively debate, including comments on their utility in specific niche fields like high-throughput chemistry, humorous links to examples of \"bad\" 3D pie scatterplots (?!), and also some general ambivalence about their use. Maybe not everyone hates pie charts? What do you think?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: [https://www.posit.co](https://www.posit.co/)\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
