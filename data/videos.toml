[[videos]]
url = "https://www.youtube.com/watch?v=t-Is-8Qfym0"
title = "David Maguire | Robust R Deployments: Building a Pipeline from RStudio to Production | Posit (2022)"
slug = "2022-10-24_david-maguire-robust-r-deployments-building-a-pipeline-from-rstudio-to-production-posit-2022"
date = "2022-10-24T17:08:00Z"
description = "R is often maligned as a poor fit for production deployment systems. At dv01 we deploy Plumber API that serves machine learning models to Tape Cracker, a client facing web application. With R in production we use the same codebase throughout the data science pipeline, saving time and resources while reducing the chance for bugs in the hand-off. To accomplish this we use industry standard continuous integration and deployment tools to deploy our API to compute clusters in the cloud. Our pipeline progresses stepwise through staging, release and production environments. Automated integration testing at each step enables a robust and reliable deployment. In this talk R users will learn strategies to deploy R code in production environments.\n\nSession: Data science in production"
duration = 857
channel = "Posit PBC"
playlist = ""
tags = []
view_count = 1300
