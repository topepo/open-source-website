[[videos]]
url = "https://www.youtube.com/watch?v=_50yZxOome4"
title = "Sean Lopp & Lou Bajuk | R & Python: A Data Science Love Story | RStudio (2020)"
slug = "2021-02-24_sean-lopp-lou-bajuk-r-python-a-data-science-love-story-rstudio-2020"
date = "2021-02-24T14:00:20Z"
description = "Many Data Science teams today leverage both R and Python in their work, but struggle to use them together. Data Science leaders and their business partners find it difficult to make key data science content easily discoverable and available for decision-making, while IT Admins and DevOps engineers grapple with how to efficiently support these teams without duplicating infrastructure. Even experienced data scientists familiar with both languages often struggle to combine them without painful context switching and manual translations.\n\nIn this webinar, you will learn how RStudio helps organizations tackle these challenges, with a focus on some of the recent additions to our products that have helped deepen the happy relationship between R and Python:\n\n- Easily combine R and Python in a single Data Science project using a single IDE.\n- Leverage a single infrastructure to launch and manage Jupyter Notebooks, JupyterLab, VSCode and the RStudio IDE, while giving your team easy access to Kubernetes and other resources.\n- Share and manage access to R- and Python-based interactive applications, dashboards, and APIs, all in a single place.\n\nWebinar materials: https://rstudio.com/resources/webinars/r-python-a-data-science-love-story/\n\nAbout Lou:\nLou is a passionate advocate for data science software, and has had many years of experience in a variety of leadership roles in large and small software companies, including product marketing, product management, engineering and customer success. In his spare time, his interests includes books, cycling, science advocacy, great food and theater.\n\nAbout Sean:\nSean has a degree in mathematics and statistics and worked as an analyst at the National Renewable Energy Lab before making the switch to customer success at RStudio. In his spare time he skis and mountain bikes and is a proud Colorado native."
