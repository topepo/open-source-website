title = "Data-as-a-product: A framework for collaborative data wrangling (Clara Amorosi, BMS) | posit::conf"
slug = "2025-11-07_data-as-a-product-a-framework-for-collaborative-data-wrangling-clara-amorosi-bms-positconf"
