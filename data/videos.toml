[[videos]]
url = "https://www.youtube.com/watch?v=ppfYco3Dhkc"
title = "Posit Cloud Essentials | Ep 3: Speed up your data workflows with Project Templates"
slug = "2023-09-27_posit-cloud-essentials-ep-3-speed-up-your-data-workflows-with-project-templates"
date = "2023-09-27T04:36:00Z"
description = "On the last Tuesday of every month, we host an event – Posit Cloud Essentials – where we explore the ins and outs of Posit Cloud, diving into its key features, valuable tips, and real-world use cases. The event is open to all and hosted on YouTube with a live Q&A during each month's event.\n\nTHIS MONTH'S EVENT:\nAll data projects are not created equal. Sometimes you need certain packages. Sometimes you need specific data files or helper scripts. And sometimes you want to define specific compute resources to match your analysis.\n\nCreating a new project in Posit Cloud provides you with a blank canvas. Project Templates enable you to add structure to your canvas, take a snapshot of the newly defined environment, and reuse that starting point for subsequent work.\n\nThis episode of Posit Cloud Essentials will showcase how you can get started more quickly on Posit Cloud with Project Templates, either by using one of our predefined workflows or building your own.\n\nWHAT IS POSIT CLOUD?\nPosit Cloud makes it easy to move your entire workflow into a unified online experience with project management and publishing capabilities. Use your favorite coding languages and environments and share your work seamlessly with others, all from the comfort of your web browser. \n\nADD THE EVENT TO YOUR CALENDAR:\nNo registration is required to join the events. Simply add the event to your calendar using the link below.\n\nAdd future Posit Cloud Essential events to your calendar → http://evt.to/adahaeuow\n\nEXPLORE MORE ABOUT POSIT CLOUD:\nCreate a free Posit Cloud account → https://posit.cloud/plans?utm_source=youtube&utm_medium=organic_social&utm_campaign=cloud_launch\n\nView the entire library of Posit Cloud Essential events → https://youtube.com/playlist?list=PL9HYL-VRX0oS4CXCA81eno41u8K3ckGVH&feature=shared"
