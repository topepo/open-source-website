title = "Lawrence Y. Tello | Integrated Workflow: Microsoft Azure DevOps, Posit Workbench, Posit Connect"
slug = "2022-10-24_lawrence-y-tello-integrated-workflow-microsoft-azure-devops-posit-workbench-posit-connect"
date = "2022-10-24T17:07:59Z"
description = "The California Department of Public Health’s (CDPH) COVID-19 response has required processing and communicating large amounts of data with quick turnaround times to inform strategic resource deployment in the state. To achieve this goal, the COVID-19 Data Processing and Informatics Section developed an integrated workflow that includes a combination of tools: Microsoft Azure DevOps, Posit Workbench, and Posit Connect. Attendees will walk away with an understanding of how these three tools helped our team prioritize, collaborate, decrease turnaround time, and scale our efforts to deploy and automate mission critical procedures and products.\n\nSession: R be nimble, R be quick, R help me plan my vaccine stick: Rapidly responding to world events with R."
