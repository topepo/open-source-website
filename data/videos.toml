[[videos]]
url = "https://www.youtube.com/watch?v=z0UGmMOxl-c"
title = "Rich Iannone || Making Beautiful Tables with {gt} || RStudio"
slug = "2022-01-27_rich-iannone-making-beautiful-tables-with-gt-rstudio"
date = "2022-01-27T18:00:23Z"
description = "00:00 Introduction\n00:37 Adding a title with tab_header() (using Markdown!)\n01:47 Adding a subtitle\n02:48 Aligning table headers with opt_align_table_header()\n03:48 Using {dplyr} with {gt}\n06:03 Create a table stub with rowname_col() \n07:35 Customizing column labels with col_label()\n09:45 Formatting table numbers with fmt_number()\n12:10 Adjusting column width with cols_width()\n15:39 Adding source notes with tab_source_note()\n16:55 Adding footnotes with tab_footnote()\n18:55 Customizing footnote marks with opt_footnote_marks()\n19:10 Demo of how easy managing multiple footnotes is with {gt}\n23:41 Customizing cell styles with tab_style()\n27:07 Adding label text to the stubhead with tab_stubhead()\n28:15 Changing table font with opt_table_font()\n29:25 Automatically scaling cell color based on value using data_color()\n\nWith the gt package, anyone can make wonderful-looking tables using the R programming language. The gt philosophy: we can construct a wide variety of useful tables with a cohesive set of table parts. These include the table header, the stub, the column labels and spanner column labels, the table body, and the table footer.\n\nIt all begins with table data (be it a tibble or a data frame). You then decide how to compose your gt table with the elements and formatting you need for the task at hand. Finally, the table is rendered by printing it at the console, including it in an R Markdown document, or exporting to a file using gtsave(). Currently, gt supports the HTML, LaTeX, and RTF output formats.\n\nThe gt package is designed to be both straightforward yet powerful. The emphasis is on simple functions for the everyday display table needs. \n\nYou can read more about gt here: https://gt.rstudio.com/articles/intro-creating-gt-tables.html\nAnd you can learn more about Shiny here: https://shiny.rstudio.com/\n\nGot questions? The RStudio Community site is a great place to get assistance: https://community.rstudio.com/\n\nContent: Rich Iannone (@riannone)\nDesign & editing: Jesse Mostipak (@kierisi)"
