url = "https://www.youtube.com/watch?v=osHlcc3SqQU"
title = "Helping developers thrive | Cat Hicks | Data Science Hangout"
slug = "2025-07-10_helping-developers-thrive-cat-hicks-data-science-hangout"
date = "2025-07-10T16:01:21Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Dr. Cat Hicks, Psychologist for software teams at Catharsis Consulting and upcoming positconf 2025 keynote speaker, to chat about the psychology of software teams, organizational culture and team dynamics, debunking tech industry myths, and strategies for professional visibility.\n\nCat's work is in applied social science, bringing evidence-based answers to real-world workplace questions, especially for software development teams. She's not a \"couch psychologist\" but rather focuses on \"structures of beliefs and behavioral science and team practices\". \n\nHere are some of the themes Cat touches on in the conversation:\n- Understanding developer (and Data Scientist!) thriving\n- Debunking industry myths,  especially the \"10x Developer\" myth\n- \"Designing an organization that wants to understand itself\"\n- Fostering psychological safety in remote, multi-disciplinary teams\n- Getting recognized for work by being strategically performative\n\nCat has a unique perspective that bridges psychology and the practical realities of tech and data roles. She's got our backs!  \n\nResources mentioned in the video and zoom chat: \n🔗 Cat Hicks's newsletter, \"Fight for the Human\" → https://www.fightforthehuman.com/ \n🔗 Cat Hicks's podcast, \"Change, Technically\" (specifically the episode \"You Deserve Better Brain Research\") → https://www.changetechnically.fyi/2396236/episodes/17378968-you-deserve-better-brain-research \n🔗 Cat Hicks's Bluesky profile → https://bsky.app/profile/grimalkina.bsky.social \n🔗 Developer Thriving paper (AI skill threat paper) → https://osf.io/preprints/psyarxiv/2gej5_v2 \n🔗 Code Review Anxiety paper: \"Understanding and effectively mitigating code review anxiety\" → https://link.springer.com/article/10.1007/s10664-024-10550-9 \n🔗 Code Review Anxiety workbook → https://developer-success-lab.gitbook.io/code-review-anxiety-workbook-1 \n🔗 Ted Laderas's post on how improvisational comedy rules can help collaborations → https://laderast.github.io/posts/2022-02-27-yes-and-is-the-foundation-of-collaboration/ \n🔗 Posit Conference information → https://posit.co/conference/ \n🔗 useR 2025 conference information → https://user2025.r-project.org \n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Intro\n01:11 Cat Hicks Introduces herself \n04:04 What does Catharsis Consulting help with? \n07:45 Preview of Cat Hicks's Posit conference keynote \n10:14 Tips on how to objectively assess team comfort with change \n19:14 How much of developer thriving comes from your immediate team vs. the larger organization? \n23:56 Strategies to foster psychological safety and empathy in remote, multi-disciplinary teams \n29:04 Have you had instances where you felt the need to correct misconceptions about a paper? (the myth of \"10x developers\" or \"10x engineers\")\n34:34 Have you looked at interventions that explicitly scaffold information exchange in groups? \n40:48 Ways organizations can balance top-down and bottom-up approaches to culture \n47:19 What can staff with less formal power do to sow positive seeds in a low-morale culture? \n52:00 How to get noticed for long-term, high-impact work without appearing unproductive or overly performative"
