[[videos]]
url = "https://www.youtube.com/watch?v=xDgO5hB4-VU"
title = "How to combine Matplotlib, Plotly, Seaborn, & more in a single Python Dashboard! (Shiny for Python)"
slug = "2024-07-16_how-to-combine-matplotlib-plotly-seaborn-more-in-a-single-python-dashboard-shiny-for-python"
date = "2024-07-16T03:14:29Z"
description = "This is part 4 of our multi-part series on creating professional dashboards with Shiny for Python. In this video, we'll explore how to integrate popular Python visualization libraries like Matplotlib, Plotly, Seaborn, and Altair into your Shiny apps. This allows you to leverage your existing visualization skills and seamlessly include them in interactive dashboards. We'll cover:\n- Integrating Matplotlib and Seaborn for detailed visualizations\n- Utilizing Altair and Plotly for dynamic charts\n- Implementing Folium for interactive maps\n- Customizing data tables with additional filters and selection modes\n\nBy the end of this video, you'll have a rich and diverse set of visualizations in your Shiny dashboard, setting the stage for the final styling touches in the next video.\n\nShiny for Python Homepage: https://shiny.posit.co/py/\n\nAccess the GitHub repo with all parts of this project: https://github.com/KeithGalli/shiny-python-projects\n\nCheck out the complete documentation here: https://shiny.posit.co/py/api/express/\n\nVideo by @KeithGalli \n\nVideo Timeline!\n0:00 - Video Overview & Recap of Previous Video Dashboards\n1:38 - Getting Setup with the Code (cloning branch from GitHub)\n3:15 - Adding Matplotlib-based visualizations  (render.plot Shiny for Python decorator)\n10:15 - Create a Seaborn Heatmap Chart (Sales Volume by Hour of the Day)\n14:59 - Creating Interactive Charts with Jupyter Widgets (Plotly, Altair, Bokeh, Pydeck, & More…) | render_widget decorator\n20:14 - Implementing Folium for Location-Based Heatmaps (render.ui decorator)\n25:32 - Enhancing DataFrames with Filters and Selection Modes (render.data_frame, render.DataGrid, render.DataTable, etc.)\n28:49 - Additional Rendering Options, Final Touches and Next Steps\n\nStay tuned for part 5, where we'll focus on styling and finalizing our dashboard. If you enjoyed this video, give it a thumbs up and subscribe to the channel to stay updated!\n\nAll videos in the series:\nPart 1 - How to Build, Deploy, & Share a Python Application in 20 minutes! (Using Shiny): https://www.youtube.com/watch?v=I2W7i7QyJPI&t=0s\nPart 2 - How to make Interactive Python Dashboards! (Reactivity in Shiny): https://www.youtube.com/watch?v=SLkA-Z8HTAE&t=0s\nPart 3 - How to make your Python Dashboard look Professional! (Layouts in Shiny): https://www.youtube.com/watch?v=jemk7DoN4qk&t=0s\nPart 4 - How to combine Matplotlib, Plotly, Seaborn, & more in a single Python Dashboard! (Shiny for Python): https://youtu.be/xDgO5hB4-VU?si=kk20yhdpsBqkMYcC\nPart 5 - How to Perfect Your Python Dashboard with Advanced Styling! (HTML/CSS - Shiny for Python): https://youtu.be/uYZUS-eFbqw"
