date = "2024-04-05T17:49:21Z"
description = "We were recently joined by Liz Esarove, Lead Advanced Analytics in People Analytics at AT&T, to chat about how her team uses data science to improve business decisions regarding employees, work, and business objectives at AT&T. \n\nLiz walked us through several use cases for people analytics, including reducing employee attrition and forecasting future attrition rates and workforce changes.   She also discussed how her team uses text analytics to analyze employee comments from surveys. Liz emphasized the importance of ethical considerations when analyzing employee data, such as avoiding the use of race and gender in models to prevent potential discrimination. She also highlighted the value of continuous learning in the rapidly evolving field of data science.\n\nResources mentioned in the chat:\n\n🔗 [People Analytics Regression Book](https://peopleanalytics-regression-book.org/index.html)\n\n🔗 [Fundamentals of People Analytics with applications in R](https://www.routledge.com/The-Fundamentals-of-People-Analytics-with-Applications-in-R/Starbuck/p/book/9781032312327)\n\n🔗 [Predictive HR Analytics: Mastering the HR Metric](https://www.koganpage.com/product/predictive-hr-analytics-9780749482484)\n\n🔗 [Posit Conf 2024 Announcement](https://posit.co/blog/posit-conf-2024-announcement/)\n\n🔗 [Data Science Hangout Recordings and Upcoming Events](https://posit.co/data-science-hangout/)\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\n\nWebsite: https://www.posit.co\n\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
