description = "This is the Live Q&A session for our Workflow Demo on December 18th to show how to build a Shiny app that reads from and writes to a database - using DuckDB.\n\nThe demo will be here: https://youtu.be/6AGroJb4zPM\n\nSara covers how to:\n1. Set up a connection to DuckDB from a Shiny app\n2. Query the database using R or Python\n3. Use editable tables to enable users to write back to the database\n4. Securely deploy your app to Posit Connect\n\nResources mentioned in this Q&A:\n✨ Connect Authentication documentation: https://docs.posit.co/connect/user/oauth-integrations/\n✨ Git backed deployment in Posit Connect: https://posit.co/blog/git-backed-deployment-in-posit-connect/\n✨ shinylive: https://posit-dev.github.io/r-shinylive/\n✨ Mastering Shiny Best Practices: https://mastering-shiny.org/best-practices.html#best-practices\n\nBlogs:\n✨ https://blog.stephenturner.us/p/duckdb-vs-dplyr-vs-base-r\n✨ https://outsiderdata.netlify.app/posts/2024-04-10-the-truth-about-tidy-wrappers/benchmark_wrappers.html\n✨ Using Posit tools with data in DuckDB, Databricks, and Snowflake: https://posit.co/blog/databases-with-posit/\n✨ Creating a Shiny app that interacts with a database: https://posit.co/blog/shiny-with-databases/\n✨ Appsilon has a lot of resources on the topic: https://www.appsilon.com/post/r-shiny-duckd\n\nPlease note, while the monthly Posit Team Workflow Series is usually the last Wednesday of the month - this will be a week earlier. Cheers to a festive holiday season and a fantastic year ahead for you and yours! ✨\n\nTo add future Monthly Workflow Demo events to your calendar → https://www.addevent.com/event/Eg16505674\n\nYou can view all the previous workflow demos here → \nhttps://www.youtube.com/playlist?list=PL9HYL-VRX0oRsUB5AgNMQuKuHPpNDLBVt"
