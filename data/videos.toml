[[videos]]
url = "https://www.youtube.com/watch?v=9Nqfyv9Qyr4"
title = "What is DevOps? And advice for those just starting! | Alex Gold @ Posit | Data Science Hangout"
slug = "2024-10-01_what-is-devops-and-advice-for-those-just-starting-alex-gold-posit-data-science-hangout"
date = "2024-10-01T20:18:11Z"
description = "In this episode, we talked with Alex Gold about what it’s like running the solutions engineering and support team at Posit. He shared his journey into DevOps, how he became a manager, and what it was like writing a technical book in Quarto. Alex shares some amazing advice around what he as a hiring manager looks for in data job applicants, and he talks about the different struggles solo data practitioners face in organizations. He even has a little advice about how to do a handstand, and answers the questions, “Can R be put into production,” and “Can you mix R and Python in the same pipeline?” We know you’ll get a lot out of this conversation!\n\nTimestamps:\n03:36 About Alex Gold\n08:20 What is DevOps? What does a solutions engineer do?\n13:25 How do you ask the right questions as a solutions engineer?\n19:35 Do you need a PhD to be a data scientist?\n24:55 Can R be put into production? Is ‘R can’t be put into production’ a myth?\n28:10 Advice for people starting in devops?\n31:50 What did you learn from the process of writing a book?\n34:20 What tool did you use to write your book?\n36:00 Any tips for doing a handstand?\n37:15 Is it harder to make devops changes in a smaller or larger company?\n40:55 Going from an individual contributor (IC) to managing a team\n47:30 Not being able to get promoted without becoming a manager\n49:45 What do you look for when hiring for a data role?\n53:20 Did you use a template for publishing with CRC press?\n55:25 Can you mix R and Python in the same data pipeline?\n\nResources mentioned in this episode:\nAlex’s book, DevOps for Data Science: https://do4ds.com/ \nAlex’s blog post about dropping out of his PhD program: https://alexkgold.space/posts/2022-09-16-phd-dropout/index.html \nAlex’s blog post about the first year as a manager: https://alexkgold.space/mfy.html\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nThe Hangout is a gathering place for the whole data science community to chat about data science leadership and questions you're all facing that happens every Thursday at 12 ET.\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh \n\nWe'd love to have you join us in the conversation live!\n\nThanks for hanging out with us! 💛"
