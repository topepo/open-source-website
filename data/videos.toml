[[videos]]
url = "https://www.youtube.com/watch?v=1zCDWtNEucI"
title = "Meghan Hall & Mitch Tanney | R in Sports Analytics | RStudio"
slug = "2021-07-01_meghan-hall-mitch-tanney-r-in-sports-analytics-rstudio"
date = "2021-07-01T19:01:23Z"
description = "R in spoRts analytics!\nPresentations by Mitch Tanney & Meghan Hall\n\nMoving the Needle Toward Organizational Success (0:00 - 29:35) \nExtending R Markdown: from websites, slides, to PDFs, and more! (32:00 -53:00)\n\nTalk #1\nMoving the Needle Toward Organizational Success (0:00 - 29:35) \n\nWhat You’ll Learn:\nData analysis can and should influence decisions on the field, court, ice or pitch in the same way it impacts decisions in the boardroom. While the physical landscapes may vary, the objective to maximize the likelihood of successful organizational outcomes does not. Practical applications of data-driven, decision-making processes will serve as the framework for introducing attendees to the field of sports analytics.\n\nAbout the Speaker:\nPrior to joining RStudio in Customer Success, Mitch chased a professional football playing career and later founded and led analytics departments for the Chicago Bears and Denver Broncos. He was a member of the Super Bowl 50 World Championship team in Denver. Mitch graduated summa cum laude as a double major in Mathematics and Spanish from Monmouth College and completed an MBA with distinction from the University of Iowa.\n\nTalk #2\nExtending R Markdown: from websites, slides, to PDFs, and more! (32:00 -53:00)\n\nAbout the Speaker:\nMeghan Hall is a data scientist at Zelus Analytics and is currently teaching a course on data visualization at Carnegie Mellon University. Meghan contributes to the public sports analytics community by helping beginners learn R as well as by writing and presenting on various aspects of hockey analysis as a member of Hockey-Graphs."
