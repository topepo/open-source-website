date = "2024-11-20T15:00:58Z"
description = "You now have a set of content you are happy with on your website, but how do you customize the look and feel of your site beyond options set in YAML? In this video, you’ll start by learning the basics of CSS and SCSS and how to make good design choices. Then, you’ll see how to apply these choices to your Quarto website.\n\nIn this video:\n0:14 What is HTML?\n3:23 CSS Selectors\n8:05 CSS Attributes\n8:25 Layout attributes \n10:24 Reducing repetition with SASS/SCSS?\n15:26 Consistent design\n16:36 Choosing colors\n17:50 Choosing fonts\n19:28 Maintaining accessibility\n22:13 Apply SCSS to your website\n24:16 Change the appearance of headings\n25:28 Change the appearance of navigation bar\n30:30 Use google fonts\n \nLinks:\nColor contrast checker: https://colourcontrast.cc/\nGoogle fonts: https://fonts.google.com/\n\nCode:\nStarter source code: https://github.com/cwickham/quarto-website-video/tree/v0.2\nFinal source code: https://github.com/cwickham/quarto-website-video/tree/v0.3\n\nFor more in-depth coverage and slides check out: https://posit-conf-2024.github.io/quarto-websites/\n\nDo you need a professional website to showcase your work? If you’ve used Quarto to produce a document, you’ve already got the technical skills to create a Quarto website. In this video series, you’ll learn everything else you need to build a website and customize its appearance.\n\nThis video series is for you if you:\n\n-   Have used Quarto to generate documents (e.g. HTML, PDF, MS Word etc.)\n-   Are comfortable editing plain text documents (e.g .qmd) in your IDE (e.g. RStudio, Visual Studio Code etc.)\n-   Want to walk away with your own personal website\n\nTaught by: \nCharlotte Wickham (https://www.cwick.co.nz/)\nEmil Hvitfeldt (https://emilhvitfeldt.com/)\n\nVideos in this series:\n1. Build your homepage [https://youtu.be/l7r24gTEkEY]\n2. Add pages and navigation [https://youtu.be/k65E-8PXZmA]\n3: Customize appearance with CSS/SCSS [https://youtu.be/pAN2Hiq0XGs]\n4: Add lists of content with listings [https://youtu.be/bv_Cw-3HI1Y]"
