description = "Call for talks for posit::conf(2026) closes February 20th, 2026! Apply here: https://posit.co/blog/posit-conf-2026-call-for-talks/ You'll need a talk title, a short text abstract, and a 60 second video saying who you are, why your topic matters, and what people will walk away from your talk having learned so they can apply it!\n\nLibby Heeren and Rachael Dempsey hosted a 15-minute extension to the Data Science Hangout on February 5, 2026 (pos.it/dsh) in which they covered some common questions about submitting talks to posit::conf() and some veteran conf speakers shared their experiences! \n\nLinks mentioned live and in the zoom chat:\n🔗 posit::conf(2026) call for talks - https://posit.co/blog/posit-conf-2026-call-for-talks/\n🔗 Nicholas and Rachael both shared this link from previous years about how the posit::conf() program is built - https://posit.co/blog/how-we-build-the-positconf-program/\n🔗 Meghan Harris's talk: \"Please Let Me Merge Before I Start Crying\": And Other Things I've Said at The Git Terminal 😂 - https://youtu.be/y2qdvYKKVdc?si=OHZsNGeATSrL2xiH\n🔗 Meghan Harris's talk: It's All About Perspective: Making a Case for Generative Art 🎨 - https://youtu.be/48m27OWv-uw?si=j5ygesDF6twCp1Tw\n🔗 Meghan Harris's talk: Making Data Pipelines in R: A Story From A “Self-Taught” Perspective - https://youtu.be/9w4WFe48rEg?si=ZXVFzLo4LpEVg7rE\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
