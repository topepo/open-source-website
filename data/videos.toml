[[videos]]
url = "https://www.youtube.com/watch?v=Bw7DjFBaT8M"
title = "Data viz, Shiny app design, & technical career paths  | Kiegan Rice | Data Science Hangout"
slug = "2025-09-03_data-viz-shiny-app-design-technical-career-paths-kiegan-rice-data-science-hangout"
date = "2025-09-03T14:30:08Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Keegan Rice, Senior Statistician at NORC at the University of Chicago, to chat about data visualization design, bridging the gap between technical and non-technical teams, and building large-scale, public-facing Shiny apps.\n\nIn this Hangout, we explore how to effectively communicate statistical results and design intuitive data visualizations for non-technical audiences. Keegan shares her top tips, emphasizing the importance of knowing your audience and not assuming they have the same level of data literacy as a practitioner. She suggests testing your charts on friends or colleagues outside the data space to ensure they are understandable. The conversation also covers the challenges of explaining concepts like statistical significance and the value of forcing stakeholders to articulate their core business questions rather than just asking for a specific table or chart.\n\nResources mentioned in the video and zoom chat: \n🔗 Kiegan's posit::conf talk, \"Wait, that's shiny\" → https://www.youtube.com/watch?v=SAbV6d7Pn0U \n🔗 Kiegan's reproducible GitHub repo from the talk → https://github.com/kiegan/wait-thats-shiny \n🔗 Deepsha Menghani's talk on crosstalk → https://youtu.be/AbuK2F57NEs \n🔗 The NCVS dashboard, an example of a tool built for a federal client → https://ncvs.bjs.ojp.gov/Home \n🔗 The Medicare Current Beneficiary Survey Chartbook → https://chartbook.mcbs.org/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about favorite board games and sci-fi/fantasy books. Recommendations ranged from board games like Ark Nova, Dominion, and Terraforming Mars to book series like The Expanse, The Stormlight Archive, and Gideon the Ninth. Come hang out with us live to chat about this stuff!!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n07:40 \"What are your top tips for data visualization design?\" \n11:15 \"What are the challenges you’ve faced when communicating statistical results to non-statisticians?\" \n18:30 \"Do you experience any imposter syndrome because you’re not really doing stats anymore?\" \n22:04 \"How do you see data visualization evolving and what are your book recommendations?\" \n26:56 \"How do you get federal clients to modernize beyond using tables for everything?\" \n29:37 \"How do you decide what aspects to drop when a data visualization is too busy?\" \n35:57 \"Is there a middle ground for Shiny between Quarto and JavaScript?\" \n39:51 \"Which sci-fi or fantasy books are you loving?\" \n42:19 \"What advice do you have for someone just getting started with interactive data visualization?\" \n47:40 \"What advice do you have for attending or giving a talk at posit::conf for the first time?\" \n50:35 \"How important is it to show the lineage of data so people can trust your visualizations?\""
