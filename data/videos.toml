url = "https://www.youtube.com/watch?v=ssmwUBSpF-8"
title = "Alan Carlson | Robust, modular dashboards that minimize tech debt | RStudio"
slug = "2022-04-14_alan-carlson-robust-modular-dashboards-that-minimize-tech-debt-rstudio"
date = "2022-04-14T20:41:53Z"
description = "Robust, modular dashboards that minimize tech debt\nPresented by Alan Carlson, Snap Finance\n\nAbstract\nDashboards can be complex but building them shouldn’t be! We’ve built a wrapper for developing production level dashboards that streamlines onboarding new developers and standardizes the initial infrastructure to mitigate tech debt. Now you and your team can spend more time developing insights and less time trying to spin up shiny code with {graveler}.\n\nSpeaker Bio\nAs the Tech Lead for the BI (Business Intelligence) team, Alan's primary focus at Snap is researching, creating, and maintaining methods that help the rest of Snap’s BI Team in their work. From dashboards to visualizations to R code in general, he has built multiple packages and bookdowns that make BI easier to train and to use within the RStudio environment.\n\nHelpful Links:\n✨ Blog Post: https://www.rstudio.com/blog/make-robust-modular-dashboards-with-golem-and-graveler/\n✨ Graveler package: https://github.com/ghcarlalan/graveler\n✨ Environment variables: https://docs.rstudio.com/connect/user/content-settings/#content-vars\n✨ Git-backed publishing: https://docs.rstudio.com/connect/user/git-backed/\n✨ If you'd like to join events live: colorado.rstudio.com/rsc/community-events\n\nQuestion about style guides:\n✨ Tidyverse Style Guide: https://style.tidyverse.org/\n✨ Efficient R Programming book that Colin Gillespie wrote: https://csgillespie.github.io/efficientR/\n\nQuestions about RStudio Team:\n⬢ RStudio Connect: https://www.rstudio.com/products/connect/\n⬢ Chat with RStudio about RStudio Team: rstd.io/chat-with-rstudio"
