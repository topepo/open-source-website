[[videos]]
url = "https://www.youtube.com/watch?v=i1BMv0WEyh0"
title = "Pair Programming for Sustainable Deployment | Kris Fabick | Data Science Hangout"
slug = "2025-10-22_pair-programming-for-sustainable-deployment-kris-fabick-data-science-hangout"
date = "2025-10-22T14:45:14Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Kris Fabick, data scientist at Nissan North America, to chat about pair programming as a mechanism for sustainable deployment, data science in supply chain operations, the challenges of integrating pair programming into a team, and even a little about Kris's hobby, reffing soccer!\n\nIn this Hangout, we explore how pair programming can serve as a mechanism for sustainable deployment. Kris explained that using pair programming is the team's solution to successfully deploying projects in a sustainable way, especially since they have a small data science team without extensive enterprise-level tools or IT support. Pair programming creates human redundancy in a project, meaning two (or more) people are familiar with it, allowing the team to react quickly to changes in development and deployment, and ensuring that someone can cover maintenance even if the original programmer is on vacation. \n\nWhen pitching the investment of time to leadership, a crucial metric was cited: pair programming requires only 15% more time to implement but results in 15% fewer defects. The value proposition is that saving defects saves far more time and downstream costs than the initial investment, offering stability that was a great comfort to leadership.\n\nResources mentioned in the video and zoom chat: \n🔗 Shiny State Blog Post (by Eric Nantz) → https://shinydevseries.com/blog/2025-09-24-shinystate-cran/ \n🔗 Guest's posit::conf() GitHub Repo → https://github.com/kfabick03/positconf2025\n🔗 We don't have the link just yet, but Kris's conf talk will be on YouTube soon! You can search for the title, \"Self-sufficient deployment- using pair programming to have fun and sell your solutions\" and the speakers are Kris Fabick & Kristin Carr\n\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the difference between using AI for coding versus using human pair programming. The group discussed how \"Pair programming == everyone learns MORE about the codebase\" while \"AI coding == everyone understands LESS about the codebase\". Chris noted that when he uses AI to help with code, he actually knows less about it and would not be able to explain the functionality to stakeholders if changes were requested. Attendees also noted that chatbots don't show their logic or mistakes and how they back out of them, which is a valuable source of learning. Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTime Stamps\n00:00 Introduction \n01:47 \"What is the best and worst thing about being a referee?\" \n04:58 \"Kris, could you give us a little recap of your posit::conf(2025) talk about pair programming?\" \n08:52 \"What was the most persuasive thing or metric that you feel like you were able to use to persuade leadership to let you adopt pair programming?\" \n13:52 \"Are there any challenges or additional benefits of pair programming to the individual, that you've noticed?\" \n17:58 \"Do you have any tips for being self-conscious while coding in front of someone?\"\n19:53 \"Could you give a high level overview of supply chain?\"\n21:56 \"Is it better to have both devs be at the same level of experience or expertise when pair coding?\" \n27:32 \"I was just wondering if you could tell us a little bit about the container fill ratio problem you mentioned in your talk.\"\n31:41 \"How as a pair of programmer do you set realistic expectation from the stakeholder? How do you manage the communication gap?\" \n36:50 \"Do you think that AI and specifically things like Copilot might be able to replace some aspects of pair programming?\" \n40:59 \"Do you have a piece of career advice that has really stuck with you or that you like to give people that you find impactful?\" \n43:36 \"Have you ever done any fun data stuff related to your refereeing?\" \n48:36 \"How do you balance the time that gets added on with pair programming with tasks that need to be done quickly?\" Subscribe to posit::conf updates: https://posit.co/about/subscription-management/"
