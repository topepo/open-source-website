[[videos]]
url = "https://www.youtube.com/watch?v=t8A-ysXinpE"
title = "How to keep data up-to-date with 6 pins workflows (aka avoid data-final.csv & data-final-final.csv)"
slug = "2023-08-30_how-to-keep-data-up-to-date-with-6-pins-workflows-aka-avoid-data-finalcsv-data-final-finalcsv"
date = "2023-08-30T15:00:06Z"
description = "Ever chase a CSV through a series of emails or had to decide between data-final.csv and data-final-final.csv?\n\nPins (both for R & Python) is a package that a bunch of people at the Data Science Hangout wish they knew about earlier. It allows you to publish and share objects (data, models, etc.) across projects and with your colleagues.\n\nPins package (R) - https://pins.rstudio.com/\nPins package (Python) - https://pypi.org/project/pins/\n\nTimestamps:\n1:15 - Posit Team Overview\n2:18 - Introduction to pins (scenarios where you might want to consider using pins)\n4:42 - Installing pins\n6:24 - Workflow #1: Pinning an R Object to Posit Connect (from RStudio)\n10:23 - Workflow #2: Pinning a Python Object to Posit Connect (from JupyterLab)\n15:19 - Workflow #3: Reading in a Python pin in an R Session\n16:07 - Workflow #4: Reading an R pin into a Python session\n17:50 - Workflow #5: Pin versioning\n21:50 - Workflow #6: Automating the pin writing process (through job scheduling on Connect)\n\nHelpful resources:\nQ&A for this session on August 30th: https://youtube.com/live/8hc9ck1ZNLE\nBlog post on pinning an R dataset to Posit Connect: https://posit.co/blog/pins-posit-connect/\n\nMany people find this useful for:\n1. Scheduling reports that need to be updated with the newest data each week\n2. Reusing data across multiple projects or content (Shiny app, Jupyter Notebook, Quarto doc, etc.)\n\nWe host these end-to-end workflow demos on the last Wednesday of every month. No registration is required to attend - simply add it to your calendar using this link: pos.it/team-demo \n\nIf you ever have ideas for topics or questions about them, please let us know in the comments."
