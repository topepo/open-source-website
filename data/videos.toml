[[videos]]
url = "https://www.youtube.com/watch?v=dUBnitXf5mk"
title = "June Choe | Cracking open ggplot internals with {ggtrace} | RStudio (2022)"
slug = "2022-10-24_june-choe-cracking-open-ggplot-internals-with-ggtrace-rstudio-2022"
date = "2022-10-24T17:05:44Z"
description = "The inner workings of {ggplot2} are difficult to grasp even for experienced users because its internal object-oriented (ggproto) system is hidden from user- facing functions, by design. This is exacerbated by the foreignness of ggproto itself, which remains the largest hurdle in the user-to-developer transition. However this needs not to be the case: ggplot internals have clear parallels to data wrangling, where data is passed between methods that take inputs and return outputs. Capitalizing on this connection, package {ggtrace} exposes the familiar functional programming logic of ggplot with functions that inspect, capture, or modify steps in a ggplot object's execution pipeline, enabling users to learn the internals through trial-and-error.\n\nTalk materials are available at https://github.com/yjunechoe/ggtrace-rstudioconf2022\n\nSession: Just typing R code: advanced R programming"
