[[videos]]
url = "https://www.youtube.com/watch?v=p55q2szc3I8"
title = "Mike K Smith | Using rmarkdown and parameterised reports | RStudio"
slug = "2021-02-17_mike-k-smith-using-rmarkdown-and-parameterised-reports-rstudio"
date = "2021-02-17T21:25:05Z"
description = "My brain is lazy, shallow and easily distracted. Learn how I use notebooks to keep my present-self organised, my future-self up to speed with what I was thinking months ago, and also how I use parameterised reports to share results for both quantitative and non-quantitative audiences across multiple endpoints. I can update and render outputs for a variety of outputs from a single markdown notebook or report. I’ll show you how I organise my work using the Tidyverse, use child documents with parameterisation and also how this is served out to my colleagues via RStudio Connect.\n\nAbout Mike K Smith:\nI have 25 years experience of working in the Pharmaceutical industry (Pfizer), with more than 15 years working on modelling and simulation projects. I am a keen advocate of smarter drug development with a particular interest in Bayesian methods, dose-response, reproducible research and knowledge management. My particular expertise is in the use of simulation methodology to predict drug outcomes, find efficient trial designs, assess decision criteria and evaluate analysis methodologies. My current role at Pfizer is as specialist in computation and modeling solutions - evaluating and deploying new tools and training colleagues. I am an RStudio certified tidyverse trainer."
