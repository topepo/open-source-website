description = "Deploy with Confidence: Strategies to Minimize Failure and Maximize Success (on Posit Connect)\n\n💬 Speaker(s): Ryszard Szymański\n\n📝 Abstract:\n\nRelease day has arrived - you’re eager to share the latest version of your app with users. You deploy it, ready to celebrate… Then everything breaks. The app won’t load, and the errors make no sense. Despite all your efforts - testing locally, verifying in staging - production still surprises you. Deployments are tricky, full of hidden challenges that can derail even the best preparations. But with the right strategies, you can reduce risk and increase the likelihood of a successful release In this talk, we’ll explore deployment techniques such as blue/green deployments and feature flags, showing how they can be applied when working with Posit Connect. You’ll also learn what to do when the unexpected happens.\n\n📁 Example - https://gist.github.com/rszymanski/65b140a2a2f03369d26a9fe86d01602e\n📁 Package - https://github.com/szymanskir/featureflag\n📁 Links - https://gist.github.com/rszymanski/4b17170a9630dd8e9af191d7e5d6b2c7 posit::conf(2025) Subscribe to posit::conf updates: https://posit.co/about/subscription-management/"
