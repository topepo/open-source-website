date = "2024-11-28T04:56:20Z"
description = "This is the Live Q&A session for our Workflow Demo on November 27th to show how Posit and Snowflake can help you streamline and accelerate your R modeling workflows.\n\nIf you’re looking for a way to simplify model deployment and access high-performance compute for your analyses, this session is for you!\n\nYou can join the demo here: https://youtu.be/pnEjYNgOG9c?feature=shared\n\nTo ask questions during this Q&A, please feel free to use the chat or ask anonymously here: pos.it/demo-questions\n\nDuring the demo, we’ll cover:\n1. How to fit an R model using Snowflake data for direct, seamless integration\n2. Versioning and evaluating your model to ensure consistency and reproducibility\n3. Performing fast model inference directly in Snowflake, saving time and computational power\n4. Storing and accessing models in Snowflake so they’re available to other users and tools (like Snowsight and Python)\n\nWhy it matters:  \nThis workflow enables you to deploy and manage R models directly in Snowflake, making them accessible to anyone on your team. It also uses Snowflake’s compute power to speed up model fitting, turning what could take hours into a matter of seconds.\n\nTo learn more about the benefits of this workflow before joining the event: https://posit.co/blog/running-tidymodel-prediction-workflows-inside-databases/"
