[[videos]]
url = "https://www.youtube.com/watch?v=ywXZp7guvRE"
title = "Interacting with Databases by Bárbara Borges from Shiny from useR! Brussels 2017"
slug = "2017-08-02_interacting-with-databases-by-barbara-borges-from-shiny-from-user-brussels-2017"
date = "2017-08-02T20:05:17Z"
description = "Connecting to an external database from R can be challenging. This is made worse when you need to interact with a database from a live Shiny application. To demystify this process, I'll do two things.\nFirst, I'll talk about best practices when connecting to a database from Shiny. There are three important packages that help you with this and I'll weave them into this part of the talk. The DBI package does a great job of standardizing how to establish a connection, execute safe queries using SQL (goodbye SQL injections!) and close the connection. The dplyr package builds on top of this to make even easier to connect to databases and extract data, since it allows users to query the database using regular dplyr syntax in R (no SQL knowledge necessary). Yet a third package, pool, exists to help you when using databases in Shiny applications, by taking care of connection management, and often resulting in better performance.\nSecond, I'll demo these concepts in practice by showing how we can connect to a database from Shiny to create a CRUD application. I will show the application running and point out specific parts of the code (which will be publicly available)."
