[[videos]]
url = "https://www.youtube.com/watch?v=D-xmvFY_i7U"
title = "Wes McKinney & Hadley Wickham (on cross-language collaboration, Positron, career beginnings, & more)"
slug = "2025-01-14_wes-mckinney-hadley-wickham-on-cross-language-collaboration-positron-career-beginnings-more"
date = "2025-01-14T19:45:11Z"
description = "We hosted a special event hosted by Posit PBC with Wes McKinney (Pandas & Apache Arrow) and Hadley Wickham (rstats & tidyverse) to ask questions, share your thoughts, and exchange insights about cross-language collaboration with fellow data community members.\n\nHere's a preview into what came up in conversation:\n1. Cross-language collaboration between R and Python\n2. Positron, a new polyglot data science IDE\n3. Open source development, how Wes and Hadley got involved in open source and their experiences in building and maintaining open-source projects such as Pandas and the tidyverse.\n4. Documentation for R and Python, especially in the context of teams that use both languages (shoutout to Quarto!)\n5. The use of LLMs in data science\n6. The emergence of libraries like Polars and DuckDB\n7. Challenges of switching between the two languages\n8. Package development and maintenance for polyglot teams that have internal packages in both languages\n9. The future of data science\n\nThe chat was on fire for this conversation 🔥 and we've gathered most of the links shared among the community below:\n\nDocumentation mentioned:\n✨ Positron, next-generation data science IDE built by Posit: https://positron.posit.co/\n✨ Quarto tabset documentation: https://quarto.org/docs/output-formats/html-basics.html#tabset-groups\n\nPackages / Extensions mentioned:\n✨ Pins: https://pins.rstudio.com/ \n✨ Vetiver:  https://vetiver.posit.co \n✨ Orbital: https://orbital.tidymodels.org\n✨ Elmer: https://elmer.tidyverse.org \n✨ Tabby Extension: https://quarto.thecoatlessprofessor.com/tabby/\n\nBlog posts:\n✨ AI chat apps with Shiny for Python: https://shiny.posit.co/blog/posts/shiny-python-chatstream/ \n✨ Using an LLM to enhance a data dashboard written in Shiny: R Sidebot & Python Sidebot \n✨ Marco Gorelli Data Science Hangout (polars): https://youtu.be/lhAc51QtTHk?feature=shared\n✨ Emily Riederer's blog post on Polars: https://www.emilyriederer.com/post/py-rgo-polars/\n✨ Jeffrey Sumner’s tabset example: https://rpy.ai/posts/visualizations%20with%20r%20and%20python/r_python_visualizations\n✨ Emily Riederer's blog post on Python and R ergonomics: https://www.emilyriederer.com/post/py-rgo/11\n✨ Sam Tyner's blog post on Lessons from \"Tidy Data\": https://medium.com/@sctyner90/10-lessons-from-tidy-data-on-its-10th-anniversary-dbe2195a82b7\n\nOther:\n✨ Hadley Wickham's cocktails website: https://cocktails.hadley.nz5\n✨ Posit subscription management to find out about new tools, events, etc.: https://posit.co/about/subscription-management/\n\nNew to Posit?\nPosit builds enterprise solutions and open source tools for people who do data science with R and Python. (We are also the company formerly called RStudio) We'd love to have you join us for future community events! \n\nEvery Thursday from 12-1pm ET we host a Data Science Hangout with the community and invite you to join us! You can add that event to your calendar with this link: https://www.addevent.com/event/Qv9211919"
