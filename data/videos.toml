[[videos]]
url = "https://www.youtube.com/watch?v=XtUYXMLBthM"
title = "Garrick Aden-Buie | xaringan Playground: Using xaringan to learn web development | RStudio"
slug = "2021-02-20_garrick-aden-buie-xaringan-playground-using-xaringan-to-learn-web-development-rstudio"
date = "2021-02-20T16:00:07Z"
description = "xaringan is a quirky package that extends R Markdown to create beautiful web-based HTML slides. Some of xaringan’s quirks come from the JavaScript library it uses, remarkjs, and some of it from the unusual naming scheme xaringan uses for its functions. But under this quirky exterior lies a powerful tool for learning and practicing web development, especially when combined with infinite_moon_reader() for immediate feedback. In this talk I'll cover some basic web concepts that illustrate how fun and rewarding it can to learn HTML, CSS and JavaScript while building awesome slides in R Markdown.\n\nAbout Garrick:\nThe workshop will be led by friend of RStudio, Garrick Aden-Buie, R developer and educator and Data Scientist at Moffitt Cancer Center, where he uses Shiny to enable and accelerate cancer research."
