[[videos]]
url = "https://www.youtube.com/watch?v=qYuWHwWSzfg"
title = "Kevin Snyder & Raju Rayavarapu @ U.S. FDA | Data Science Hangout"
slug = "2024-02-20_kevin-snyder-raju-rayavarapu-us-fda-data-science-hangout"
date = "2024-02-20T16:20:22Z"
description = "We were recently joined by Kevin and Raju @ the FDA to chat about democratizing data science by teaching people the basics of data wrangling, data science and the power of open source and utilizing principles of systems biology, pharmacology, toxicology, bioinformatics, and statistics to collaboratively develop open-source software solutions that support decision making and policy development.\n\nLinks mentioned:\n🔗 FDA Digital Transformation Symposium: https://www.fda.gov/news-events/fda-meetings-conferences-and-workshops/2023-fda-digital-transformation-symposium-12042023\n🔗 precisionFDA: https://precision.fda.gov/\n🔗 R4DS Online Learning Community: r4ds.io/join\n🔗 R Validation Hub Contact: https://www.pharmar.org/contact/\n🔗 Hangout LinkedIn Group: https://www.linkedin.com/groups/12610075/\n\nSpeaker bios:\nKevin Snyder - Associate Director of Nonclinical Informatics at U.S. FDA\n\nKevin received his Bachelors in biochemistry from the University of Maryland in 2008 and his PhD in neuroscience from the University of Pennsylvania School of Medicine in 2013. He currently serves as the Associate Director of Nonclinical Informatics in the Office of New Drugs in the Center for Drug Evaluation and Research at the US FDA where he manages data science and informatics initiatives to support the pharmacology/toxicology review program. These initiatives include research efforts to develop methods to optimize the regulatory use of standardized electronic CDISC-SEND-formatted toxicology study data as well as internal informatics projects to promote the development of scientifically sound, data-driven regulatory policies. Dr. Snyder also leads an agency-wide Data Science and Software Development working group that is focused on building out the organizational infrastructure necessary to support the work of data scientists across the agency and is an active collaborator with several consortia efforts, e.g. CDISC, PHUSE, and BioCelerate, to improve the implementation and use of the SEND data standard.\n\nRaju (Rama) Rayavarapu - Data Scientist at U.S. FDA\n\nRaju comes to the FDA from the great state of Pennsylvania via South Bend, IN and Memphis, TN where he did his Ph.D. and post-doctoral work. He is the lead of ODAR’s DataForward Initiative which is focused on upskilling FDA staff in data related skills and harnessing the power of the incredible existing FDA data science community to drive data literacy and the joy that comes from working with and understanding data.He loves to spend his time talking FOSS (Python/R/whatever), Natural Language Processing, artificial Intelligence (AI), and all things data science. He also spends any night he can staring into the universe with his two dogs and his telescope.\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
