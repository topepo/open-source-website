[[videos]]
url = "https://www.youtube.com/watch?v=GApXqIkp6ck"
title = "Deploying Scikit-learn models for in-database scoring with Snowflake and Posit Team"
slug = "2025-07-31_deploying-scikit-learn-models-for-in-database-scoring-with-snowflake-and-posit-team"
date = "2025-07-31T13:49:37Z"
description = "Modern data science workflows often face a critical challenge: how to efficiently deploy machine learning models where the data lives. Traditional approaches require moving large datasets out of the database for scoring, creating bottlenecks, security concerns, and unnecessary data movement costs.\n\nIn this demo, Nick Pelikan at Posit highlights how orbital bridges the gap between Python’s rich ML ecosystem and database-native execution by converting scikit-learn pipelines to optimized SQL. This enables data scientists to:\n\n1. Use familiar Python tools for model development\n2. Automatically translate complex feature engineering to SQL\n3. Deploy models without rewriting code in different languages\n4. Maintain model accuracy through faithful SQL translations\n\nWhile this example focuses on Python, Nick also gave this demo using Orbital for R users: https://youtu.be/pnEjYNgOG9c?feature=shared\n\nHelpful resources:\n1. Follow-along blog post: https://posit.co/blog/snowflake-orbital-scikit-learn-models/\n2. Supported models for Orbital: https://orbital.tidymodels.org/articles/supported-models.html\n3. Orbital (Python) GitHub Repo: https://github.com/posit-dev/orbital\n4. Orbital (R) GitHub Repo: https://github.com/tidymodels/orbital\n5. Databricks and Orbital for R and Python model deployment: https://posit.co/blog/databricks-orbital-r-python-model-deployment/\n6. Emily Riederer's XGBoost example with Orbital: https://www.emilyriederer.com/post/orbital-xgb/\n7. Sara Altman's blog post on Shiny + Databases: https://posit.co/blog/shiny-with-databases/\n8. Emil's introduction of orbital: https://emilhvitfeldt.com/talk/2024-08-13-orbital-positconf/\n9. Nick's Blog on Running Tidymodel Prediction Workflows with Orbital: https://posit.co/blog/running-tidymodel-prediction-workflows-inside-databases/\n\nIf you'd like to learn more about using Posit Team, you can always schedule time to chat with Posit here: https://posit.co/schedule-a-call/"
