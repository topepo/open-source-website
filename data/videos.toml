description = "Last week’s blog post announced that Shiny for Python is now generally available and Python programmers can feel confident deploying Shiny for Python apps in production. \n\nThis video will serve as a guide to deploying your applications so that users can interact with your apps and leverage their robust functionality using Posit Team.\n\nFollow along blog post: https://posit.co/blog/deploying-a-shiny-for-python-application-with-posit-connect/\n\n0:25 - Step 1: Load packages (in VS Code on Posit Workbench) \nStep 2: Create the app (example app here: https://shinylive.io/py/examples/#app-with-plot)\n1:02 - Step 3: Run the app locally in VS Code\n1:36 - Step 4: Deploy to Posit Connect\n\nLearn more\nWe’d love to have you join us at one of our monthly Posit Team Demos where we walk through a different end-to-end data science workflow each month. They are on the last Wednesday of every month at 11 am ET on YouTube. You can add the event to your calendar here: pos.it/team-demo\n\nWhat is Posit Team?\nPosit Team is the bundle of our most popular products including Workbench (for development work), Connect (for hosting and sharing your data products), and Package Manager (for managing your R and Python packages). Together, this bundle delivers an end-to-end toolchain for data science teams committed to R and Python, improving every step of a data scientist’s workflow, from developing insights to deploying data products, to managing environments.\n\nIf you have any questions and would like to talk with our team, you can schedule a time to chat: https://posit.co/schedule-a-call/"
