url = "https://www.youtube.com/watch?v=Pa4QEhDU0wQ"
title = "The one skill AI can't replace | Alexander Schacht | Data Science Hangout"
slug = "2026-02-20_the-one-skill-ai-cant-replace-alexander-schacht-data-science-hangout"
date = "2026-02-20T14:00:28Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Alexander Schacht, Senior Director at Cytel and Host of The Effective Statistician, to chat about the tensions between technical and executive work, how to increase visibility in your organization, and ethical considerations in data science (specifically regarding patient data).\n\nIn this Hangout, we explore the \"engine vs. wheels\" analogy for data professionals. Alexander explains that while technical skills (the engine) are vital, they are useless without communication and leadership skills (the wheels) to put that power on the road. He shares advice on how to stop being the \"p-value police\" and instead build trust by understanding stakeholders' fears, hopes, and business goals.\n\nResources mentioned in the video and zoom chat: \n🔗 The Effective Statistician Podcast → https://theeffectivestatistician.com/podcast/\n🔗 Alexander’s Book: How to be an Effective Statistician → https://theeffectivestatistician.com/book-launch/\n🔗 Nonviolent Communication (Book Recommendation from Libby) → https://www.amazon.com/Nonviolent-Communication-Language-Life-Changing-Relationships/dp/189200528X\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the pressure to \"look busy\" versus actually delivering results, sparked by Alexander's advice to decline more meetings. The chat debated the difficulty of doing this in a \"grind culture\" and how to prioritize signal over noise. Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n05:28 \"What are some of the tensions between technical work and executive type work?\" \n08:56 \"Do you have any advice for increasing visibility where bias or prejudice exists?\" \n14:26 \"Have you been able to influence the top down people?\" \n18:31 \"How do you reconcile with some of the ethical things about work?\" \n23:00 \"How can I constructively deal with concerns managed upwards towards me as a manager?\" \n30:15 \"What are some strategies that you use to manage expectations?\" \n34:23 \"Most valuable skill set to invest in this age where Gen AI can do so much?\" \n40:14 \"Where would people acquire the niche technical skills without getting experience?\" \n41:57 \"What is your advice to look for in a prospective employer or manager?\" \n45:34 \"How do you juggle both [being an employee and a business owner] at the same time?\" \n48:56 \"Have you experienced stakeholders trusting AI more than they trust experts?\" \n52:19 \"How do you get a feeling for discussions you need to go to versus things that will work themselves out?\""
