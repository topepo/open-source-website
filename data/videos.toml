[[videos]]
url = "https://www.youtube.com/watch?v=0iljqY9j64U"
title = "Shiny Usage Tracking in Posit Connect"
slug = "2022-03-02_shiny-usage-tracking-in-posit-connect"
date = "2022-03-02T17:57:58Z"
description = "🤔 Who actually used my Shiny app and for how long?\n↗️ Is viewership increasing?\n👀 Did my CEO use it?!\n\nDid you know? Posit Connect can record event-style usage information which is intended to answer questions like this and is accessed via the Posit Connect Server API.\n\n★ Please note: during the meetup you can ask questions here anonymously as well: rstd.io/connect-meetup-questions\n\nWe will walk through several examples for getting started with the Posit Connect usage data designed to help you answer questions like:\n\nWho is visiting my content?\nWhat reports are most common?\nHas viewership increased over time?\n\nDuring/after the meetup, you can use the GitHub repo to create the dashboard in your own Connect environment as well and schedule the report to be distributed through email (with inline graphics). The goal for this code is that it is generic enough so that you can copy/paste it into your own R session and run it successfully.\n\nIn order for the code to work in your environment, you need two pieces of information unique to your enterprise:\n❶ Posit Connect's server path\n❷ A Posit Connect API Key\n\nWe’d love to hear your feedback and learn how you have taken this API and created dashboards for your own organizations as well.\n\nHelpful Links:\n❶ Follow-up thread on community.rstudio.com: https://community.rstudio.com/t/rstudio-connect-usage-data-thread-to-discuss-ideas-improvements/130581\n❷ Contribute to open-source examples: https://github.com/sol-eng/connect-usage\n❸ Posit Connect Server API: https://docs.rstudio.com/connect/api/ \n❹ Cookbook: https://docs.rstudio.com/connect/cookbook/ \n❺ R Client: https://pkgs.rstudio.com/connectapi/ \n❻ Python Client (mostly deployment): https://github.com/rstudio/rsconnect-python/ \n❼ Cole's slides: https://github.com/RStudioEnterpriseMeetup/Presentations\n\nIf you ever have questions about Posit Connect or any of our professional products, you can use this link to chat with our team: rstd.io/chat-with-rstudio"
