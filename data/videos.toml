[[videos]]
url = "https://www.youtube.com/watch?v=EeLlIrqWwO4"
title = "Edgar Ruiz | Programación con R | RStudio (2019)"
slug = "2021-03-15_edgar-ruiz-programacion-con-r-rstudio-2019"
date = "2021-03-15T14:00:08Z"
description = "Hay ocasiones que, cuando trabajamos en un análisis en R, necesitamos dividir nuestros datos en grupos, y después tenemos que correr la misma operación sobre cada grupo.  Por ejemplo, puede ser que los datos que tenemos contienen varios países, y necesitamos crear un modelo por cada país. Otro caso sería el de correr múltiples operaciones sobre los mismos datos. Estos casos requieren que sepamos cómo usar iteraciones con R.  Este webinar se concentrará en cómo utilizar el paquete llamado purrr para ayudarnos a resolver este tipo de problema.\n\nDescargar materiales: https://rstudio.com/resources/webinars/programacio-n-con-r/\n\nAbout Edgar:\nEdgar Ruiz es un Ingeniero de Soluciones en RStudio. Es el administrador de los sitios oficiales de sparklyr y de R para bases de datos. También es autor de los paquetes de R: dbplot, tidypredict y modeldb, y co-autor de el paquete dbplyr."
