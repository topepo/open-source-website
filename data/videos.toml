slug = "2024-05-31_from-chaos-to-clarity-implementing-effective-data-stewardship"
date = "2024-05-31T18:44:56Z"
description = "As a data scientist or data leader, data is at the center of your work. However, management of that data can feel overlooked. Many of us have asked questions like:\n\n🤔 How do we ensure data we create is easily discoverable and reusable?\n🤔 What happens when multiple people make different data transformations for similar work?\n\nThe focused effort of making data accessible and secure has been called many different names: data stewardship, data enablement, data governance, etc. \n\nWhile it’s needed across all levels and departments within an organization, best practices for managing data remain difficult to define.\n\nWe got together as a community to discuss the importance of driving data stewardship at the individual level. Jamie Warner, Managing Director, Data Science & Pricing at Plymouth Rock Assurance and Dan Boisvert, Head of Data Stewardship at Biogen kicked off the conversation by drawing from their own experiences.\n\nResources mentioned:\n✨ Follow-up Q&A Blog Post - https://posit.co/blog/the-path-to-effective-data-stewardship/\n✨ posit::conf(2024): https://posit.co/conference/\n✨ O'Reilly chapter on Data Governance over a Data Life Cycle: https://www.oreilly.com/library/view/data-governance-the/9781492063483/ch04.html\n✨ Switch by Chip and Dan Heath: https://heathbrothers.com/books/switch/\n\nTo engage further with Posit on this topic:\n✨ Every Thursday at 12 ET we get together for the Data Science Hangout. While there’s no set agenda for the conversation, we often talk about data science leadership, data management best practices, speaking with executives, career advice, and more.\n✨ Many Posit customers also use an enterprise platform for data governance like Databricks and Snowflake to help people discover, access, and work with the right data securely and efficiently. Posit will be at the following events in June and you can use the links below to RSVP to join us at customer events there:\n\nSnowflake Summit Dev Day: https://posit.co/events/snowflake-summit/\nDatabricks Data + AI Summit: https://posit.co/events/databricks-data-ai-summit/"
