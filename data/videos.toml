[[videos]]
url = "https://www.youtube.com/watch?v=94mjBHlmE6A"
title = "Uniting the pharma industry with data science | Ross Farrugia | Data Science Hangout"
slug = "2025-07-25_uniting-the-pharma-industry-with-data-science-ross-farrugia-data-science-hangout"
date = "2025-07-25T19:45:00Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Ross Farrugia, Data & Insights Engineering Product Family Lead at Roche/Genentech, to chat about Pharmaverse, open source in pharma, career progression in the industry, and the impacts of AI to the pharma industry.\n\nIn this Hangout, Ross tells us all about the Pharmaverse, an open-source initiative he co-founded, which aims to unite companies in the pharmaceutical industry. Instead of independently repeating similar work, companies co-develop and share the effort for building, maintaining, and testing code, especially for clinical trials and submissions to regulatory bodies. This collaborative approach, primarily built around R but open to other languages like Python, helps accelerate the delivery of drugs to patients and improves the review and approval process by health authorities.\n\nThe Pharmaverse fosters a strong community, allowing for shared intellectual property (IP) and increasing trust and sustainability of packages, as demonstrated by the Admiral package with 10 co-development companies. The community, which includes nearly 2,000 people and 400 code contributors, democratically decides on package inclusion, connecting individuals across the industry to supercharge development efforts.\n\nResources mentioned in the video and zoom chat: \n🔗 Pharmaverse Website → https://pharmaverse.org/ \n🔗 Pharmaverse Slack Community → Access via https://pharmaverse.org/FAQ \n🔗 Posit Podcast: The Test Set → https://posit.co/thetestset/ \n🔗 Monthly Workflow Demos (Orbital package) → https://posit.co/workflow-demo/seamless-r-python-model-deployment-with-snowflake-and-orbital/ \n🔗 Book Recommendation: The Situational Leader → https://store.situational.com/collections/books/products/situational-leader-book?utm_source=google&utm_medium=ppc&utm_campaign=CLS+Store&utm_term=the+situational+leader+book&gad_source=1&gad_campaignid=21067538390&gbraid=0AAAAACkXJNBKGqigIGr_i6NfE2yjK6IZr&gclid=CjwKCAjw1ozEBhAdEiwAn9qbzXXYLJFHz9wJSI6iVuEPZ-zO2NcrqjOTlPSOyTfRqWOvgT_zA99pDRoCsNEQAvD_BwE#gad_source_1\n🔗 Libby's Podcast Recommendation: Change Technically by Cat Hicks & Ashley Juavinett → https://www.changetechnically.fyi/\n🔗 Phuse (A Global Healthcare Data Science Community) → https://phuse.global/ \n🔗 Ross's Blog on Contributing to Open Source → https://pharmaverse.github.io/blog/posts/2024-03-11_tips_for__first_.../tips_for__first__time__contributors.html\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about top tips for contributing to open source (though we talked about it quite a bit live!). Ross and community members emphasized starting small, learning basic Git, and contributing not just code but also by commenting on issues, raising bugs, and providing feedback. It was highlighted that helping write documentation, such as vignettes, can be a valuable contribution for newcomers, as fresh eyes can identify gaps that developers might miss. Yes, your fresh, newbie eyes are so valuable!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps\n00:00 Introduction \n03:50 \"How is Pharmaverse different from a CRAN task view?\" \n06:20 \"How is Pharmaverse curation handled?\" \n08:29 \"How to convince competing companies to collaborate on open source?\" \n13:07 \"What does career progression look like in the pharma industry?\" \n16:21 \"Is it possible to break into pharma without prior experience?\" \n18:42 \"Are there roles in pharma for open source package development?\" \n21:50 \"Thoughts on the merging of R and Python communities in pharma?\" \n27:30 \"Top tips for contributing to open source?\" \n31:40 \"Is the pharma industry slow to adopt new software?\" \n35:25 \"Focus on randomized control trials versus observational data?\" \n40:40 \"Is clinical trials experience a requirement for entering pharma?\" \n41:27 \"What career advice do you have for us?\" \n44:13 \"Book and podcast recommendations\" \n46:26 \"What data science professional bodies would you recommend joining?\" \n48:51 \"How will AI influence the pharma industry and Pharmaverse?\" \n52:56 Wrap-up"
