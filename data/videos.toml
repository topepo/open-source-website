date = "2025-11-07T16:14:10Z"
description = "A tale of one organization: learning how to swim in the ocean of open source\n\n💬 Speaker(s): Katerina Gapanenko\n\n📝 Abstract:\n\nThe Canadian Institute for Health Information is diving into open source, transitioning our 300+ analysts and all our analytics code from proprietary software to R and Python. We started 3 years ago, and over that time we have migrated 700,000+ lines of code, navigating waves of change while adapting to new IT environments and workflows. Challenges like technical barriers, workload balancing, and resistance to change were tackled through training, mentorship, and executive support. More than tools, this shift transforms our culture—turning siloed developers into fearless swimmers. Success requires training, teamwork, and courage. Organizations making a similar leap should start small, invest in training, and stay adaptable to stay afloat. posit::conf(2025) Subscribe to posit::conf updates: https://posit.co/about/subscription-management/"
