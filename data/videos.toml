[[videos]]
url = "https://www.youtube.com/watch?v=f3C4-meKD1o"
title = "Next-gen data science: a conversation with the Ravit Show and Eric Pité"
slug = "2025-06-26_next-gen-data-science-a-conversation-with-the-ravit-show-and-eric-pite"
date = "2025-06-26T21:55:36Z"
description = "Eric Pité, SVP of Product & Strategy, sat down with the Ravit Show at Databricks Data + AI Summit to have a conversation about the evolution of open source data science, the Posit and Databricks integration, and the place of AI in modern data science. Some highlights from the conversation are below:\n\n-- The evolution from RStudio to Posit\nIt’s more than just a name change — it’s a signal of how seriously they’re embracing Python while staying true to their R roots and open-source mission.\n\n-- Open source meets enterprise\nEric shared how Posit is navigating the balance between community contribution and commercial sustainability — and why that mission still matters in an AI-first world.\n\n-- Positron + Databricks\nTheir strategic partnership is one to watch. Positron is making it easier to do high-quality data science (in R and Python) inside the Databricks ecosystem, with an emphasis on collaboration, reproducibility, and performance.\n\n-- AI’s place in modern data science\nEric and Ravit chatted about how Posit sees the role of AI in helping data teams be more productive, without losing rigor or transparency.\n\n-- The power of storytelling with code\nOne of our favorite parts is the emphasis on communication. Building models is not enough—data scientists need to share insights clearly, and Posit is building for that.\n\nLearn more about the Databricks and Posit partnership by exploring the partnership page and resources: https://posit.co/use-cases/databricks/"
