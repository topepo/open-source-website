slug = "2022-01-26_isabella-velasquez-building-a-blog-with-r-rstudio"
date = "2022-01-26T14:28:08Z"
description = "Building a Blog With R\nPresented by: Isabella Velásquez\n\nHere are a bunch of resources Isabella shared ⤵️\n\n✨ Slides from the presentation: https://lnkd.in/gqGFmHMf\n✨ Internal Blog Example: https://lnkd.in/gaFPxN5F\n✨ Other resources from the talk: https://lnkd.in/gjXxeMaa\n\nDistill Resources:\n1️⃣ Distill for R Markdown: https://lnkd.in/gWsEBXfN\n2️⃣ Building a blog with distill by Tom Mock: https://lnkd.in/gQiE8PC2\n3️⃣ (Re-)introducing Distill for R Markdown: https://lnkd.in/gzidDpV2\n4️⃣ The distillery: https://lnkd.in/gwDAg_7G\n5️⃣ Postcards package: https://lnkd.in/geT6uB9t\n\nBlogdown Resources:\n\n1️⃣ blogdown: Creating Websites with R Markdown: https://lnkd.in/gGQ-fCWw\n2️⃣ Hugo Themes: https://themes.gohugo.io/\n3️⃣Hugo Apéro: https://lnkd.in/g8U9tfvq\n4️⃣ A Blogdown New Post Workflow with Github and Netlify: https://lnkd.in/gYNwsKTm\n\nThe R programming language is known for its applications to data science, but one of its best assets is the inviting community. Folks from around the world share their lessons learned, best practices, and code to support and inspire others. One tool that helps contribute to the thriving community is the blog.\n\nA blog is a wonderful opportunity to record your data stories, gain exposure for your expertise, and support others in their R journey. Thanks to the advancement of tools like R Markdown, you can quickly get up and running with a blog and focus on customization and style.\n\nIn this talk, we will discuss possible reasons for creating a blog, the pros and cons of a blog, and how to decide on topics. We will then explore tools for creating your blog that make it easy to showcase your R skills, such as blogdown and distill.\n\nAt RStudio, we are always looking for stories of how you are using R for your work, community, or for fun. If this talk inspires you to start writing, we would love for you to contribute to the RStudio blog: https://www.rstudio.com/blog/\n\nSpeaker Bio:\nIsabella Velásquez: Isabella is a content strategist, author, and active member of the R community. Currently, she works at RStudio as a Sr. Product Marketing Manager with the goal of driving engagement around all the awesome things happening at RStudio. In her previous role, she conducted data analysis and research, developed infrastructure to support use of data, and created resources to engage technical and non-technical audiences. She channels these experiences to illuminate what is possible with great products."
