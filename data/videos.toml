[[videos]]
url = "https://www.youtube.com/watch?v=h1KAjSfSbmk"
title = "Rich Iannone | Introducing the gt package | RStudio (2019)"
slug = "2019-10-09_rich-iannone-introducing-the-gt-package-rstudio-2019"
date = "2019-10-09T07:00:04Z"
description = "With the gt package, anyone can make great-looking display tables. Though the package is still early in development, you can do some really great things with it right now! I'll walk through a few examples that touch upon the more common table-making use cases. These will include features like adding table parts, integrating footnotes, styling/transforming table cells, using tables in R Markdown documents, and even including gt tables in email messages.\r\n\r\nVIEW MATERIALS https://github.com/rich-iannone/presentations/tree/master/2019_01-19-rstudio_conf_gt\r\n\r\nAbout the Author\r\nRich Iannone\r\nMy background is in programming, data analysis, and data visualization. Much of my current work involves a combination of data acquisition, statistical programming, tools development, and visualizing the results. I love creating software that helps people accomplish things. I regularly update several R package projects (all available on GitHub). One such package is called DiagrammeR and it's great for creating network graphs and performing analyses on the graphs. One of the big draws for open-source development is the collaboration that comes with the process. I encourage anyone interested to ask questions, make recommendations, or even help out if so inclined!"
