description = "LLMs are changing how we write code, build tools, and analyze data. This talk is a practical introduction to working with LLM APIs in R and Python, including connecting to models, tool calling, and evaluation. We will also show how LLM-powered tools can support common data analysis tasks like exploratory data analysis, as well as briefly discuss privacy and security considerations when working with protected data.\n\nSara Altman is a Senior Developer Advocate on the AI Core team at Posit, where she develops technical content and educational resources on using LLMs and AI tools for data science in R and Python. Before joining the AI team, she helped build Posit Academy, Posit's educational platform, and taught data science and R at Stanford. She has an MS and BS in Symbolic Systems from Stanford."
