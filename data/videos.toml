[[videos]]
url = "https://www.youtube.com/watch?v=uLcd6tRTUEY"
title = "Amelia McNamara | Working with categorical data in R without losing your mind | RStudio (2019)"
slug = "2019-11-13_amelia-mcnamara-working-with-categorical-data-in-r-without-losing-your-mind-rstudio-2019"
date = "2019-11-13T08:00:14Z"
description = "Categorical data, called “factor” data in R, presents unique challenges in data wrangling. R users often look down at tools like Excel for automatically coercing variables to incorrect datatypes, but factor data in R can produce very similar issues. The stringsAsFactors=HELLNO movement and standard tidyverse defaults have moved us away from the use of factors, but they are sometimes still necessary for analysis. This talk will outline common problems arising from categorical variable transformations in R, and show strategies to avoid them, using both base R and the tidyverse (particularly, dplyr and forcats functions).\r\n\r\nVIEW MATERIALS http://www.amelia.mn/WranglingCats.pdf\r\n\r\n(related paper from the DSS collection)\r\nhttp://bitly.com/WranglingCats\r\nhttps://peerj.com/collections/50-practicaldatascistats/\r\n\r\n\r\nAbout the Author\r\nAmelia McNamara\r\nMy work is focused on creating better tools for novices to use for data analysis. I have a theory about what the future of statistical programming should look like, and am working on next steps toward those tools. For more on that, see my dissertation. My research interests include statistics education, statistical computing, data visualization, and spatial statistics. At the moment, I am very interested in the effects of parameter choices on data analysis, particularly data visualizations. My collaborator Aran Lunzer and I have produced an interactive essay on histograms, and an initial foray into the effects of spatial aggregation. I talked more about spatial aggregation in my 2017 OpenVisConf talk, How Spatial Polygons Shape Our World."
