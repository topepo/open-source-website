[[videos]]
url = "https://www.youtube.com/watch?v=GRABw1gHlng"
title = "The epigenomics tech stack | Varun Dwaraka | Data Science Hangout"
slug = "2025-04-28_the-epigenomics-tech-stack-varun-dwaraka-data-science-hangout"
date = "2025-04-28T22:45:00Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Varun Dwaraka, Director of Bioinformatics and Principal Investigator at TruDiagnostic, to chat about leveraging DNA methylation and machine learning for determining biological age, the journey from wet lab science to bioinformatics, the tech stack used in epigenomics research, and challenges in handling and analyzing genomic data.\n\nIn this Hangout, we explore how TruDiagnostic leverages DNA methylation, a biomarker that changes with lifestyle and environment, to develop machine learning models for predicting biological age and other health metrics like smoking impact. These tests aim to provide proactive health insights, allowing individuals to track trends and modulate their biological age through lifestyle changes. But the real draw of this episode of the Hangout is Varun's willingness to open up and talk about himself and his journey from not-so-great student who wanted to be a musician to finding himself as a PhD student and then joining a start-up (to relax a little, of course!).\n\nResources mentioned in the video and zoom chat: \n🔗 Varun Dwaraka's LinkedIn → https://www.linkedin.com/in/varunbdwaraka/ \n🔗 methylclock Bioconductor vignette → https://www.bioconductor.org/packages/devel/bioc/vignettes/methylclock/inst/doc/methylclock.html \n🔗 Optuna website → https://optuna.org/ \n🔗 NCBI Gene Expression Omnibus (GEO) → https://www.ncbi.nlm.nih.gov/geo/ \n🔗 CRAN Task View: Handling Missing Data → https://cran.r-project.org/web/views/MissingData.html \n🔗 Human Microbiome Project (NIH) → https://commonfund.nih.gov/human-microbiome-project-hmp \n🔗 minfi Bioconductor package → https://bioconductor.org/packages/release/bioc/html/minfi.html\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the complexities of data imputation in bioinformatics, including the challenges of handling missing data and the nuances of choosing appropriate methods. Data imputation is a hot topic! Let us know below if you’d like to hear more about it in the future.\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here: \nWebsite: https://www.posit.co \nHangout: https://pos.it/dsh \nLinkedIn: https://www.linkedin.com/company/posit-software \nBluesky: https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
