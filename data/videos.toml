[[videos]]
url = "https://www.youtube.com/watch?v=Zac1qdaYNsY"
title = "Shiny UI Editor Feature Tour || Nick Strayer || Posit (RStudio)"
slug = "2022-07-27_shiny-ui-editor-feature-tour-nick-strayer-posit-rstudio"
date = "2022-07-27T21:22:15Z"
description = "The Shiny UI Editor is a dynamic drag-and drop interface to help you design beautiful Shiny apps. The Shiny UI Editor is a visual tool for building the UI portion of a Shiny application that generates clean and human-readable code.\n\nThe goal of the Shiny UI Editor is to allow people to build the broad-level UI for their Shiny app without writing code. The editor is intended for those who may not be comfortable with the HTML-style code of Shiny’s UI functions or who simply don’t want to fiddle with sizes to get things laid out correctly.\n\nLearn more about the Shiny UI Editor here: https://rstudio.github.io/shinyuieditor/\nAnd read up on GridLayout here: https://rstudio.github.io/gridlayout\n\nContent: Nick Strayer (@NicholasStrayer)\nProducer: Jesse Mostipak (@kierisi)\nEditing and Motion Design: Tony Pelleriti (@TonyPelleriti)"
