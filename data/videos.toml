description = "We're thrilled to have you on board as we continue to explore Positron, Posit's new Integrated Development Environment. Positron is designed to streamline development workflows and reduce context switching for data scientists working with Python, R, and other languages.\n\nOver the next two months, our series will dive deeper into key areas:\n* AI Agents: Explore Positron's native AI capabilities, including Positron Assistant for code writing and debugging, and Databot, an experimental data exploration agent that visualizes data and recommends next steps.\n* AI Apps: Learn to build, deploy, and scale GenAI-enabled apps quickly and securely with your preferred LLM, using pre-built examples and templates.\n\nPositron Series:\n1. Getting Started with Positron (this recording)\n2. AI-Powered Data Science in Positron: https://youtu.be/TrN-FMcOsOA?si=2nOb0q_nowMcS3xy\n3. Take Positron to Work with Positron Pro: https://youtu.be/CNwZZvtAIEM\n\nHelpful resources from this session:\n1. Positron documentation: https://positron.posit.co/\n2. Positron announcement (Why Positron & Why Now?): https://posit.co/blog/positron-product-announcement-aug-2025/\n3. Positron Assistant and Databot announcement: posit.co/blog/positron-ai-product-announcement-aug-2025/\n4. uv documentation: https://docs.astral.sh/uv/guides/install-python/\n5. Git documentation: https://git-scm.com/downloads\n\nResources mentioned in the Q&A:\n1. Exploratory Data Analysis with R in Positron: https://youtu.be/ndq2Mm3Dju8?feature=shared\n2. Publishing from Positron: https://docs.posit.co/connect/user/publishing-positron-vscode/\n3. For \"very advanced users\" regarding multi-root workspaces: https://code.visualstudio.com/docs/editing/workspaces/multi-root-workspaces\n4. Great extension pack for Positron from Garrick: https://github.com/gadenbuie/positron-plus-1-e"
