title = "Nick Strayer | A new way to build your Shiny app's UI | RStudio (2022)"
slug = "2022-10-24_nick-strayer-a-new-way-to-build-your-shiny-apps-ui-rstudio-2022"
date = "2022-10-24T17:05:41Z"
description = "Shiny helps data scientists create web applications without requiring web development experience. However, there's still a steep learning curve for writing the Ui portion of an app. Unlike an app's server code, which typically only uses a few different Shiny-specific functions, the app's UI code is almost entirely made up of functions with strange syntaxes and often surprising interactions with each other. This paradigm requires a very different mindset than your typical R Script. This talk introduces a new tool to help both new and experienced Shiny developers spend less time writing their app's UI and more time doing data science.\n\nSession: Pour some glitter on it: Polishing the design of your shiny apps"
