[[videos]]
url = "https://www.youtube.com/watch?v=z8wfjfjpA0o"
title = "Data Science in CPG and the Zero-to-One journey | Joel Ash @ Kraft Heinz | Data Science Hangout"
slug = "2024-11-07_data-science-in-cpg-and-the-zero-to-one-journey-joel-ash-kraft-heinz-data-science-hangout"
date = "2024-11-07T13:59:11Z"
description = "Welcome back to the Data Science Hangout! This week, we're joined by Joel Ash, Senior Data Science Manager at Kraft Heinz, for a discussion on the unique challenges and opportunities of applying data science in the consumer packaged goods (CPG) industry.\n\nJoel provides a behind-the-scenes look at how Kraft Heinz leverages data to optimize promotional spending, which exceeds a billion dollars annually. He discusses the complexities of navigating relationships with retail partners like Target and Walmart, emphasizing the need to balance cost reduction with maintaining strong customer relationships.\n\nWith some internet issues, we were only able to learn from Joel the first half of the Hangout. We switched to an *open leader* format with the community for the rest of the conversation. Thank you to those who jumped in as well!\n\nDiscussion topics with Joel included:\n\n✨ Decoding the CPG landscape: Joel explains the nuances of the CPG industry, highlighting the distinction between their customers (retailers) and end consumers. He provides specific examples, such as the market dynamics of cream cheese, to illustrate the challenges of predicting demand and optimizing promotional strategies.\n\n✨ Embracing the \"zero to one\" journey: Joel introduces the concept of \"zero to one,\" referencing the challenges of building data science capabilities from the ground up within established organizations. He discusses the importance of integrating data-driven insights into legacy systems and processes, often requiring adaptability and a focus on interpretable models.\n\n✨ The battle against cannibalization in CPG: Joel explains the concept of \"cannibalization\" in the CPG context, where the introduction of new products or promotions can negatively impact sales of existing products. He discusses the strategies Kraft Heinz employs to minimize cannibalization and maximize the overall return on promotional investments.\n\nResources mentioned:\n\n🔗 Ego is the Enemy by Ryan Holiday\nhttps://egoistheenemy.com/ \n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn:  (https://www.linkedin.com/company/posit-software)\nTwitter:  (https://x.com/posit_pbc)\n\nTo join future data science hangouts, add to your calendar here: pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
