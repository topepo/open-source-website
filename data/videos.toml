[[videos]]
url = "https://www.youtube.com/watch?v=Y2zoRCXgPwk"
title = "Matthias Mueller - Campaign Monitor | Marketing Meetup | RStudio"
slug = "2021-07-23_matthias-mueller-campaign-monitor-marketing-meetup-rstudio"
date = "2021-07-23T13:59:59Z"
description = "R in Marketing: Serving Bespoke Insights Through Automation\nPresentation by Matthias Mueller\n\nBlog Post: https://www.rstudio.com/blog/r-in-marketing-meetup/\n\nAbstract:\nAs a global MarTech company, Campaign Monitor and its family of brands generate a myriad of data points. We have countless different platforms, reports, and dashboards that track business and individual performance, however with this overabundance of data come challenges that could hamper growth and productivity. Functioning as a de facto analytics agency to Campaign Monitor’s marketing organization, this talk will walk through how Matthias’ team used R, Slack, and RStudio Connect to build a system that serves custom, individualized insights directly to stakeholders, at the right time, where work already happens.\n\nBio:\nMatthias is the Director of Marketing Analytics at Campaign Monitor, a global MarTech company in the email marketing and personalization space. At CM, he oversees a team of data scientists, engineers, and analysts tasked with optimizing the marketing mix, building customer lifetime value models, and enhancing the prospect’s buying journey. Prior to this assignment, Matthias held positions managing the global digital analytics strategy for SVP Worldwide and led a data-driven UX team at a full-service digital marketing agency.\n\nFor future meetups: https://www.meetup.com/RStudio-Enterprise-Community-Meetup"
