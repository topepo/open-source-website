date = "2024-07-30T15:00:55Z"
description = "This is part 5 of our multi-part series on creating professional dashboards with Shiny for Python. In this video, we dive into advanced styling techniques to enhance the visual appeal and professionalism of your Shiny dashboards. We'll cover:\n- Adding a logo and custom title\n- Making use of custom HTML elements\n- Using CSS to style Shiny components\n- Customizing Altair charts for a polished look\n- Advanced Plotly chart modifications\n- Applying a consistent color theme and layout\n\nBy the end of this video, you'll have a styled dashboard, ready for a professional presentation.\n\nAccess the GitHub repo with all parts of this project: https://github.com/KeithGalli/shiny-python-projects\nShiny for Python Homepage: https://shiny.posit.co/py/\nCheck out the complete documentation here: https://shiny.posit.co/py/api/express/\n\nVideo by @KeithGalli \n\n**Video Timeline:**\n0:00 - Video Overview & Setup\n1:50 - Modifying HTML and CSS in Shiny\n7:44 - Adding a Logo Image\n10:26 - Styling Labels and Containers (Aligning our Image w/ the Title — Custom Divs)\n20:20 - Customizing Altair Charts (Gridlines, Font, Axis Labels, Etc.)\n27:49  - Customizing Plotly Visualizations\n37:16 - Customizing Seaborn & Folium Heatmaps\n44:15 - Final Touches, Clean Up, Recap and Next Steps\n\nIf you enjoyed this series, give it a thumbs up and subscribe to the channel to stay updated!\n\nAll videos in the series:\nPart 1 - How to Build, Deploy, & Share a Python Application in 20 minutes! (Using Shiny): https://www.youtube.com/watch?v=I2W7i7QyJPI&t=0s\nPart 2 - How to make Interactive Python Dashboards! (Reactivity in Shiny): https://www.youtube.com/watch?v=SLkA-Z8HTAE&t=0s\nPart 3 - How to make your Python Dashboard look Professional! (Layouts in Shiny): https://www.youtube.com/watch?v=jemk7DoN4qk&t=0s\nPart 4 - How to combine Matplotlib, Plotly, Seaborn, & more in a single Python Dashboard! (Shiny for Python): https://youtu.be/xDgO5hB4-VU?si=kk20yhdpsBqkMYcC\nPart 5 - How to Perfect Your Python Dashboard with Advanced Styling! (HTML/CSS - Shiny for Python): https://youtu.be/uYZUS-eFbqw"
