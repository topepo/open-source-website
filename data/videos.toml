slug = "2022-06-01_dr-uli-muellner-nick-snellgrove-shiny-modularization-leaflet-for-r-and-leaflet-js-extensions"
date = "2022-06-01T13:54:17Z"
description = "Shiny modularization, Leaflet for R and Leaflet JS extensions\nUnder the Hood of the Aotearoa Road Trip App with Epi-interactive\n\nApp: https://rshiny2.epi-interactive.com/apps/AotearoaRoadTrip/\n\nAbstract:\nCome along with Epi-interactive for a tour through the design and development of their 2021 Christmas R Shiny App - the Aotearoa Road Trip!\n\nWe will start off with a short history of Epi-interactive's Christmas Tools, followed by a demonstration of the 2021 Edition and a discussion about its design and concept. Then we will go under the hood into the Shiny / JavaScript code backend which makes it run, such as Shiny modularisation, Leaflet for R and Leaflet JS extensions such as MovingMarker, and some Shiny tricks we picked up along the way.\n\nSpeaker Bios:\nDr Uli Muellner is Epi-interactive’s Director (IT & Information Design) and has been leading the company’s data visualisation and user interface work over the last decade. After various leadership roles in IT and online learning he co-founded Epi-interactive and built up the company to where it is today. As an advocate of open source technology, he has been the driving force behind the company’s innovative and user-centric approaches and methods.\n\nNick Snellgrove is a Full-Stack Developer at Epi-interactive. Along with being fluent in R and Shiny development techniques, he has a particular passion for spatial data visualisations, User Experience (UX) development and XR technology."
