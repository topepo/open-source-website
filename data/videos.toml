title = "Quarto Websites 2: Add pages and navigation | Charlotte Wickham | Posit"
slug = "2024-11-20_quarto-websites-2-add-pages-and-navigation-charlotte-wickham-posit"
date = "2024-11-20T15:01:00Z"
description = "Now you’ve got a homepage, you’ll likely want to add some other pages. In this video, learn how to add pages to your website, and help people find them, by adding them to your website navigation.\n\nIn this video:\n1:00 Add a page to your website\n2:54 Your file structure determines your URL structure\n5:49 Add a link to your page in navigation\n7:50 Customize navigation item text and icon\n9:12 Control where items appear in the navigation bar\n10:16 Navigation bar options\n11:11 Switch to side navigation\n12:22 Other types of navigation\n16:30 Wrap Up\n\nLinks:\nList of icons you can use in navigation items: https://icons.getbootstrap.com/\nTop navigation bar options: https://quarto.org/docs/websites/website-navigation.html#top-navigation\nQuarto website navigation: https://quarto.org/docs/websites/website-navigation.html\n\nCode:\nStarter source code: https://github.com/cwickham/quarto-website-video/tree/v0.1\nFinal source code: https://github.com/cwickham/quarto-website-video/tree/v0.2\n\nFor more in-depth coverage and slides check out: https://posit-conf-2024.github.io/quarto-websites/\n\nDo you need a professional website to showcase your work? If you’ve used Quarto to produce a document, you’ve already got the technical skills to create a Quarto website. In this video series, you’ll learn everything else you need to build a website and customize its appearance.\n\nThis video series is for you if you:\n\n-   Have used Quarto to generate documents (e.g. HTML, PDF, MS Word etc.)\n-   Are comfortable editing plain text documents (e.g .qmd) in your IDE (e.g. RStudio, Visual Studio Code etc.)\n-   Want to walk away with your own personal website\n\nTaught by: \nCharlotte Wickham (https://www.cwick.co.nz/)\nEmil Hvitfeldt (https://emilhvitfeldt.com/)\n\nVideos in this series:\n1. Build your homepage [https://youtu.be/l7r24gTEkEY]\n2. Add pages and navigation [https://youtu.be/k65E-8PXZmA]\n3: Customize appearance with CSS/SCSS [https://youtu.be/pAN2Hiq0XGs]\n4: Add lists of content with listings [https://youtu.be/bv_Cw-3HI1Y]"
