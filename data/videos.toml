[[videos]]
url = "https://www.youtube.com/watch?v=VMGQ3mVbYXI"
title = "Ralph Asher | Intro to Monte Carlo Simulation | RStudio"
slug = "2021-07-27_ralph-asher-intro-to-monte-carlo-simulation-rstudio"
date = "2021-07-27T23:07:34Z"
description = "Introduction to Monte Carlo simulation, using Shiny\nPresentation by Ralph Asher\n\nMonte Carlo Simulation is a powerful methodology to model and understand the impact of uncertainty upon real life. In this talk, I will introduce Monte Carlo simulation through a simple example: I'm meeting my neighbor after work for dinner in our neighborhood. Given the uncertain length of our commutes, will we make it in time for our reservation? I'll talk through the scenario, then walk through a simple Shiny app that explores the power of Monte Carlo Simulation to recommend decisions under uncertainty.\n\nBio:\nI am Ralph Asher, and I am the founder of Data Driven Supply Chain LLC, a Minnesota-based consultancy that helps organizations apply data science and AI methods, including simulation, to design and improve their supply chain. Prior to founding Data Driven Supply Chain, I worked as an Operations Research Scientist at Target, designing e-commerce supply chain networks, and at General Mills, designing warehousing networks. I have used R for supply chain analytics for over eight years at these companies. I live in the Minneapolis, MN area and love running in the (usually cool) Minnesota air. I can be reached at ralph@datadrivensupplychain.com"
