title = "Migrating to Open Source & the Future of Biostatistics | Beth Atkinson | Data Science Hangout"
slug = "2025-10-09_migrating-to-open-source-the-future-of-biostatistics-beth-atkinson-data-science-hangout"
date = "2025-10-09T15:00:23Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Beth Atkinson, principal biostatistician at Mayo Clinic, to chat about the challenges of migrating from SAS to R, working with diverse and noisy data types (including wearable data and omics projects), foundational tooling like RMarkdown and Quarto, and maintaining statistical fundamentals amidst the hype cycle of new tools like AI.\n\nIn this Hangout, we explore the challenges of working with complex, high-volume data, like the data derived from wearable devices and medical charts. A challenge with wearable device data is that it can be super noisy, with issues like computers not syncing up, people forgetting to wear the device, or someone else wearing it. Medical chart data can be inconsistent; some things are recorded, and some are not. She also talks about the R/Medicine conference, the future of modern biostatistics, and the journey of compassionately helping an organization move from proprietary tools like SAS to open source tools like R. \n\nBeth also works on omics projects, including genomics (looking at DNA), metabolomics, exposomics (chemical exposures), and multiomics, which involves looking at all of this information together in a holistic way. We hope you'll come along with us if you're interested in learning about the biomedical world of data!\n\nResources mentioned in the video and zoom chat: \n🔗 R/Medicine Conference website → https://rconsortium.github.io/RMedicine_website/ \n🔗 arsenal R package (MayoVerse) → https://mayoverse.github.io/arsenal/ (The arsenal package was created to help encourage transition from SAS to R by providing equivalent functionality for summary reporting macros that people relied on.) \n🔗 2025 Posit Table and Plotnine Contests → https://posit.co/blog/announcing-the-2025-table-and-plotnine-contests/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the general dislike of regular expressions (regex) and the tendency to rely on tools like ChatGPT to write complex regex syntax. Many in the chat agreed that regex is difficult to commit to memory but acknowledged the power of the tool. So... do you use an LLM to help with regex? 👀\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps\n00:00 Introduction \n03:25 \"You do a lot of things that end in -omics. What are those things?\" \n05:02 \"What are the types of data that you work with and some of the challenges that you face with those data?\" \n09:37 \"What was your favorite new feature that made your work easier?\" \n11:42 \"What is your favorite data science tool or R package that you find helpful in health research as a biostatistician?\" \n14:04 \"I wanted to see if that's consistent with your experience [that 80% of workflow is data prep]\" 17:07 \"Does it scare you to hand off data to be cleaned by someone else?\" \n18:11 \"What have you noticed that we still need to adhere to [regarding statistics fundamentals]?\" \n22:48 \"Do you also produce reporting products as part of your role, and is your audience primarily internal and narrow, or do you communicate with a broader external audience as well?\" \n26:35 \"Can you talk about a little bit of your personal SAS experience as well as the bigger organizational change maybe that Mayo is is doing?\" \n30:05 \"What are some of the roadblocks that are faced in a SAS-to-R journey and and how can we find compassion for the people that we are helping to transition?\" \n33:55 \"What is the community aspect internally at Mayo Clinic around R?\" \n35:43 \"How do you store and manage all of that [data]?\" \n40:41 \"What tools and skill sets should we focus on if we want to get into biostats today? Do you think it's important for people to still learn SAS if they're coming in fresh? And how about the future of biostatistics as a role separate from data science?\" \n45:48 \"Is it possible for someone with a nontraditional background to make these transitions [into computational epidemiology]?\" \n48:10 \"What's the source of most of these innovations?\" \n50:05 \"Could you talk a little bit about R/Medicine conference?\""
