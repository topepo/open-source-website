description = "00:00 Introduction\n00:12 What is Wordle?\n00:36 The Wordle app we'll build by the end of this four-part series\n01:08 How to approach the problem\n01:38 Word list (link to file below)\n01:52 UI function with fluidPage()\n02:24 Print out what player guesses using verbatimTextOutput()\n03:36 Run app in Viewer Panel\n04:04 Adding an action button with actionButton()\n04:29 Using bindEvent() with actionButton()\n06:02 Limiting guesses to words with five characters\n07:40 Using req() and cancelOutput()\n08:54 Incorporating the word list\n10:13 Matching player guess to word list\n11:06 Matching player guess to target word\n13:50 Writing a function to match guess to target word with feedback\n18:15 Checking word length between guess and target\n23:02 Why we're using intermediary functions\n28:51 Printing formatted letter information\n\nIn Part I of this four-part series, Winston walks through how to build a basic Wordle app using Shiny!\n\nCode + word list: https://github.com/wch/shiny-wordle\nCheck out the full Shiny app here: https://winston.shinyapps.io/wordle/\nYou can learn more about Shiny here: https://shiny.rstudio.com/\n\nGot questions? The RStudio Community site is a great place to get assistance: https://community.rstudio.com/\n\nContent: Developer (@winston_chang)\nAnimation, design, and editing: Jesse Mostipak (@kierisi)\n\nWordle: https://www.powerlanguage.co.uk/wordle/"
