title = "Using R package structure for data science projects | Kylie Ainslie | Data Science Lab"
slug = "2026-02-19_using-r-package-structure-for-data-science-projects-kylie-ainslie-data-science-lab"
date = "2026-02-19T15:01:46Z"
description = "The Data Science Lab is a live weekly call. Register at pos.it/dslab! Discord invites go out each week on lives calls. We'd love to have you! \n\nThe Lab is an open, messy space for learning and asking questions. Think of it like pair coding with a friend or two. Learn something new, and share what you know to help others grow.\n\nOn this call, Libby Heeren is joined by Kylie Ainslie who walks through how structuring data science projects as R packages provides a consistent framework that integrates documentation for you and facilitates collaboration with others by organizing things really well. Kylie says, \"I stumbled on using an R package structure to organize my projects a number of years ago and it has changed how I work in such a positive way that I want to share it with others! In a world where our attention is constantly being pulled in many directions, efficiency is crucial. Structuring projects as R packages is how I work more efficiently.\"\n\nHosting crew from Posit: Libby Heeren, Isabella Velasquez\n\nKylie's Bluesky: @kylieainslie.bsky.social\nKylie's LinkedIn: https://www.linkedin.com/in/kylieainslie/\nKylie's Website: https://kylieainslie.github.io/\nKylie's GitHub: https://github.com/kylieainslie\n\nResources from the hosts and chat:\n\n🔗 posit::conf(2026) call for talks: https://posit.co/blog/posit-conf-2026-call-for-talks/\n🔗 Kylie's posit::conf(2025) talk: https://www.youtube.com/watch?v=YzIiWg4rySA\n🔗 {usethis} package: https://usethis.r-lib.org/\n🔗 R Packages (2e) book: https://r-pkgs.org/\n🔗 Paquetes de R (R Packages in Spanish): \nhttps://davidrsch.github.io/rpkgs-es/\n🔗 {box} package: https://github.com/klmr/box\n🔗 extdata docs in Writing R Extensions: https://cran.r-project.org/doc/manuals/R-exts.html#Data-in-packages-1\n🔗 Tan Ho's talk on NFL data: https://tanho.ca/talks/rsconf2022-github/\n🔗 {rv} package: https://a2-ai.github.io/rv-docs/\n🔗 Whether to Import or Depend: https://r-pkgs.org/dependencies-mindset-background.html#sec-dependencies-imports-vs-depends\n🔗 {pkgdown} package: https://pkgdown.r-lib.org/\n🔗 Edgar Ruiz's {pkgsite} package: https://github.com/edgararuiz/pkgsite\n\nAttendees shared examples of data packages in the chat! Here they are:\nhttps://kjhealy.github.io/nycdogs/\nhttps://kjhealy.github.io/gssr/\nhttps://github.com/deepshamenghani/richmondway\nhttps://github.com/kyleGrealis/nascaR.data\nhttps://github.com/ivelasq/leaidr\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nThe Lab: https://pos.it/dslab\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for learning with us! 💛\n\nTimestamps:\n00:00 Introduction \n06:17 Reviewing the disorganized project example \n10:01 Creating the package structure using create_package \n17:50 Organizing external data and scripts in the inst folder \n22:55 Adding a README and License \n29:06 \"What are the advantages to packaging a project?\" \n33:35 Writing Roxygen2 documentation \n36:06 \"Do you type return at the end of your functions?\" \n41:55 Handling dependencies with use_package \n43:53 \"Can you just use require(dplyr) at the top?\" \n47:45 Setting up a pkgdown site \n50:11 Creating vignettes \n52:22 \"What is the role of the usethis package?\" \n54:18 Loading the package with devtools::load_all"
