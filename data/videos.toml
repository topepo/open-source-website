url = "https://www.youtube.com/watch?v=RBVqKi3FV30"
title = "Posit Pharma Meetup: R for Clinical Study Reports & Submission | Yilong Zhang"
slug = "2022-05-17_posit-pharma-meetup-r-for-clinical-study-reports-submission-yilong-zhang"
date = "2022-05-17T17:15:58Z"
description = "Presenter: Yilong Zhang, PhD\n\nDuring the meetup you can ask questions here: rstd.io/pharma-meetup-questions (anonymously or with your name)\n\nAbstract: \nThe use of open-source R is evolving in drug discovery, research, and development for study design, data analysis, visualization, and report generation in the pharmaceutical industry. It is critical to enable the ability to produce tables, listings, and figures (TLFs) and submit results to the regulatory agency using R. We developed R packages (r2rtf, pkglite) and reference book (https://r4csr.org/) to simplify the workflow for an organization to complete those tasks. Based on the proposed workflow, the first pilot project has been successfully submitted to FDA by the R consortium R submission working group (https://rconsortium.github.io/submissions-wg/).\n\nBio:\nYilong Zhang is a biostatistician at Meta (and was previously at Merck). He has worked with a group of statisticians and programmers to demonstrate the capability of using R for regulatory work. Other research interest include statistical methods in study design, missing data, and survival analysis with more than 25 papers published in peer-reviewed journals. Before joining Merck, he earned Ph.D. degree in Biostatistics at New York University.\n\nHelpful links:\nUse cases & insights from pharmaceutical industry leaders: https://www.rstudio.com/champion/life-science\nR/Pharma Conference: https://rinpharma.com/\nR Validation Hub: https://www.pharmar.org/\nLink to speak with RStudio: rstd.io/chat-with-rstudio\nLink to slides: rstd.io/pharma-meetup-slides"
