title = "The skydiver to data scientist pipeline | Kevin Dalton | Data Science Hangout"
slug = "2025-12-10_the-skydiver-to-data-scientist-pipeline-kevin-dalton-data-science-hangout"
date = "2025-12-10T17:37:45Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Kevin Dalton, Senior Data Scientist at Great American Insurance Group, to chat about data science in the insurance industry, MLOps and productionalization strategies, Bayesian modeling, and career development.\n\nIn this Hangout, we explore MLOps and productionalization strategies, especially the distinction between \"little P\" and \"big P\" production. Kevin explained that \"small p\" production involves internal dashboards, interactive applications, or analytics reports used to support the research process and assess the business, generally having a lower risk profile. In contrast, \"big P\" production refers to ML models deployed for inference in core business systems, which demand strict Service Level Agreements (SLAs). Kevin noted that the industry is moving towards automated, cloud-centric, real-time inference engines, although production systems can still be as simple as running a notebook over new data.\n\nResources mentioned in the video and zoom chat: \n🔗 The (new!) Data Science Lab on Tuesdays → https://pos.it/dslab \n🔗 Bayes Rules! Book → https://www.bayesrulesbook.com/ \n🔗 Positron link → https://positron.posit.co/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the humorous observations regarding Kevin's unique professional history, with some referring to it as the \"skydiving to actuary pipeline\" 😂 There was some speculation about whether professional skydivers have \"No fear to deploy models\" and then there was a subsequent realization about all the insurance needed for a skydiving business. That tracks!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps\n00:00 Introduction \n05:06 \"What does it actually mean to put models into production at an insurance company?\" \n07:27 \"How do you actually explain that to people at the company that there's this need for two different types of production?\" \n09:21 \"Have you guys, in a large company, found any application for smaller language models in, like, production pipelines?\" \n10:17 \"Are there any lessons from the skydiving experience that you apply to your data science work?\" \n12:45 \"What recent innovative ML models in the insurance sectors have you brought live if you're allowed to share?\" \n17:33 \"I'm just curious to hear from you or others in chat who spend a lot of time in R if there are strategies you found effective in bridging the gap to using Python.\" \n20:54 \"What was the main thing that got you from \"who is this for?\" when you first opened Positron to now using it?\" \n22:46 \"Could you share a little bit about what your tool stack looks like at Great American Insurance Group?\" \n24:27 \"So you actually run Posit within Snowflake. Is that right?\" \n26:32 \"What sort of guardrails are you using that are specific to insurance to guard against drift?\" \n29:26 \"Do you think that'll be the future when it comes to test driven development?\" \n30:55 \"What are some of your favorite public data sources for trying to quantify and model things like geopolitical risk?\" \n32:07 \"If you wanna learn more about using tools you mentioned for building synthetic data, where would you recommend that people start?\" \n34:27 \"So with the AI evolving, what kind of techniques are being recently used?\" \n35:28 \"Broadly, how is AI affecting your day to day work in the insurance industry?\" \n38:21 \"Is there a piece of career advice that's been especially meaningful to you, whether it's something that you've heard from a mentor or you've given this advice to other people?\" \n40:04 \"How would you advise people to get domain expertise before they've gotten a chance to do a job in that industry?\" \n46:19 \"Which skills would you say are evergreen irrespective of the tools that you're using?\" \n47:51 \"What are you learning about change management?\" \n49:31 \"What does seeking mentorship mean for you?\" \n53:21 \"Do you have any strategies or advice for keeping that statistical intuition sharp?\" \n54:16 \"How do you partner with actuaries at work? Are there things that you need from the actuaries that make your job easier?\""
