url = "https://www.youtube.com/watch?v=jemk7DoN4qk"
title = "How to make your Python Dashboard look Professional! (Layouts in Shiny)"
slug = "2024-06-26_how-to-make-your-python-dashboard-look-professional-layouts-in-shiny"
date = "2024-06-26T15:00:43Z"
description = "This is part 3 of our multi-part series on creating professional dashboards with Shiny for Python. In this video, we focus on enhancing the visual appeal and structure of your Shiny dashboards using various layout components. We'll cover:\n- Implementing layout templates for quick setup\n- Using cards and sidebars for a clean, organized look\n- Customizing columns and grids for better data presentation\n- Adding tab options for multiple views within a dashboard\n\nBy the end of this video, you'll have a more polished and professional-looking dashboard, setting the stage for advanced visualizations in upcoming videos.\n\nShiny for Python Homepage: https://shiny.posit.co/py/\n\nAccess the GitHub repo with all parts of this project: https://github.com/KeithGalli/shiny-python-projects\n\nCheck out the complete documentation here: https://shiny.posit.co/py/api/express/\n\nVideo by @KeithGalli \n\nVideo Timeline!\n0:00 - Video Overview & Progress Thus Far\n1:28 - Using Shiny Templates to Get Started Fast\n3:21 - Using Layout Components to Customize our Apps (Cards, Sidebars, Tabs, etc.)\n7:55 - Adding a Sidebar within a Card\n12:38 - Adding a Card with Tabs to Display Various Visualizations\n17:35 - Structuring Data in Columns / Grids (layout_columns() & layout_column_wrap())\n26:30 - Final Touches & Tips (Filling in Visualizations into our Tab Views)\n\nStay tuned for part 4, where we'll add more advanced visualizations, and part 5, where we'll focus on customizing styles and adding final touches. If you enjoyed this video, give it a thumbs up and subscribe to the channel to stay updated!\n\nAll videos in the series:\nPart 1 - How to Build, Deploy, & Share a Python Application in 20 minutes! (Using Shiny): https://www.youtube.com/watch?v=I2W7i7QyJPI&t=0s\nPart 2 - How to make Interactive Python Dashboards! (Reactivity in Shiny): https://www.youtube.com/watch?v=SLkA-Z8HTAE&t=0s\nPart 3 - How to make your Python Dashboard look Professional! (Layouts in Shiny): https://www.youtube.com/watch?v=jemk7DoN4qk&t=0s\nPart 4 - How to combine Matplotlib, Plotly, Seaborn, & more in a single Python Dashboard! (Shiny for Python): https://youtu.be/xDgO5hB4-VU?si=kk20yhdpsBqkMYcC\nPart 5 - How to Perfect Your Python Dashboard with Advanced Styling! (HTML/CSS - Shiny for Python): https://youtu.be/uYZUS-eFbqw"
