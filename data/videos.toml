title = "How to deploy Shiny apps in 2026 | Alex Chisholm | Data Science Lab"
slug = "2026-01-15_how-to-deploy-shiny-apps-in-2026-alex-chisholm-data-science-lab"
date = "2026-01-15T15:15:03Z"
description = "The Data Science Lab is a live weekly call. Register at pos.it/dslab! Discord invites go out each week on lives calls. We'd love to have you! \n\nThe Lab is an open, messy space for learning and asking questions. Think of it like pair coding with a friend or two. Learn something new, and share what you know to help others grow.\n\nOn this call, Libby Heeren is joined by Posit product manager Alex Chisholm as he walks through the evolution of shiny app deployment over the years, how to deploy shiny apps in the modern era, and peeks into Posit's roadmap for future development. Do you call it \"deployment\" or \"publishing\" when it comes to Shiny apps? 🤔 \n\nThis is a super friendly and conversational space, and being there live in the Discord chat can't be beat!! We hope you get to join us sometime soon.\n\nHosting crew from Posit: Libby Heeren, Isabella Velasquez, Daniel Chen, Alex Chisholm\n\nAlex Chisholm's LinkedIn: http://www.linkedin.com/in/chisholm1\n\nResources from the hosts and chat:\n\n🔗 Posit Connect Cloud for deploying Shiny apps in the modern era: https://connect.posit.cloud/\n🔗 Install Positron: https://positron.posit.co/\n🔗 Simon Couch's blog post on local LLMs not being good enough yet: https://www.simonpcouch.com/blog/2025-12-04-local-agents/\n🔗 Blue-Green Shiny App Deployments using Posit Connect posit::conf(2025) talk by Ryszard Szymański: https://youtu.be/QEEGLWj0nas\n🔗 Digital Ocean: https://www.digitalocean.com/\n🔗 Ollama local LLM: https://ollama.com/\n🔗 py-sidebot app template: https://shiny.posit.co/py/templates/sidebot/\n🔗 querychat app template: https://shiny.posit.co/py/templates/querychat/\n🔗 Dan Chen mentioned Render in the chat as an alternative to Digital Ocean: https://render.com/\n🔗 Alex Chisholm's AB testing GitHub repo example: https://github.com/alex-chisholm/shiny-r-abtesting\n🔗 Edward in the chat shared a GitHub repo for using GitHub actions to execute remote SSH commands: https://github.com/appleboy/ssh-action\n🔗 Abu in the chat shared blue-green vs. canary deployments: https://octopus.com/devops/software-deployments/blue-green-vs-canary-deployments/\n🔗 Frank in the chat mentioned Simon's blog on using local LLMs with the chores package: https://www.simonpcouch.com/blog/2025-12-10-chores-0-3-0/\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nThe Lab: https://pos.it/dslab\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for learning with us! 💛\n\nTimestamps\n00:00 Introduction\n03:03 Meaningful applications and value creation \n05:31 The evolution of Shinyapps.io and Posit Connect\n08:12 DigitalOcean and Droplets\n09:36 DigitalOcean vs. commercial cloud providers, \n11:48 Comparisons: DigitalOcean, Azure, and AWS\n14:47 Replicating local environments with Docker\n16:51 The open-source Shiny Server \n18:20 Use case: University of Illinois CITL \n20:02 Key considerations for deployment decisions\n21:53 GitHub Actions and version control \n23:31 Addressing single points of failure and maintainability \n24:38 Posit Connect Cloud features and portfolio\n26:01 Beyond Shiny: Quarto, Streamlit, and Dash \n27:07 Handling secrets and database credentials\n28:56 Custom vanity links vs. UUIDs\n30:04 Blue-Green deployment strategies \n31:55 \"Is it easy to set up a developer workflow?\" \n34:46 Guardrails for AI powered apps and token usage \n37:32 Small language models and Ollama \n38:29 Sidebot AI demo and LLM integration\n39:41 Understanding manifest.json and dependencies\n45:00 Automatic publish on GitHub push \n46:51 The future of Shinyapps.io and migration\n48:33 \"Did you just build a custom agent for that specific dashboard?\"\n51:43 Publishing from RStudio IDE to Connect Cloud\n54:16 Preview: Inspecting website APIs for data harvesting"
