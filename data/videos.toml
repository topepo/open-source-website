[[videos]]
url = "https://www.youtube.com/watch?v=cm34R5aYUQ4"
title = "Max Kuhn - Evaluating Time-to-Event Models is Hard"
slug = "2024-10-31_max-kuhn-evaluating-time-to-event-models-is-hard"
date = "2024-10-31T13:55:30Z"
description = "Censoring in data can frequently occur when we have a time-to-event. For example, if we order a pizza that has not yet arrived after 5 minutes, it is censored; we don't know the final delivery time, but we know it is at least 5 minutes. Censored values can appear in clinical trials, customer churn analysis, pet adoption statistics, or anywhere a duration of time is used. I'll describe different ways to assess models for censored data and focus on metrics requiring an evaluation time (i.e., how well does the model work at 5 minutes?). I'll also describe how you can use tidymodel's expanded features for these data to tell if your model fits the data well. This talk is designed to be paired with the other tidymodels talk by Hannah Frick.\n\nTalk by Max Kuhn\n\n\nSlides: https://topepo.github.io/2024-posit-conf/\nGitHub Repo: https://github.com/topepo/2024-posit-conf"
