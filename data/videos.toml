[[videos]]
url = "https://www.youtube.com/watch?v=BYtP0SxGAoA"
title = "What did journalism teach you about data storytelling? | Sharon Machlis | Data Science Hangout"
slug = "2024-09-19_what-did-journalism-teach-you-about-data-storytelling-sharon-machlis-data-science-hangout"
date = "2024-09-19T14:00:23Z"
description = "In this episode, Sharon Machlis shares her journey from journalist to journalist-who-codes. You’ll hear her talk about the serendipitous way she found herself covering business and technical news, the lessons she learned about storytelling with data over the years, and how she knew it was time to retire. You’ll also learn how to find the data community on social media in a post-twitter world, including a primer on Mastodon and how it works without an algorithm. \n\nTimestamps:\n02:45 About Sharon Machlis\n04:55 How did you decide to start using R?\n07:45 What did journalism teach you about data storytelling?\n10:15 What’s your favorite headline you ever wrote?\n10:45 How do you write high quality articles quickly?\n12:30 How do you find people to follow on Mastodon?\n15:35 How do you decide what new data topics to learn about or focus on?\n20:55 What do you think about specialization in a world where everyone now codes?\n23:25 Is domain expertise in data jobs undervalued?\n27:00 What resources do you have for learning to write well?\n32:00 Have you ever had a career setback that was a blessing in disguise?\n34:05 How do you make data presentations more interesting?\n37:00 Where is the data community now that Twitter is dead? Bluesky? Threads?\n40:45 Has the evolution of graphics like the New York Times uses increased interest in data?\n42:15 How did you decide you were ready to retire?\n45:30 What data journalists should we be following?\n47:55 What factors contribute to someone deciding to retire?\n50:35 What projects can you focus on in retirement that you weren’t able to do before?\n55:35 What resources do you recommend for learning Python?\n57:25 Career advice from a data journalist\n\nLinks mentioned in this episode:\n🔗 Sharon’s retirement journey: https://nextchapter.machlis.com \n\nLinks Sharon shared in the chat:\n🔗 https://apps.machlis.com/shiny/positconf/\n🔗 One way to see public posts on Mastodon with the #rstats hashtag without needing an account:\nhttps://fosstodon.org/tags/rstats\n🔗 Guide to R: https://www.computerworld.com/article/1533880/beginners-guide-to-r-introduction.html \n🔗 How to find better content on Mastodon by Sharon: https://www.infoworld.com/article/2338712/6-ways-to-find-better-content-on-mastodon.html\n\nResources Sharon shared after the Hangout\n🔗 Suggested prompts to use LLMs to help you learn a skill, by Lilach Mollick and Ethan Mollick\nhttps://www.moreusefulthings.com/instructor-prompts\n\n🔗 Journalism-related resources for learning Python:\n1. First Python Notebook: A step-by-step guide to analyzing data with Python and the Jupyter notebook, by Ben Welsh, currently news applications editor at Retures\nhttps://palewi.re/docs/first-python-notebook/\n2. Python's Not (Just) for Unicorns, by J Soma, journalism prof at Columbia University\nhttps://littlecolumns.com/learn/python/\n\n🔗 Journalism-related resources to learn R - both a bit old but still work:\n1. R for Journalists by Andrew Ba Tran, investigative data reporter at the Washington Post\nhttps://learn.r-journalism.com/en/\n2. My book Practical R for Mass Communication and Journalism\nSeveral chapters free: https://www.machlis.com/R4Journalists/\n\n🔗 My Shiny app with a searchable list of Mastodon accounts who post about R with the #RStats hashtag: https://apps.machlis.com/shiny/rstats/\n🔗 Searchable table of all my Mastodon posts (it's a public Shiny app, you don't need a Mastodon account): https://www.machlis.com/mastodon.php\n🔗 Mosaic crochet Shiny app, the most popular app I ever published \nhttps://apps.machlis.com/shiny/crochetapp/\n🔗 Additional Shiny apps: https://apps.machlis.com/\n\nThoughts on using generative AI to help with your writing:\n🔗 How to . . . use ChatGPT to boost your writing: https://www.oneusefulthing.org/p/how-to-use-chatgpt-to-boost-your or \n🔗 I, Cyborg: Using Co-Intellgience: https://www.oneusefulthing.org/p/i-cyborg-using-co-intelligence both by Ethan Mollick"
