url = "https://www.youtube.com/watch?v=oBI8rH8GIHQ"
title = "Tidymodels: Now Also for Time-to-Event Data! - Hannah Frick"
slug = "2024-10-21_tidymodels-now-also-for-time-to-event-data-hannah-frick"
date = "2024-10-21T19:12:24Z"
description = "The tidymodels framework is a collection of packages for modeling and machine learning using tidyverse principles. In addition to regression and classification, it now also supports censored regression for time-to-event data. This type of data with potential censoring requires dedicated models and performance metrics from the field of survival analysis. While the censored package has made survival models available for a while, the recent addition of survival metrics to the yardstick package has enabled us to support this type of analysis across the entire framework. The same ease of use and vast functionality, from resampling and feature engineering to tuning, is now available for this additional modeling problem.\n\nHannah Frick is a software engineer on the tidymodels team at Posit. She holds a PhD in statistics and has worked in interdisciplinary research and data science consultancy. She is a co-founder of R-Ladies Global."
