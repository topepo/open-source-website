[[videos]]
url = "https://www.youtube.com/watch?v=JFlQA2mCm1Q"
title = "Nicholas Pylypiw | Racial Equity Dashboard: Unpacking Systemic Inequity | RStudio"
slug = "2021-02-20_nicholas-pylypiw-racial-equity-dashboard-unpacking-systemic-inequity-rstudio"
date = "2021-02-20T17:00:19Z"
description = "At Cape Fear Collective, we’re redefining what a town square looks like in our community, serving as a place where all people, organizations, and ideas can come together to effect real, lasting, and systemic change. By merging cutting edge data science with an emphasis on equity and the lived experience of our most marginalized communities, Cape Fear Collective supports Southeastern North Carolina’s front line organizations in combating poverty, racism, poor health and education outcomes, and socio-economic disparities. This talk is about how we bring that model to life through our Racial Equity Dashboard, from data sourcing, to modeling and, ultimately, action.\n\nAbout Nick:\nNick is the Director of Data Science at Cape Fear Collective, a non profit which supports Southeastern North Carolina’s front line organizations in combating poverty, racism, poor health and education outcomes, and socio-economic disparities. Prior to CFC, he honed his data science and consulting skills in the marketing analytics space, transforming the way Fortune 500+ companies (Lowe's Southwest Airlines, P&G, and many others) think about their customer strategy and value proposition. He lives in Raleigh, North Carolina."
