description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Isabel Zimmerman and Davis Vaughan, Software Engineers at Posit, to chat about the life of an open source developer, strategies for navigating complex codebases, and how to leverage AI in data science workflows. Plus, NERDY BOOKS!\n\nIn this Hangout, we explore the differences between maintaining established ecosystems like the Tidyverse as well as building new tools like the Positron IDE. Davis and Isabel (and sometimes Libby 😂) share practical advice for developers, such as the utility of AI for writing tests and \"rubber ducking\", and their various approaches to writing accessible documentation that bridges the expert-novice gap.\n\nResources mentioned in the video and zoom chat: \n🔗 Positron IDE → https://posit.co/positron/ \n🔗 Air (R formatter) → https://posit-dev.github.io/air/ \n🔗 Python Packages Book (free) → https://py-pkgs.org/ \n🔗 R Packages Book (free) → https://r-pkgs.org/ \n🔗 DeepWiki (AI tool mentioned for docs) → https://deepwiki.com/tidyverse/vroom\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about Brandon Sanderson's Cosmere books and the debate between starting with Mistborn vs. The Stormlight Archive. Are you a Cosmere fan?! Which book did you start with? (Libby started with Elantris years before picking up Mistborn Era 1 book 1, but she'd now recommend maybe starting with Warbreaker!)\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction \n04:41 \"What does a day in the life of an open source dev look like?\" \n09:43 \"What got you into building your own R packages?\" \n13:00 \"Personal tips for working with code bases you're not familiar with?\" \n16:35 \"How much of what you build is in R/Python vs. lower-level languages?\" \n19:57 \"Does Air work inside code chunks in Positron?\" \n20:12 \"Changing the Python Quarto formatter in Positron without an extension\" \n22:56 \"What do your side projects look like?\" \n26:40 \"How do you approach writing documentation?\" \n30:55 \"What interesting trends in data science are you noticing?\" \n33:38 \"How do you leverage AI in your work?\" \n37:30 \"What are the hexes on Davis's back wall?\" \n38:50 \"What career advice would you give to someone in a similar position?\" \n43:45 \"How can I be more resilient when things go wrong?\" \n47:59 \"Do you have keyboard preferences?\" \n49:25 \"What is the best way to report bugs in packages?\" \n50:56 \"Open source dev work vs. in-house dev work\" \n51:50 \"Tips for getting started with Positron\""
