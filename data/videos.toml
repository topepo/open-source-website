description = "Why should you join us for our new series: End-to-end workflows with Posit Team?\n\nRyan Johnson, Data Science Advisor at Posit and host of this month’s event, shares his three reasons below.\n\n1. You’ll see a high-level overview of Posit Team and hear about recently added features. This can be especially helpful for those new to using Posit Team or individuals looking to grow their understanding of our toolchain.\n\n2. Learn something new about how you can leverage Posit Team. Spoiler: this month, we will cover how to publish a Dash application to Posit Connect!\n\n3. This is your time to ask questions! Ask Posit experts about Posit Team capabilities, workflows, licensing, and more.\n\nIf you’d like to join us on Wednesday April 26th, simply add the event to your calendar here: pos.it/team-demo. No registration is required. We hope to see you there!\n\nFuture end-to-end workflows will run on the last Wednesday of every month.\n\nLink to the first demo, Deploying a Dash App to Posit Connect: https://youtu.be/1KEX3gZTQnE"
