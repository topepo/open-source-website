[[videos]]
url = "https://www.youtube.com/watch?v=TL0OCJVDqtI"
title = "Building Tailored Dashboards: Drill Down Visualizations and LLM-Powered Summaries with Shiny"
slug = "2025-06-25_building-tailored-dashboards-drill-down-visualizations-and-llm-powered-summaries-with-shiny"
date = "2025-06-25T21:22:54Z"
description = "Led by Isabella Velásquez, Sr Product Marketing Manager at Posit PBC\n\nScenario: Imagine the weekly scramble at DemoCo. Isabella, a lonely Marketing analyst, spends hours every Friday manually compiling marketing lead performance data from Salesforce, website logs, and event records into a sprawling Excel report. The tedious, redundant process is both a time sink and a bottleneck. \n\nMarketing Leadership, who need to identify top-performing platforms, find the mass amount of information in the report confusing. They constantly return to Isabella for clarification or, even worse, don’t reach back out and make misinformed decisions on critical budget allocation. Determined, Isabella decides it’s finally time to automate and tailor this critical dashboard, and save headaches for both Leadership and herself.\n\nIn this demo, you will learn how to:\n1. Transform redundant, manual, error-prone data compilation into an automated lead performance dashboard with Shiny\n2. Integrate diverse marketing data sources for a holistic view\n3. Build tailored marketing KPI dashboards that address Leadership’s specific questions\n4. Use drill-downs, data visualizations, and LLM-powered summaries to reduce data overload and clarify complex takeaways instantly\n5.Provide flexibility in dashboard functionality to meet diverse preferences and needs, from pre-selected insights derived directly from the data to implementing an LLM-powered analytics option\n\nHelpful resources:\n1. Demo Slides: https://github.com/ivelasq/2025-06-25_marketing-demo/blob/main/README.md\n2. Demo Marketing Dashboard: https://pub.current.posit.team/public/marketing-demo/\n3. GitHub Repo (including links to packages used: pointblank, querychat, etc.): https://github.com/ivelasq/2025-06-25_marketing-demo?tab=readme-ov-file\n\nIf you have specific follow-up questions about using Posit in your organization, we'd love to chat with you: https://posit.co/schedule-a-call/"
