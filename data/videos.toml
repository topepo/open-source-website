[[videos]]
url = "https://www.youtube.com/watch?v=_ahUlw0HzSc"
title = "Richard Vogg | Examples of simulated datasets that bring value to a data-driven company | RStudio"
slug = "2021-02-20_richard-vogg-examples-of-simulated-datasets-that-bring-value-to-a-data-driven-company-rstudio"
date = "2021-02-20T18:00:21Z"
description = "Full title: How I became a Data Composer – examples of simulated datasets that bring value to a data-driven company\n\nHow can I get the buy-in from business partners to use more advanced techniques? What can I do to make a data project involving several teams more efficient? And how can I train analysts who do not (yet) have access to sensitive data? A good data composer is skilled at creating suitable data quickly and efficiently. R has many functions and packages that help with simulating independent variables and composing those in a meaningful way. In this talk, I will share how I started creating data and how this skill helped me with solving some of the issues described above. Showing a few examples – of small, medium-sized, and large data composition – I want to encourage attendees to simulate data and enrich their data skillset.\n\nAbout Richard:\nRichard Vogg studied mathematics at TU Kaiserslautern, Germany, where he focused on statistics and obtained a Master’s degree. He worked as a Senior Business Analyst at Evalueserve in Chile for the last years, analyzing data for a major US bank. At the end of 2020, he moved back to Germany. Richard is a fan of applied statistics and storytelling with data. Outside of R, he enjoys playing the ukulele, trumpet, and didgeridoo."
