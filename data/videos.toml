title = "Brendan Graham - A Machine Learning Approach to Protect Patients from Blood Tube Mix-Ups"
slug = "2024-10-31_brendan-graham-a-machine-learning-approach-to-protect-patients-from-blood-tube-mix-ups"
date = "2024-10-31T13:56:05Z"
description = "A wrong blood-in-the-tube (WBIT) error occurs when blood collected from one patient is labeled as though it was collected from a different patient. While rare, these errors can cause serious, potentially life-threatening patient safety events. This talk is about how a team of pathology informaticists and data scientists developed and deployed a multi-analyte WBIT detection model at the Children's Hospital of Philadelphia. We describe how machine learning models can potentially identify previously undetectable WBIT errors and improve upon the current detection methodology. Furthermore, we demonstrate how using R markdown, tidymodels, vetiver, and Posit Connect allowed for rapid model iteration, reproducibility, deployment, and monitoring.\n\nTalk by Brendan Graham"
