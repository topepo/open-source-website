[[videos]]
url = "https://www.youtube.com/watch?v=YfTIwi-KOts"
title = "R at AstraZeneca: ​​upskilling our workforce through education, experience, and exposure"
slug = "2022-11-29_r-at-astrazeneca-upskilling-our-workforce-through-education-experience-and-exposure"
date = "2022-11-29T18:21:26Z"
description = "We were joined on November 29th at 12PM EST by Gabriella Rustici & Guillaume Desachy, who shared their experience about the R journey AstraZeneca is currently on.\n\nResources: \n⬢ R @ AZ: Building a Community in the Pharmaceutical Industry Blog Post: https://www.rstudio.com/blog/building-a-community-in-the-pharmaceutical-industry/\n⬢ R in Pharma YouTube videos: https://www.youtube.com/c/RinPharma\n⬢ Posit Pharma Site: https://posit.co/solutions/pharma/\n\nTimestamps:\n4:53 - Start of session\n5:41 - Paradigm shift in the pharmaceutical industry (many people are multilingual)\n6:40 - Profile of R users at AstraZeneca (varied across data science, clinicians, medical director)\n8:28 - Meet the R&D Learning & Development Team\n10:03 - 3E Framework: Education, Exposure, Experience\n12:11 - Bridging the science community and data science audience\n13:11 - We all learn differently (solutions that suit different needs & styles)\n17:31 - Index of learning (self-led index, synchronicity index)\n12:20 - Experiential Learning\n20:47 - The community of R users at AstraZeneca\n21:05 - The early days (April 2021)\n21:52 - azTidyTuesday: a playground to hone data viz skills\n24:15 - internal R conference\n25:38 - R function of the month\n27:04 - Lunch & LeaRn\n28:20 - R @ AZ 10:1\n29:44 - Communication expanded from internal social media to R @ AZ Monthly Newsletter\n31:57 - Workshops with Posit\n32:11 - AZRHotdesk - come with your questions and someone will help you solve it\n35:02 - Wish list for 2023\n38:38 - Start of Q&A section\n\nAbstract:\nThe use of R continues to become more and more important at AstraZeneca. It is a true paradigm shift that we have embarked on! This shift has required upskilling our workforce to make them proficient R users. \n\nTo do so, we are leveraging the 3Es of learning: education, experience and exposure. \n\nLearn more about their team's Data Science Educational Program and how the team at AstraZeneca has built their own strong community of R users - where learning takes place through experience and exposure.  \n\nSpeaker bios:\nGabriella is Data Science Learning Senior Director in Astrazeneca’s R&D Data Science & AI where she is responsible for developing a strategy for, and creating a centralised approach to, data science learning for R&D. Gabriella completed her PhD at the Wellcome Sanger Institute and previously run bioinformatics training programs at the University of Cambridge and the European Bioinformatics Institute, in the UK. She is passionate about designing, implementing and evaluating effective and scalable solutions to educate scientists and data science practitioners at all career stages.\n\nGuillaume is passionate about helping bring new medicines to patients by leveraging the power of statistics and precision medicine. Since October 2020, he has been doing so at AstraZeneca where he works as a Statistical Science Director. In addition, since March 2022, he have been leading a team of 15 collaborators focusing on building the community of R users at AstraZeneca, called R @ AZ.\n\nDuring the event you can ask questions anonymously through slido here as well: rstd.io/meetup-questions\n\nBlog post on R @ AZ, Building a Community in the Pharmaceutical Industry: https://www.rstudio.com/blog/building-a-community-in-the-pharmaceutical-industry/\n\nPlease note the recording of this session will be shared at the same YouTube Live link."
