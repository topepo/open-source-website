[[videos]]
url = "https://www.youtube.com/watch?v=jTVM5dZq6sM"
title = "Zhian N. Kamvar | Building Accessible Lessons with R and Friends | RStudio (2022)"
slug = "2022-10-24_zhian-n-kamvar-building-accessible-lessons-with-r-and-friends-rstudio-2022"
date = "2022-10-24T17:05:41Z"
description = "The Carpentries is a global community of volunteers who collaboratively develop and deliver lessons to build capacity in data and coding skills to researchers worldwide. In the recent redesign of our lesson infrastructure (serving more than100 lessons, used daily by more than 5K learners), we replaced embedded Jekyll templates with a workbench of modular and accessible packages using R and Pandoc. By leveraging renv and knitr for R-based lessons, we provide a seamless and collaborative lesson development experience that maximizes reproducibility and minimizes frustration so authors can focus on the contents, not the tooling. We demonstrate how anyone can use our infrastructure to build customised and accessible sites for their own lessons or tutorials.\n\nTalk materials are available at https://github.com/zkamvar/rstudio-conf-2022\n\nSession: It takes a village: building communities of practice"
