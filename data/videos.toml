date = "2024-11-26T16:35:11Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Michael Hausinger, Scientist in Research and Development at Dow, to chat about his non-traditional career path to becoming a data science leader. We talked about how learning R through Posit Academy helped him to transition from bench science to building tools that enhance the efficiency of other scientists at Dow. Michael shared valuable insights about the importance of finding the right tools for the job, effectively communicating the value of data science to stakeholders, and building a supportive data science community.\n\nIn this Hangout, we explore the growing importance of data skills in non-traditional fields like chemical engineering. Michael's story shows how individuals with diverse backgrounds can leverage data science tools like R and python to make a significant impact in their organizations. The conversation highlights the need for companies to invest in up-skilling their workforce in data science, and the value of creating supportive communities of practice where individuals can learn and grow together. \n\nResources mentioned in the video and zoom chat:\n🔗 Dow Customer Spotlight → https://posit.co/about/customer-stories/dow/\n🔗 Posit Academy → https://posit.co/products/enterprise/academy/\n🔗 Upskill to R Programming with Posit & Atorus Research → https://posit.co/blog/upskill-to-r-programming-with-posit-and-atorus-research/\n🔗 Creating Business Value with Community at Dow → https://youtu.be/SNneEKmSyyU?feature=shared\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about transitioning into a data-focused role without a formal degree in data science. Michael shared he doesn’t have a data science degree specifically, as did many others! Let us know below if you’d like to hear more about this topic\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
