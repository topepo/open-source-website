[[videos]]
url = "https://www.youtube.com/watch?v=7Zrx1N2VgfM"
title = "Jason Foster @ Marathon Asset Management | Data Science Hangout"
slug = "2024-09-09_jason-foster-marathon-asset-management-data-science-hangout"
date = "2024-09-09T20:20:32Z"
description = "We were recently joined by Jason Foster, Director at Marathon Asset Management.\n\nIn this episode, Jason talks about his journey into risk management and the evolving role of code-first analytics that he's experienced in finance. He covers various aspects of risk management, describes some of his experiences in package development, and shares his approach to cross-functional communications with non-technical colleagues (you’ve got to be able to speak their language).\n\nJason also highlights the impacts that community involvement had on his professional growth. You'll hear him discuss his experiences with the R in Finance conference and how presenting his work and engaging with the community has led to valuable feedback and personal development. For those navigating today’s competitive job market, he offers advice on how to stand out by punctuating your strong quantitative skills with effective communication and really showing your passion for the field and its unique challenges.\n\nTimestamps:\n03:50 - About Jason and his role\n11:05 - What is risk management?\n14:30 - How was your transition from R to Python?\n19:00 - How do you help your team learn to use code-based tools?\n22:10 - Was being a trainer part of your role or did your role grow in that direction organically?\n25:30 - How do you share code-based solutions with non-coding colleagues?\n32:15 - How do you convince stakeholders to listen to you?\n35:20 - How do you get the right data for things that are hard to quantify?\n42:30 - How do you work across teams that have poor working relationships?\n45:50 - What is the next big thing is coding that excites you?\n50:00 - How has your involvement in the community impacted your career?\n57:00 - How can someone with less experience stand out in this crazy job market?\n\nLinks from this episode:\nJason Foster on LinkedIn: https://www.linkedin.com/in/jasonjfoster/\nR in Finance Conference: https://www.rinfinance.com/\nJason's {roll} package: https://github.com/jasonjfoster/roll (it's also on CRAN!)"
