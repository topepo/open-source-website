[[videos]]
url = "https://www.youtube.com/watch?v=SVZ1ZbtATzU"
title = "We want GREAT tables! | Richard Iannone & Michael Chow | Data Science Hangout"
slug = "2025-01-16_we-want-great-tables-richard-iannone-michael-chow-data-science-hangout"
date = "2025-01-16T19:00:16Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Rich Iannone and Michael Chow, software engineers at Posit, to chat about their experiences building GT and Great Tables, how they drive community engagement around their packages, and their career advice for package developers.\n\nGT and Great Tables are R and Python packages for creating static tables in R and Python. They were created to fill a need for a good, maintained solution for generating tables with different output types from data frames. They've gained loads of popularity, and have an active community of users!\n\nResources mentioned in the video and zoom chat: \n🔗 Great Tables Blog → https://posit-dev.github.io/great-tables/blog/ \n🔗 2024 Table Contest Winners → https://posit.co/blog/2024-table-contest-winners/ \n🔗 Contributing to Public Transit Data Analysis and Tooling → https://posit-dev.github.io/great-tables/blog/open-transit-tools/ \n🔗 Tables as Powerful Representational Tools → https://www.researchgate.net/publication/363345970_Tables_as_Powerful_Representational_Tools \n🔗 The MockUp - 10+ Guidelines for Better Tables in R → https://themockup.blog/posts/2021-01-13-10-guidelines-for-better-tables-in-r/ \n🔗 Show Me the Numbers by Stephen Few → https://analyticspress.com/smtn.php \n🔗 Excel spreadsheets to gt package called {forgts} → https://github.com/luisDVA/forgts \n🔗 What They Forgot to Teach You About R → https://rstats.wtf/ \n🔗 David Robinson Talk called \"The unreasonable effectiveness of public work\" → https://www.youtube.com/watch?v=th79W4rv67g \n🔗 Publication quality tables in 2024 → https://posit.co/blog/what-we-did-with-publication-quality-tables-in-2024/ \n🔗 Great Tables Design Philosophy → https://posit-dev.github.io/great-tables/blog/design-philosophy/ \n🔗 gtsummary-to-excel → https://www.pipinghotdata.com/posts/2024-07-26-gtsummary-to-excel/ 🔗 happy git with R → https://happygitwithr.com/ \n🔗 freeCodeCamp - how to contribute to open source → https://github.com/freeCodeCamp/how-to-contribute-to-open-source/\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about how people manage their personal and work GitHub accounts, and whether to have one account for all their work or separate accounts for each employer. Let us know YOUR thoughts on this topic below!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\n#pythoncontent"
