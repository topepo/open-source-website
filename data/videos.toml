[[videos]]
url = "https://www.youtube.com/watch?v=wRduxqcPBLE"
title = "Navigating technology for data teams | Stanislav Seltser | Data Science Hangout"
slug = "2024-12-20_navigating-technology-for-data-teams-stanislav-seltser-data-science-hangout"
date = "2024-12-20T18:00:42Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Stanislav Seltser, VP of Enterprise Architecture and AI Infrastructure at State Street Global Advisors, to chat about how to strategically approach the business leadership about investing in new tools, forecasting technology obsolescence for data work, and fostering innovation and creativity in data science teams.\n\nIn this Hangout, we explore the factors that can help forecast when a technology will become obsolete, including the rate of commits to open-source projects and the frequency of vendor releases. Stanislav also shares his approach to evaluating technology based on usability, cost, and maintainability, as well as how to ensure that chosen technologies provide a return on investment. Stanislav recommends treating the need for a new tool the way you would if you were pitching a start-up, with a business plan and a technical prototype, to really show your understanding of what you're asking for.\n\nStan also shared some solid career advice, so stick around for that. No surprise here, his advice starts with community - being social and connecting with as many people as you can - but he really emphasizes mentoring and helping others succeed. We agree, Stan!\n\nResources mentioned in the video and zoom chat: \n🔗 Libby's blog post on career advice from the Data Science Hangout → https://posit.co/blog/lessons-from-four-senior-leaders-in-the-data-space/ \n🔗 Databricks + Spark documentation for sparklyr → https://spark.posit.co/deployment/databricks-connect.html \n🔗 Rachael's post on communicating the ROI of data science projects → https://posit.co/blog/tips-for-communicating-roi-of-data-science-projects/ \n🔗 Jim Hester's talk on dependencies → https://youtu.be/mum13N7CGUI?feature=shared\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was a conversation around the struggles of getting out of Jupyter notebooks for developing coding projects in python and R. Do you love notebooks? Are you trying to get away from them, too? Opinions from the Hangout attendees were mixed and the discussion was illuminating! Let us know below if you’d like to hear more about this topic.\n\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
