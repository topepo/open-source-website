[[videos]]
url = "https://www.youtube.com/watch?v=hI-MCrupbtY"
title = "pandas vs Polars DataFrames? 👨🏻‍🍳 #python"
slug = "2024-11-19_pandas-vs-polars-dataframes-python"
date = "2024-11-19T13:43:25Z"
description = "Here's Marco Gorelli's take on why lazy execution matters 🎂 🎂 🎂\n\nSo with pandas, everything happens eagerly. You give the library some instructions, and it evaluates your instructions the moment you give them.\n\nWith Polars, there's an option to give it some instructions, it can wait a bit, and then do them all together in the most optimal way that it can detect. \n\nIf I was to tell you to cook me a recipe 👨‍🍳 \n...and I gave you the steps one at a time \n...and for each step, you have to go out and buy the ingredients that you need for that step \n\n^ This is going to be a pretty inefficient way of making a cake \n\nBut if I can give you the recipe beforehand:\n...you can buy all the ingredients together\n...you can maybe do 2 steps at the same time\n\n^ This is going to be a much nicer cooking experience 😊"
