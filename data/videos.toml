description = "We're so excited to introduce Positron, a free, next-generation data science IDE that makes it easy to work in both R and Python. Positron builds on our years of experience developing RStudio and is a fork of VS Code, designed specifically for data work. This means you get a modern coding interface with features tailored for data science, like a built-in data explorer, AI assistance, interpreter management, and more.\n\nThis is our 2nd event in our Positron series and focused on AI-Powered Data Science.\n\nHere at Posit, we strive to create products where AI works with you, not against you. In efforts to continue this mission, we are excited to introduce agentic AI capabilities in Positron, our new, free code editor for R and Python, that are designed from the ground up to follow these principles. Positron’s AI capabilities automate the tedious parts of the data science workflow, but always keep you, the expert, in control.\n\n00:00 Introduction\n00:32 What is Positron? (The Next-Gen Data Science IDE)\n03:43 Introducing Positron Assistant\n05:10 Bring your own LLM\n05:47 Your environment as context\n07:19 Inline code suggestions\n07:58 Introducing Databot\n08:22 The WEAR loop\n10:15 Demo time\n10:56 Opening Positron Pro in Posit Team\n14:29 Opening a new folder in Positron\n15:22 Cloning a repo from GitHub\n17:24 Positron icons\n19:15 Positron search bar and command palette\n20:18 Changing interpreters and opening a Quarto document\n21:30 Running code and populating the Variables Pane\n22:41 Using the Data Explorer\n25:28 Creating a plot and debugging with Positron Assistant\n30:46 Editing code using inline code suggestions\n34:42 Sharing a Quarto document\n36:12 Opening Databot\n37:02 Exploring data with Databot\n43:37 Creating a report using Databot findings\n45:12 Wrap up\n\nAdditional resources:\n✨ GitHub Repo for this Example: https://github.com/posit-dev/positron-ai-workshop\n✨ Getting Started with Positron: Quick Tour: https://posit.co/resource