url = "https://www.youtube.com/watch?v=-zhTXiiCj58"
title = "Andy Choens | R in Epidemiology | Posit"
slug = "2021-11-19_andy-choens-r-in-epidemiology-posit"
date = "2021-11-19T19:05:44Z"
description = "Connecting Primary Care Providers to their own data\nPresentation by Andy Choens\n\nThe Electronic Health Record, or EHR, is a digital replacement for traditional paper medical charts. And while today's EHRs are an effective replacement for digital records and have increased clinical data sharing, they do not provide the level of comprehensive clinical decision support envisioned by early proponents.\n\nAcuitas is a consulting firm that works with providers to unlock the hidden value in their EHRs. From helping providers manage chronic diseases, succeeding in value-based payment plans, and responding to crises such as Covid 19, Acuitas helps providers succeed by connecting the data in the EHR to claims, Hixny (the local HIE), and other crucial data sources.\n\nTo help providers \"connect the dots\", Acuitas provides custom reports inside of and outside of the EHR. Some of these reports are patient-specific. Others are at the level of their practice or specific populations of interest such as patients with diabetes.\n\nAcuitas is able to do this by using an agile, dynamic process and a collection of largely open-source tools including R and Python."
