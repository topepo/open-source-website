description = "The Data Science Lab is a live weekly call. Register at pos.it/dslab! Discord invites go out each week on lives calls. We'd love to have you! \n\nThe Lab is an open, messy space for learning and asking questions. Think of it like pair coding with a friend or two. Learn something new, and share what you know to help others grow.\n\nOn this call, Libby Heeren is joined by Posit engineers Isabel Zimmerman and Davis Vaughan as they share some of their favorite settings in Positron, a super customizable data science IDE. Come laugh with us as we can't seem to figure out that VSCode calls rainbow parentheses \"bracket pair colorization\" 😂\n\nHosting crew from Posit: Libby Heeren, Isabella Velasquez, Daniel Chen, Isabel Zimmerman, Davis Vaughan\n\nResources from the hosts and chat:\n🔗 Install Positron: https://positron.posit.co/\n🔗 Positron docs on keyboard shortcuts: https://positron.posit.co/keyboard-shortcuts.html\n🔗 Nathan Jeffery's \"click to open a .RDS file\" keybinding: https://nathan-jeffery.netlify.app/blog/2025-08-26-read-rds-positron/\n🔗 Positron R pipe setting (paste in browser and it'll open in Positron): positron://settings/positron.r.pipe\n🔗 One of Dan Chen's faves, the native tab feature in VSCode + Positron: https://lucasprag.com/posts/underrated-vscode-feature-native-tabs/\n🔗 The list of RStudio keybindings that you get when you turn on RStudio keybindings in Positron: https://positron.posit.co/migrate-rstudio-keybindings.html\n🔗 Indent rainbow extension: https://open-vsx.org/extension/oderwat/indent-rainbow\n🔗 Rainbow brackets setting (paste in browser and it'll open in Positron): positron://settings/editor.bracketPairColorization.enabled\n🔗 Setting hierarchy (User vs Workspace settings) in Positron: https://code.visualstudio.com/docs/configure/settings#_settings-precedence\n🔗 Rainbow CSV extension (not by Posit): https://marketplace.visualstudio.com/items?itemName=mechatroner.rainbow-csv\n🔗 Positron +1ePositron, an extension pack for dev and data science, by Garrick Aden-Buie: https://open-vsx.org/extension/grrrck/positron-plus-1-e\n🔗 Publishing from VS Code or Positron: https://docs.posit.co/connect/user/publishing-positron-vscode/\n🔗 Posit Connect Cloud plans: https://connect.posit.cloud/plans\n🔗 Enter Folder extension that Libby mentions: https://open-vsx.org/extension/xiangda/enter-folder\n🔗 Catppuccin themes (shared by Rory Lawless, and now some of Libby's favorites!): https://open-vsx.org/extension/Catppuccin/catppuccin-vsc\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nThe Lab: https://pos.it/dslab\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for learning with us! 💛\n\nTimestamps\n00:00 Introduction \n00:42 Guest Introductions: Isabel and Davis \n02:41 Positron Settings overview \n04:11 How to enable \"Format on Save\" \n04:34 \"How do I open settings in JSON or UI?\" \n05:10 Auto Save on focus change \n08:26 Enabling RStudio key bindings \n09:28 \"Why doesn't the cursor move with code edits?\" \n12:18 User vs. Workspace settings \n14:34 Creating and using Profiles \n16:13 \"Can I use the magrittr pipe with Control+Shift+M?\" \n17:23 Searching and managing keyboard shortcuts \n19:42 Creating custom code snippets \n21:31 The Indent Rainbow extension \n24:04 Enabling rainbow parenthesis/brackets \n25:08 Managing Python and R interpreters \n26:32 Rearranging and hiding UI panes \n28:04 Rainbow CSV and favorite extensions \n29:26 Using the Enter Folder extension \n31:05 Understanding the setting hierarchy \n32:48 Adding symbols to Quick Open search \n36:00 \"Is there a way to shift focus using keyboard shortcuts?\" \n38:04 Modifying keybindings JSON for specific languages \n39:20 \"How do you find trustworthy extensions?\" \n43:11 \"How can I publish to shinyapps.io from Positron?\" \n44:03 Deploying with Posit Publisher and Connect Cloud \n48:32 Customizing themes with RainGlow extension\n50:36 \"Is there an Import Data Set wizard in Positron?\" \n53:01 Conclusion and community resources"
