title = "Putting an {ellmer} AI in production with the blessing of IT (Andrie de Vries) | posit::conf(2025)"
slug = "2025-11-07_putting-an-ellmer-ai-in-production-with-the-blessing-of-it-andrie-de-vries-positconf2025"
date = "2025-11-07T16:14:18Z"
description = "Putting an {ellmer} AI in production with the blessing of IT\n\n💬 Speaker(s): Andrie de Vries \n\nAbstract: \nI had an idea to automate a process by letting an AI extract information from PDF attachments.  Writing the 20 lines of  {ellmer} code was very simple. My users loved the idea. But IT had different feelings, especially initially. It took multiple design changes to get IT comfortable with running experiments in our financial system. They need a solution that is secure, with guardrails, wouldn’t leak sensitive information and could be easily maintained. We wrote a simple browser extension to reduce the friction of copy/paste between different systems. If you want to put an AI in production, make sure you consider the impact on other teams, in particular IT and Information security.\n\nposit::conf(2025) Subscribe to posit::conf updates: https://posit.co/about/subscription-management/\n\nKeywords: production, AI, LLM"
