[[videos]]
url = "https://www.youtube.com/watch?v=QnLSrV5cgqU"
title = "Empowering individuals through AI tools, technologies, and custom apps | Chris Engelhardt @ Gen Re"
slug = "2024-10-01_empowering-individuals-through-ai-tools-technologies-and-custom-apps-chris-engelhardt-gen-re"
date = "2024-10-01T20:30:01Z"
description = "“Empathy, I think, is a hallmark of a well functioning team.” Chris Engelhardt might lead data teams and AI initiatives, but he’s also got a PhD in Social Psychology and a keen interest in helping people work more happily. This episode of the Hangout went to amazing and unexpected places as we talked about AI use cases, getting buy-in from leadership, and building stakeholder trust alongside building psychological safety in your teams, code review anxiety, and team wellbeing. If you’re curious about enterprise level AI use cases, or how Posit integrates with Databricks, there’s lots to learn from Chris! We hope you’ll join us live soon!\n\nTimestamps\n02:35 About Chris Engelhardt Sr. Data and AI Operations Manager at Gen Re\n05:55 How do you get people engaged in a vision for AI?\n08:10 What are some use cases for AI?\n11:40 How do you manage international data science teams?\n13:15 What one AI skill data analysts should learn?\n14:50 What people skills should data analysts and data scientists learn?\n16:25 How do you get buy-in from leadership and data scientists for AI initiatives?\n18:25 What is AI? Where do I start? What are pitfalls of AI to avoid?\n22:40 Integrating Posit with Databricks, Unity Catalog, and pins\n25:55 How do you handle it when two different teams manage Posit versus Databricks?\n27:30 What if AI tools provide inaccurate results? How do you regain trust with stakeholders?\n29:50 How do you protect your own and your data team’s wellbeing at work?\n34:20 How has AI changed hiring and job descriptions? Has AI changed data roles?\n36:30 Code review anxiety and psychological safety around code critiques and pull requests\n40:00 Helping your team feel safe and willing to talk about things and collaborate\n41:40 How do you encourage psychological safety in a cross-cultural international team?\n47:15 How do you use Posit pins with Databricks?\n49:50 Career advice for working in data - you can’t control everything, but you control your effort\n51:15 Don’t underestimate the value of connecting with others\n53:33 Does using pins with Databricks Unity Catalog present a challenge with data governance?\n56:45 How do you encourage learning and upskilling within your team?\n\nResources mentioned in this episode:\n\nCode Review Anxiety Toolkit: https://developer-success-lab.gitbook.io/code-review-anxiety-workbook-1/part-three-mini-code-review-anxiety-toolkit/introduction \n\nMatthew Montero from Gen Re’s episode: https://posit.co/data-science-hangout/56-matthew-montero/ \n\nSchedule time to chat about Databricks and Posit here: https://posit.co/schedule-a-call/?booking_calendar__c=Databricks \n\nPosit Team Workflow Demos: https://pos.it/team-demo \n\nThe Psychological Safety Handbook Daren mentioned: https://handbook.gitlab.com/handbook/leadership/emotional-intelligence/psychological-safety/"
