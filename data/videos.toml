[[videos]]
url = "https://www.youtube.com/watch?v=7aFx83AiBzc"
title = "Data Science at the Census Bureau | Jessica Klein | Data Science Hangout"
slug = "2025-03-20_data-science-at-the-census-bureau-jessica-klein-data-science-hangout"
date = "2025-03-20T02:45:01Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Jessica Klein, Data Scientist at the Census Bureau, to chat about open-source adoption at the Census Bureau, the growth of R and Python communities within the agency, training opportunities and internal support systems, and working with complex census datasets.\n\nIn this Hangout, Jessica talked about the agency's move towards the Cloud and its efforts to reduce reliance on proprietary software like SAS and ArcGIS. She shared insights into the internal support system, mentioning training programs, workshops, and resources for using the Census API. She also discussed the challenges and strategies involved in transitioning from SAS to R & Python, including the importance of double coding for validation with mathematical statisticians and the increasing use of version control with Git GitLab. The development of internal technical support groups for R and Python was a key element in fostering knowledge sharing and breaking down silos within the agency.\n\nResources mentioned in the video and zoom chat: \n🔗 Jessica Klein's LinkedIn → https://www.linkedin.com/in/jessica-klein-8a5a35196/ \n🔗 tidy census package → https://walker-data.com/tidycensus/ \n🔗 tigris package → https://github.com/walkerke/tigris\n🔗 Fast Link package for probabilistic linking →  https://github.com/kosukeimai/fastLink\n🔗 StatQuest YouTube Channel → https://www.youtube.com/channel/UCtYLUTtgS3k1Fg4y5tAhLbw\n🔗 3Blue1Brown YouTube Channel → https://www.youtube.com/c/3blue1brown\n🔗 {sf} package for R spatial analysis → https://r-spatial.github.io/sf/ \n🔗 Resources on spatial analysis in R → https://rspatial.org/ and https://rspatialdata.github.io/index.html and https://asdar-book.org/ \n🔗 Apache Superset (open-source visualization tool) → https://superset.apache.org/\n🔗 Coding it Forward Civic Digital Fellow program → https://blog.codingitforward.com/tagged/civic-digital-fellowship\n\nResources shared directly by Jessica in the chat:\n🔗 Analyzing US Census Data: Methods, Maps, and Models in R by Kyle Walker: https://walker-data.com/census-r/index.html\n🔗 Webinar series on using tidycensus for analyzing and mapping Census data: https://ssdan.net/events/the-2025-ssdan-webinar-series-2023-acs-data-with-r-mapping-tools-and-the-2020-census/\n🔗 A Guide to Working with US Census Data in R: https://rconsortium.github.io/censusguide/\n🔗 Using the API requires a getting an API Key, which you can get for free here: https://api.census.gov/data/key_signup.html\n🔗 See here for the Census Data API User Guide: https://www.census.gov/content/dam/Census/data/developers/api-user-guide/api-guide.pdf\n🔗 Explore the ABCs of the Census API with Census Bureau staff: https://www.youtube.com/watch?v=JbThy7GUg3k\n🔗 See here for a tutorial on Census API Basics: Simple Steps to Better Data Access: https://www.youtube.com/watch?v=d-FJ2IyVfdk\n🔗 See here for a tutorial on Using the API to Get All Results for an ACS Table: https://www.census.gov/library/video/2020/using-api-all-results-for-acs-table.html\n🔗 See here for a tutorial on Using the API to Get Results for Multiple Estimates: https://www.census.gov/library/video/2020/using-api-results-for-multiple-estimates.html\n🔗 Explore ACS Data Stories–Stats in Action! to see how the public is using ACS data: https://www.census.gov/programs-surveys/acs/about/acs-data-stories.html\n🔗 Visit the Slack show-and-tell channel and show how you use Census data: https://app.slack.com/client/T6AL55003/CRY4R9R7S\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the enthusiastic reception and usefulness of the tidycensus package for accessing and working with census data in R, with many attendees expressing their appreciation and sharing resources related to it. Let us know below if you’d like to hear more about it!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\nFollow Us Here: \nWebsite: https://www.posit.co \nHangout: https://pos.it/dsh \nLinkedIn:  https://www.linkedin.com/company/posit-software \nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛"
