[[videos]]
url = "https://www.youtube.com/watch?v=L5_4kuoiiKU"
title = "John Burn-Murdoch | Reporting on and visualising the pandemic | RStudio"
slug = "2021-02-18_john-burn-murdoch-reporting-on-and-visualising-the-pandemic-rstudio"
date = "2021-02-18T21:00:11Z"
description = "John will discuss the lessons he's learned reporting on and visualising the pandemic, including the world of difference between making charts for a technical audience and making charts for a mass audience. You'll learn from his experience navigating the highly personal and political context within which people consume and evaluate graphics and data, and how that can help us better design and communicate with visualisations down the pipeline for the future.\n\nAbout John:\nJohn Burn-Murdoch is the Financial Times’ senior data visualisation journalist, and creator of the FT’s coronavirus trajectory tracker charts. He has been leading the FT’s data-driven coverage of the pandemic, exploring its impacts on health, the economy and wider society. When pandemics are not happening, he also uses data and graphics to tell stories on topics including politics, economics, climate change and sport, and is a visiting lecturer at the London School of Economics."
