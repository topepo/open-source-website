[[videos]]
url = "https://www.youtube.com/watch?v=MpjWTY-K51E"
title = "Bayesian MMM and silly side projects | Ryan Timpe | Data Science Hangout"
slug = "2025-12-12_bayesian-mmm-and-silly-side-projects-ryan-timpe-data-science-hangout"
date = "2025-12-12T17:55:24Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Ryan Timpe, a Lead Data Scientist, to chat about Marketing Mix Modeling (MMM), silly data science side projects like brickr (see the link below to his 2020 posit::conf() talk), the benefits of working out loud, and using LLMs (Large Language Models) for data science coding (something he gave a whole talk about at posit::conf(2025)).\n\nIn this Hangout, we explore a bit of what Ryan does, including Marketing Mix Modeling (MMM) and helping business partners better use their data. He shared that his work utilizes Bayesian methods to manage the complexity and high seasonality of his data, especially the Q4 holiday-buying spikes seen in most retail sales data. Using Bayesian priors helps keep the models within constraints and prevents overfitting. The foundation of the internal MMM package that Ryan developed uses tidy models, and you can check out the link to his 2023 posit::conf() talk to hear more about his model pipeline! The theme here is that Ryan gives lots of great talks - go check them out!\n\nResources mentioned in the video and zoom chat: \n🔗 Ryan Timpe's brickr GitHub Repository → https://github.com/ryantimpe/brickr \n🔗 Ryan Timpe's 2020 talk on learning R with silly projects → https://youtu.be/oOG-aXP_ICI \n🔗 Ryan Timpe's 2023 talk on model pipelines → https://youtu.be/R7XNqcCZnLg\n🔗 Ryan Timpe's 2025 talk on learning from LLM pitfalls → https://youtu.be/vJrIahZWCw4 \n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the importance of working out loud and publishing (even imperfect) data science projects. Attendees emphasized that overcoming their inner critic and sharing work helps with communication and professional development (but can be super challenging still). One participant shared that they got their current role by creating a fake MMM project with fake data, but that it showed their interviewer they could take initiative!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps\n00:00 Introduction of Ryan\n04:41 \"What kind of MMM do you guys do?\" \n07:01 \"What was your favorite silly project that you did?\" \n08:06 \"What is brickr?\" \n11:11 \"Do you think brickr helped you get the job you have now?\" \n14:23 \"How do you scope your side projects?\" \n17:42 \"What do you recommend for setting up a Python environment?\" \n21:16 \"When do you recommend not using LLMs, and why?\" \n24:19 \"How do you shut up your own inner critic?\" \n28:00 \"What kind of data do you use for your LLMs and models?\" \n30:32 \"Do you use open source MMM package like Meridian or Robyn?\" \n35:13 \"How do you communicate complex modeling nuances to non-technical stakeholders?\" \n38:06 \"Does your love for LEGO help you build code better?\" \n41:00 \"What drives priority for what your team works on next?\" \n43:21 \"What resources do you recommend for learning marketing analytics?\" \n44:46 \"What tools do you use for Bayesian analysis?\" \n45:50 \"Was your career move to the LEGO Group intentional or accidental?\" \n47:49 \"What is your end product delivery?\" \n49:21 \"What tool do you use to implement a Bayesian MCMC model?\" \n49:52 \"How do you make model-based reporting faster and more automated?\" \n51:31 \"Do you have a piece of career advice that's meaningful to you?\""
