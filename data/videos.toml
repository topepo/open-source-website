title = "Matthew Kay | Visualizing distributions and uncertainty using ggdist | RStudio (2022)"
slug = "2022-10-24_matthew-kay-visualizing-distributions-and-uncertainty-using-ggdist-rstudio-2022"
date = "2022-10-24T17:07:59Z"
description = "I propose a talk on visualizing distributions and uncertainty using {ggdist}. I will describe how to think systematically about distributional visualization as mappings of PDFs, CDFs, and quantile functions onto aesthetics, and how support for this enables creative and easy exploration of the space of possible uncertainty visualizations. I will highlight features like true gradient support in R 4.1, support for distribution vector datatypes, and the automatic binwidth- selecting geom_dots(). I expect to leave the audience with: (1) a systemic way to think about visualizing distributions and uncertainty in the grammar of graphics and (2) an understanding of how to actually do it using ggdist.\n\nTalk materials are available at https://www.mjskay.com/presentations/rstudio-conf-2022-talk.pdf\n\nSession: Lightning Talks"
