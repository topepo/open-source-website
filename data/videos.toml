[[videos]]
url = "https://www.youtube.com/watch?v=E7uygsmx3-Y"
title = "Simon Couch | tidymodels/stacks: A Grammar for Stacked Ensemble Modeling | RStudio"
slug = "2021-02-20_simon-couch-tidymodelsstacks-a-grammar-for-stacked-ensemble-modeling-rstudio"
date = "2021-02-20T18:00:03Z"
description = "Full title: tidymodels/stacks, Or, In Preparation for Pesto: A Grammar for Stacked Ensemble Modeling\n\nThrough a community survey conducted over the summer, the RStudio tidymodels team learned that users felt the #1 priority for future development in the tidymodels package ecosystem should be ensembling, a statistical modeling technique involving the synthesis of multiple learning algorithms to improve predictive performance. This December, we were delighted to announce the initial release of stacks, a package for tidymodels-aligned ensembling. A particularly statistically-involved pesto recipe will help us get a sense for how the package works and how it advances the tidymodels package ecosystem as a whole.\n\nAbout Simon:\nSimon Couch is an R developer and statistics student at Reed College, where he is entering the final semester of his undergraduate degree. He co-authors and maintains R packages including broom, infer, and stacks, leads trainings and workshops as an RStudio-certified tidyverse trainer, and researches in algorithmic data privacy. He interned on the RStudio tidymodels team in summer 2020, and is currently applying to doctoral programs in statistics."
