title = "Gabriel Morrison - Open Source Software in Action: Expanding the Spatial Equity Data Tool"
slug = "2024-10-31_gabriel-morrison-open-source-software-in-action-expanding-the-spatial-equity-data-tool"
date = "2024-10-31T13:56:05Z"
description = "The Urban Institute’s Spatial Equity Data Tool enables users to upload their own data and quickly assess whether place-based programs and resources—such as libraries or Wi-Fi hotspots—are equitably distributed across neighborhoods and demographic groups. Our (forthcoming) API and R package also enable users to seamlessly incorporate equity analytics into existing workflows and exciting new tools. \n\n In this talk, I will share how we've expanded access to the tool using multi-language software. I'll discuss our updates to Python-based tool and API; R package wrapping the API; and Quarto-based documentation. I will also share how our partners in the City of Los Angeles have used the API and RShiny to build a custom budget equity tool.\n\nTalk by Gabriel Morrison\n\n\nSlides: https://urbanorg.box.com/s/vecuwuwhtj1zkha09nznq9p0qxdttl9r\nGitHub Repo: https://github.com/UrbanInstitute/ui-equity-tool"
