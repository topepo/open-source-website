[[videos]]
url = "https://www.youtube.com/watch?v=Fja5DIN3uTw"
title = "Mine Çetinkaya-Rundel | Teaching R online with RStudio Cloud | RStudio (2020)"
slug = "2021-03-04_mine-cetinkaya-rundel-teaching-r-online-with-rstudio-cloud-rstudio-2020"
date = "2021-03-04T16:00:09Z"
description = "RStudio Cloud is a lightweight and easy to set up / use solution to teaching R online, in the browser. In this webinar we will walk you through the steps of setting up your course on RStudio Cloud, highlighting the various functionalities for teachers and students. We will also discuss best practices and provide an opportunity for the audience to experience the setup first hand. Additionally, we highlight a suite of ready to use resources for teaching an introduction to data science and statistical thinking course using R.\n\nWebinar materials: https://rstudio.com/resources/webinars/teaching-r-online-with-rstudio-cloud/\n\nAbout Mine:\nMine Çetinkaya-Rundel is Professional Educator and Data Scientist at RStudio as well as Senior Lecturer in the School of Mathematics at University of Edinburgh (on leave from Department of Statistical Science at Duke University). Mine’s work focuses on innovation in statistics and data science pedagogy, with an emphasis on computing, reproducible research, student-centered learning, and open-source education as well as pedagogical approaches for enhancing retention of women and under-represented minorities in STEM. Mine works on integrating computation into the undergraduate statistics curriculum, using reproducible research methodologies and analysis of real and complex datasets. She also organizes ASA DataFest and works on the OpenIntro project. She is also the creator and maintainer of datasciencebox.org and she teaches the popular Statistics with R MOOC on Coursera."
