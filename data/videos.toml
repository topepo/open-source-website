[[videos]]
url = "https://www.youtube.com/watch?v=yb_mBJz3iSc"
title = "Nathan Stephens | Scaling Spreadsheets with R | RStudio"
slug = "2021-10-19_nathan-stephens-scaling-spreadsheets-with-r-rstudio"
date = "2021-10-19T02:14:56Z"
description = "Scaling Spreadsheets with R\nPresented by Nathan Stephens\n\nExcel (and spreadsheets in general) is a powerful tool for analyzing and visualizing data, especially when your data is small and the complexity of your work is manageable.\n\nWhat happens when your workbook grows larger and more complex?\n\nWhat do we mean by “too large”?\n• Too many rows - 1,048,576\n• Too many columns - 16,384\n• Too many workbooks - 255\n• Some combination thereof\n• Workbooks are difficult to share because the file size is so large\n\nWhat do we mean by \"more complex”?\n• The workbook comes from many data files or data sources\n• The workbook requires functions that are not built-in\n• The workbook contains a lot of VBA code\n• The workbook contains interactive elements\n• The workbook requires many user inputs\n• Many collaborators are working on the same workbook\n\nIn this webinar, we will discuss the benefits of using the R programming language when Excel gets overloaded. We will demonstrate how to use R in two situations where traditional Excel workbooks often get overloaded:\n\n(1) Reading and analyzing data files that contain millions of records\n(2) Automating interactive dashboards that are built on multiple data files\n\nNathan's slides and examples here: https://github.com/sol-eng/babynamesByState/tree/master/presentation\n\nIf you'd like to join future meetups, join this group here: https://www.meetup.com/RStudio-Enterprise-Community-Meetup/"
