[[videos]]
url = "https://www.youtube.com/watch?v=mr3TmyXOG_g"
title = "Data Science Hangout | David Meza, NASA | People analytics for getting to the moon"
slug = "2022-06-28_data-science-hangout-david-meza-nasa-people-analytics-for-getting-to-the-moon"
date = "2022-06-28T13:24:16Z"
description = "We were joined by David Meza, AIML R&D Lead, People Analytics at NASA.\n\nWe had a great chat about people analytics for getting to the moon and beyond 🚀\n\nHere are a few snippets:\n\nWhat areas do you focus on in people analytics? (5:19)\n\nA lot of our focus is around natural language processing, graph algorithms, and graph databases. We create a knowledge graph & apply various algorithms to be able to deliver answers.\n\nAn example of this is around our skills and competency capabilities. Trying to get back to the moon and onto Mars, we need to identify the various skills and competencies that we have in our individuals. From a human perspective, that’s very labor intensive. We’re trying to use some of the concepts I’ve mentioned to be able to extract NASA-specific competencies from individuals or people applying for jobs to see how they align to our workforce.\n\nWe’re starting to  develop pipelines and methods to say:\n• We’ve got gaps here\n• Or here’s your career path\n• Here’s your training path\n• Here are the number of individuals we have that meet 70% of our skills and we need to upscale them to the next 30%\n\nPeople analytics can be broken into so many different areas:\n• Attrition\n• Time to hire\n• Recruitment capabilities\n• Learning/ development\n\nWith regards to skills for people analytics:\n• NLP is a good tool to have because a lot of the data we have is unstructured. We need to be able to pull from that.\n• Understanding various classification models, how you’re grouping individuals & understanding various metrics within the HR area.\n\nHow much of people analytics is data science and predictive modelings versus reports and business intelligence?\n\nRight now everybody does a little bit of everything\n\nWhen I first got here, they were primarily focused on reporting and creating some type of visualization\n\nOver the last couple of years, we’ve been trying to break into a group that focus on reports in general and a group looking more at the data analytics & modeling, creating the various algorithms that we can utilize for extracting skills and competencies or looking at our attrition models, for example.\n\nIdeally, I would break it down to 5-6 visualizers, 10 data scientists and 4-5 data engineers or architects.\n\nResources shared:\n\nJoe shard an example of Shiny at NASA: https://lnkd.in/gRJjFX6B\nDavid shared Predictive HR Analytics: https://lnkd.in/gPPjjzPZ\nDavid shared Inclusalytics: https://lnkd.in/g48tdrMu\nRachael shared the rstudio::conf workshop for admins: https://lnkd.in/eB9FZt-c\nRachael shared the RStudio workshop for people analytics: https://lnkd.in/e4DdhFAV\nGeorge shared an article on writing a resume for AI: https://lnkd.in/g3cF_vtD\n\nWhere to find more?\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n► Data Science Hangout site: rstudio.com/data-science-hangout\n► Add the Data Science Hangout to your calendar: rstd.io/datasciencehangout\n\nFollow Us Here:\nWebsite: https://www.rstudio.com\nLinkedIn:https://www.linkedin.com/company/rstudio\nTwitter: https://twitter.com/rstudio"
