[[videos]]
url = "https://www.youtube.com/watch?v=3GEFd8rZQgY"
title = "The R6 Class System by Winston Chang from useR! Brussels 2017"
slug = "2017-08-02_the-r6-class-system-by-winston-chang-from-user-brussels-2017"
date = "2017-08-02T20:05:26Z"
description = "R6 is an implementation of a classical object-oriented programming system for R. In classical OOP, objects have mutable state and they contain methods to modify and access internal state. This stands in contrast with the functional style of object-oriented programming provided by the S3 and S4 class systems, where the objects are (typically) not mutable, and the methods to modify and access their contents are external to the objects themselves.\nR6 has some similarities with R's built-in Reference Class system. Although the implementation of R6 is simpler and lighter weight than that of Reference Classes, it offers some additional features such as private members and robust cross-package inheritance.\nIn this talk I will discuss when it makes sense to use R6 as opposed to functional OOP, demonstrate how to use the package, and explore some of the internal design of R6."
duration = 1134
channel = "Posit PBC"
playlist = ""
