[[videos]]
url = "https://www.youtube.com/watch?v=5NQnwHXKVj8"
title = "Kelly O'Briant | Building a business case for data science & advocating for analytic infrastructure"
slug = "2022-05-04_kelly-obriant-building-a-business-case-for-data-science-advocating-for-analytic-infrastructure"
date = "2022-05-04T14:45:01Z"
description = "3:10 - Start of Kelly's presentation\n5:05 - Identifying where you are in your organizational culture when asking for change\n9:30 - What is analytic infrastructure: the how, where, and with what that goes into your daily data science work\n10:55 - Production looks different at different organizations\n12:20 - Don't get caught up in the hype - there is no perfect deployment pipeline\n14:00 - Tactical metrics for communicating devops - code deployment lead time\n15:55 - Your analytic infrastructure is what enables you or teams to deliver value through decreasing that code deployment lead time\n20:49 - What is an analytic administrator / R Admin? (A data scientist who onboards new tools, deploys solutions, support existing standards. They work closely with IT to maintain and scale analytic environments. They influence others in the organization to be more effective, and are passionate about making data science a legitimate analytic standard)\n24:04 - Building a business case (introducing rstudio.com/champion)\n\nJoin us for future champion chats the 4th Monday of every month (*not the date I said in the recording*) rstd.io/champion-chats\n\nLet’s admit it. Getting to use the tools you want sometimes needs a little convincing.\n\nWe’ve had the opportunity to meet so many wonderful people from the community. People that: organize meetups in their own communities, spend time after-hours teaching their co-workers, solve business problems at work with Shiny, write blog posts to help others, and so much more..\n\nPeople are doing amazing things with data science, yet so many are still in a position where they are not able to make the case for it at their own organizations.\n\nHear from Kelly O’Briant on how you can start to navigate the internal process and advocate for great analytic infrastructure as a data scientist.\n\nWhether you’re getting pushback about using open-source, being told to use a BI tool instead, or just unable to find the other data scientists at your company - we want to help make this process less frustrating. Come hang out and chat with us! \n\n*Please note, only the presentation portion of this meetup was recorded, the open discussion and Q&A was not.\n\nResources shared this week:\n⬢ rstudio.com/champion\n⬢ John shared a typology of organisational cultures: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC1765804/pdf/v013p0ii22.pdf\n⬢ Kelly shared The Phoenix Project book: https://www.amazon.com/Phoenix-Project-DevOps-Helping-Business-ebook/dp/B078Y98RG8 and The Unicorn Project book: https://www.amazon.com/gp/product/B07QT9QR41\n⬢ Kelly shared Benjy’s talk on conveying data science findings to non-experts: ​​ https://www.youtube.com/watch?v=UUIda4-CSXQ\n⬢ Nick shared: The pkgdown package can be used to build informational web pages about R packages, which can themselves be deployed to RStudio Connect: https://pkgdown.r-lib.org/\n⬢ Kelly shared Nathan Stephens RViews blog on Analytics Administration for R: https://rviews.rstudio.com/2017/06/21/analytics-administration-for-r/"
