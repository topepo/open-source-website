url = "https://www.youtube.com/watch?v=UFfTwTuNR2c"
title = "Sparsity support in tidymodels, faster and less memory hungry models - Emil Hvitfeldt"
slug = "2025-10-30_sparsity-support-in-tidymodels-faster-and-less-memory-hungry-models-emil-hvitfeldt"
date = "2025-10-30T14:33:56Z"
description = "Sparse data, data with a lot of 0s, appear quite often in modeling contexts. However, existing data structures such as data.frames or matrices doesn't have a good way of controlling them. You were forced to represent all data as sparse or dense (non-sparse).\n\nThis means that many modelings workflows uses an non-optimal data structure, that at best slows down computation and at worst won't be computational feasible.\n\nThis talk will cover how we overcame these issues in tidymodels. Starting with the creation of a sparse vector format that fit in tibbles followed by the wiring needed to make it happen in our packages.\n\nThe best part is that most users doesn't need to change anything in their code to benefit from these speed improvements."
