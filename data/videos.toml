[[videos]]
url = "https://www.youtube.com/watch?v=XvONLqtEkvg"
title = "Ralph Asher @ Data Driven Supply Chain | Data Science Hangout"
slug = "2024-10-07_ralph-asher-data-driven-supply-chain-data-science-hangout"
date = "2024-10-07T13:45:03Z"
description = "In this Hangout, Ralph talks about his experiences in the supply chain industry - a hidden gem of a data job field - and his educational background in Operations Research. He talks about the types of problems supply chain analysts work to solve, how 2020 reshaped the landscape of supply chain, and how he decided to start his own business. He also gives some great advice about marketing yourself, whether you’re starting your own consulting company or looking for a new role: be specific about what you want and the problems you solve. If you’ve been curious about supply chain jobs, you’ll want to hear Ralph’s perspective!\n\nSpeaker bio: Ralph Asher is the founder of Data Driven Supply Chain LLC, a Minneapolis-based consultancy working at the intersection of supply chain and decision science. Since 2021, Ralph and his team have used decision science and data science to build advanced supply chain models, helping clients make tough supply chain decisions around network design, inventory optimization, and more.\n\nTimestamps:\n03:00 About Ralph Asher\n05:35 What type of problems do supply chain analysts work on?\n07:55 What type of data jobs are there in the Supply Chain Industry?\n10:15 How did COVID-19 impact supply chain jobs?\n13:10 How do you know you’re ready to start a consulting business?\n15:25 With so much data, how do you make sure insights are actionable and not irrelevant?\n17:30 What are some examples of data management or governance challenges in supply chain?\n18:15 What career advice would you give new grads or people looking to switch careers?\n21:10 Why being specific about what you want to do gets you job opportunities\n23:55 Book recommendation: The Black Swan and preserving optionality, keeping doors open\n25:20 Is a supply chain consultant more valuable and effective than a supply chain department?\n26:50 How do you learn all the parts of running a business by yourself? The E-Myth Revisited book\n29:20 Do you ever have to convince people to move past Excel? Supply chain runs on Excel.\n31:05 Career advice - lean into something you’re good at. The Algebra of Wealth book\n33:30 How do you manage data and metadata? How do you manage knowledge for your business?\n36:25 How do you determine which clients to accept and which to turn away as a consultant?\n37:45 How do you do discovery work with a consulting client to make sure they’re a fit?\n39:10 Saying no to the wrong jobs so that you can say yes to the right jobs\n40:00 Can client discovery be done as a paid project? Could it be its own product?\n44:00 As a consultant, how do you make the unseen hours of labor visible?\n46:10 What is a good entry point for a company that doesn’t have a dedicated supply chain team?\n47:35 Should you go back to school for another degree to get a job that feels out of reach?\n49:10 How does your career growth change between IC and management?\n50:55 What are some supply chain communities to join?\n52:10 Do supply chain teams work within data teams or separately?\n55:50 As a consultant on your own, how do you keep your skills sharp and up to date?\n57:20 How do you use Shiny in your supply chain consulting jobs?\n\nResources mentioned in the episode:\nThe Black Swan by Nassim Taleb: https://www.randomhousebooks.com/books/176226/ \nThe E-Myth Revisited by Michael Gerber: https://www.michaelegerbercompanies.com/product/the-e-myth-revisited/ \nThe Irresistible Consultant’s Guide to Winning Clients by David Fields: https://www.davidafields.com/books/#section-1 \nThe Algebra of Wealth by Scott Galloway: https://www.penguinrandomhouse.com/books/730881/the-algebra-of-wealth-by-scott-galloway/ \nNotion: https://www.notion.so/ \nHubSpot: https://www.hubspot.com/products/crm \nCSCMP, Council for Supply Chain Management Professionals: https://cscmp.org/ \nASCM, the Association for Supply Chain Management: https://www.ascm.org/ \nISM, Institute for Supply Management: https://www.ismworld.org/ \nINFORMS, Institute for Operations Research and Management Sciences: https://www.informs.org/\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nThe Hangout is a gathering place for the whole data science community to chat about data science leadership and questions you're all facing that happens every Thursday at 12 ET.\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh \n\nWe'd love to have you join us in the conversation live!\n\nThanks for hanging out with us! 💛"
