[[videos]]
url = "https://www.youtube.com/watch?v=izFssYRsLZs"
title = "Hadley Wickham | Maintaining the house the tidyverse built | RStudio"
slug = "2021-02-18_hadley-wickham-maintaining-the-house-the-tidyverse-built-rstudio"
date = "2021-02-18T20:00:19Z"
description = "Hadley will talk about how the tidyverse has evolved since its creation (just five years ago!). You'll learn about our greatest successes, learn from our biggest failures, and get some hints of what's coming down the pipeline for the future.\n\nAbout Hadley:\nHadley Wickham is the Chief Scientist at RStudio, a member of the R Foundation, and Adjunct Professor at Stanford University and the University of Auckland. He builds tools (both computational and cognitive) to make data science easier, faster, and more fun. You may be familiar with his packages for data science (the tidyverse: including ggplot2, dplyr, tidyr, purrr, and readr) and principled software development (roxygen2, testthat, devtools, pkgdown). Much of the material for the course is drawn from two of his existing books, Advanced R and R Packages, but the course also includes a lot of new material that will eventually become a book called \"Tidy tools\"."
