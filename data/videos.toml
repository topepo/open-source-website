title = "Nathan Stephens | Make PowerPoint Presentations with R Markdown | RStudio (2018)"
slug = "2021-03-16_nathan-stephens-make-powerpoint-presentations-with-r-markdown-rstudio-2018"
date = "2021-03-16T14:00:31Z"
description = "Data scientists use R Markdown documents to create reproducible code that can be rendered in a variety of output types. Some of the most common output types include HTML, Word, and PDF, but new improvements make it possible to create PowerPoint presentations as well. PowerPoint presentations are still common currency for sharing insights in most organizations today. This webinar demonstrates how to create feature rich PowerPoint presentations from R Markdown and how to use these presentations to share insights, visualizations, Shiny apps, and more.\n\nAbout Nathan:\nNathan has a background in analytic solutions and consulting. He has experience building data science teams, architecting analytic infrastructure, and delivering innovative data products. He is a long time user of R."
