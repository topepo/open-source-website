[[videos]]
url = "https://www.youtube.com/watch?v=SN3xmEP3R8M"
title = "Nicole Jones - Breaking Barriers: Adopting R in Biotech with Posit"
slug = "2024-10-31_nicole-jones-breaking-barriers-adopting-r-in-biotech-with-posit"
date = "2024-10-31T13:56:02Z"
description = "In recent years, there has been a notable surge in R adoption in the pharmaceutical and biotech sectors, demanding regulated environments for R-based workflows. Posit offers a comprehensive ecosystem of tools designed to meet these needs. While these tools offer advantages, there is an additional burden placed on companies to maintain the environment. One notable challenge is integrating the Posit tools with a regulated Statistical Computing Environment(SCE) while ensuring standardized environments across the development and regulated systems. In this talk, we will share the benefits, challenges and lessons learned leveraging the Posit ecosystem in a mid-sized biotech company.\n\nTalk by Nicole Jones"
