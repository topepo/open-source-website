[[videos]]
url = "https://www.youtube.com/watch?v=CjNOSrfQiAY"
title = "JD Long | Empathy in action: Building community of practice for analytics in a global corp | RStudio"
slug = "2021-02-17_jd-long-empathy-in-action-building-community-of-practice-for-analytics-in-a-global-corp-rstudio"
date = "2021-02-17T21:22:55Z"
description = "Talk from rstudio::conf(2019)\n\nJD Long, Vice President of Risk Management & Data Philosophy at the global reinsurer Renaissance Re will share his experience with creating a \"Community of Practice\" for analytics inside of a global corporation. The theme of \"empathy\" will be recurring as he discusses how he worked to create a supportive learning environment focused on helping analysts \"kick ass\" regardless of their tool set. This means creating a community that's supportive of Excel, SQL, Python, and, of course, R.\n\nAbout JD Long:\nI build models. And according to George E. P. Box, my models are wrong. My skill is understanding when and where my models are useful. I'm an experienced risk and data scientist with a background in insurance, reinsurance, market risk, and stochastic modeling. I'm the guy who can build a Monte Carlo model, help parallelize the model to run on Amazon's cloud services and then stand in front of a general audience and put the work in context where everyone understands. My super power is thinking probabilistically, understanding risk, and communicating clearly. I have a history forming bridges between IT and business teams."
