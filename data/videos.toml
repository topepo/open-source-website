[[videos]]
url = "https://www.youtube.com/watch?v=zikxpOoEcLk"
title = "Dmitri Adler & Merav Yuravlivker | The shift to data: Industry trends in finance | Posit"
slug = "2022-02-08_dmitri-adler-merav-yuravlivker-the-shift-to-data-industry-trends-in-finance-posit"
date = "2022-02-08T04:31:08Z"
description = "Posit Finance Meetup\nThe shift to data: Industry trends from banks to hedge funds to federal agencies\n\nHow has the finance industry shifted towards data in the past 5 years? Will all analysts need to program in Python in order to have a job in the future? Join Data Society co-founders Merav Yuravlivker and Dmitri Adler as they discuss the trends that they're seeing in financial institutions from banks to hedge funds to federal agencies. By the end of the session, you'll be able to speak about specific industry uses and walk away with concrete steps you can take to ensure you're riding the data wave.\n\nSpeaker Bios:\n\nDmitri Adler is the Chief Solution Architect and co-founder of Data Society. He has deep expertise in building predictive models and algorithms for forecasting macroeconomic conditions, healthcare outcomes, trade flows, and business performance for a variety of government and private sector clients. Prior to starting Data Society, he advised the U.S. Treasury Department on the structure of the mortgage market after the financial crises while he was at J.P. Morgan and developed expertise in applying machine learning to financial modeling and investing. Dmitri has worked with large financial institutions and agencies to build custom software, assess financial risk, and integrate machine learning applications into their operations.\n\nMerav Yuravlivker is the Chief Executive Officer and co-founder of Data Society. She has deep expertise in developing effective professional development programs and assessments to maximize the capability of an organization and empower the workforce. Prior to starting Data Society, she built her career at educational institutions that include Teach for America, Kaplan, and the International Baccalaureate Organization. Over the past seven years, Merav and her team have saved organizations millions of dollars by incorporating data analytics skills and best practices that educate, equip and empower an organization’s workforce to achieve its goals and expand its impact.\n\nData Society specializes in providing industry-tailored data science training and AI/ML solutions that enable Fortune 500 companies and government agencies to educate, equip and empower their workforce. Since 2014, the company has trained thousands of professionals with the skills needed to solve complex challenges, realize new opportunities, and take their careers to the next level.\nData Society was recognized as an Inc. 5000 2021 fastest-growing company and named a top EdTech Company to watch by Forbes. For more information, visit www.DataSociety.com.\n\nLink to slides: https://github.com/RStudioEnterpriseMeetup/Presentations/blob/166452d28d61ef33faf8980c8f0f43426e72926b/The%20shift%20in%20data.pdf"
