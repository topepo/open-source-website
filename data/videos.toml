[[videos]]
url = "https://www.youtube.com/watch?v=U8_Dc_ru8fg"
title = "Tyler Morgan-Wall - Quarto, AI, and the Art of Getting Your Life Back"
slug = "2024-10-31_tyler-morgan-wall-quarto-ai-and-the-art-of-getting-your-life-back"
date = "2024-10-31T13:56:27Z"
description = "Tired of endless server issues and maintenance headaches? Want to reclaim your time for coding, writing, and creating? Join me as I share my journey of switching from the server-based headaches of WordPress to Quarto with a little help from AI. In this talk, I’ll describe the simple trick I used to convert an existing WordPress blog—complete with custom scripts, styles, and beautiful 3D data viz content—into a slick Quarto site. I'll then demonstrate some lesser-known features of Quarto to automate deploying a website entirely from a Quarto project file. Finally, I’ll show you how I used AI to customize and style my new Quarto site and provide several useful strategies to employ if you decide to get some help from AI on your own Quarto journey.\n\nTalk by Tyler Morgan-Wall"
