title = "Anubhuti Mishra | Optimal allocation of COVID-19 Vaccines in West Africa | A Shiny success story"
slug = "2022-10-24_anubhuti-mishra-optimal-allocation-of-covid-19-vaccines-in-west-africa-a-shiny-success-story"
date = "2022-10-24T17:07:59Z"
description = "In 2022, African countries need to vaccinate most of their population against COVID-19. With an influx of millions of doses, countries need to plan in near real-time, considering constraints at every step of the supply chain. Our Shiny app provides a low-cost decision-making tool for the Ministry of Health in Côté d’Ivoire. Using lpSolve library, we optimize for factors like eligible population in catchment area of vaccination sites, types and number of vaccine doses, expiration date of vaccine does, availability of trained healthcare staff, and presence of cold storage facility. The app maximizes number of people vaccinated while minimizing vaccine wastage across thousands of vaccination sites. (App development will end on May 31)\n\nSession: R be nimble, R be quick, R help me plan my vaccine stick: Rapidly responding to world events with R."
