[[videos]]
url = "https://www.youtube.com/watch?v=imscOVXrdSc"
title = "MLOps for a billion pizzas a year | Zack Fragoso @ Domino's Pizza | Data Science Hangout"
slug = "2024-04-11_mlops-for-a-billion-pizzas-a-year-zack-fragoso-dominos-pizza-data-science-hangout"
date = "2024-04-11T18:26:12Z"
description = "We were joined by Zack Fragoso, Head of MLOPs at Domino's Pizza to chat about his mission to Sell More Pizza and Have More Fun by making the business smarter with data.\n\nSpeaker bio: Zack Fragoso is the Head of MLOPs at Domino’s Pizza, where he is on a mission to Sell More Pizza and Have More Fun by making our business smarter with data. His team develops ML/AI applications that supercharge the global pizza delivery leader’s e-commerce and in-store platforms. We've been able to help reward customers for ordering pizza, give them a better estimate of when their order will be ready, route orders more efficiently, and those are just a few examples! Zack is passionate about MLOPs tools that increase productivity, enhancing cross-team collaboration, and support our model life cycle management.\n\nAt 11:07 we discussed two key challenges regarding MLOps: scalability and process\n\nScalability\n\nZack explains that while data scientists can develop accurate models on their laptops, scaling those models to handle the immense volume of Domino's business is a significant hurdle. He emphasizes that Domino's sells close to a billion pizzas annually, with a high concentration of orders between 5 pm and 8 pm. Events like the Super Bowl push the system even further, requiring the ability to process around 6,000 orders per minute. For Domino's, this means that models must be not only accurate but also highly performant to handle these spikes in demand.\n\nProcess\n\nThe second challenge Zack identifies is related to integrating the experimental nature of data science work with a robust and reliable production process. He acknowledges that data scientists are inherently driven to experiment with data and various modeling techniques. However, translating these experimental models into a production environment requires a more structured approach that encompasses control mechanisms, versioning, and a focus on reliability. Finding the right balance between this need for flexibility in experimentation and the demands of a structured production process is an ongoing challenge for Domino's.\n\nResources mentioned in the chat:\n🔗LinkedIn Group for the Hangout: https://www.linkedin.com/groups/12610075/\n🔗Domino's Emergency Pizza Website: https://www.dominos.com/emergency-pizza/, offering a free emergency pizza for those who order a regular pizza.\n🔗Dominik Vajda shared an article from The Guardian about a Belgian brewery using AI to improve beer taste: https://www.theguardian.com/technology/2024/mar/26/ai-beer-taste-better-belgium-scientists\n\n\n________________________\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nLinkedIn: https://www.linkedin.com/company/posit-software\n\nTo join future data science hangouts, add to your calendar here: https://pos.it/dsh (All are welcome! We'd love to see you!)\n\nThanks for hanging out with us! 💛"
