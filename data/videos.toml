title = "Hubert Halun - Art of R Packages: Forging Community with Hex Stickers"
slug = "2024-10-31_hubert-halun-art-of-r-packages-forging-community-with-hex-stickers"
date = "2024-10-31T13:56:00Z"
description = "Hex logotypes in the R community are not just for show. They represent identity, unity, and the collaborative nature of open-source projects. This talk will explore how these stickers blend design and visual storytelling, turning R packages into symbols of community. I'll cover the hex sticker creation process, from idea to design, and their impact on brand recognition and user pride. Using examples from the Tidyverse, Rhinoverse, Nest, and others, I'll highlight how hex stickers unite the R community. The aim is to show how mixing design with data science in creating R packages can build a strong community, highlighting the importance of both looks and usefulness.\n\nTalk by Hubert Halun"
