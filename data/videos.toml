[[videos]]
url = "https://www.youtube.com/watch?v=fb7uwDIi2gU"
title = "The actuary to data scientist pipeline | Bill Wilkins | Data Science Hangout"
slug = "2025-04-03_the-actuary-to-data-scientist-pipeline-bill-wilkins-data-science-hangout"
date = "2025-04-03T20:38:03Z"
description = "To join future data science hangouts, add it to your calendar here: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Bill Wilkins, SVP, Advanced Analytics with Practical Applications at Safety National Casualty Corporation, to chat about the evolving role of actuaries in the age of data science, the impact of technology on risk and pricing strategies in insurance, the use of third-party data and advanced analytics models, and the future challenges and opportunities for the insurance industry.\n\nBill, who has 40 years of experience in the insurance industry and started as an actuary, shared his insights on how data science technology is affecting the actuarial profession. He noted that while the core data hasn't changed significantly, the increased computing power allows for the utilization of more complex math, speeding up processes. However, the actuarial profession is still adapting to these technological advancements, especially considering the strict regulatory environment and the crucial issue of unintentional bias in data. Bill discussed the distinction between data scientists and actuaries, highlighting the specialized knowledge of actuaries. There was also a discussion on whether a data science background could be a pathway to becoming an actuary, with the observation that it's more common to see actuaries moving into data science roles (as opposed to the other way around!).\n\nIf you didn’t join live, one great moment you missed from the zoom chat was about what \"finger sticks\" referred to, after Bill mentioned it as a significant issue in hospital systems that his team was working to prevent. There was definitely a humorous reaction in the chat as we all dreaded finding out what that meant! 😅 \n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\nFollow Us Here: \nWebsite: https://www.posit.co \nHangout: https://pos.it/dsh \nLinkedIn:  https://www.linkedin.com/company/posit-software \nBluesky:  https://bsky.app/profile/posit.co\nThanks for hanging out with us! 💛"
