[[videos]]
url = "https://www.youtube.com/watch?v=HtKgIrOnJc8"
title = "Teaching out loud and becoming StatQuest | Josh Starmer | Data Science Hangout"
slug = "2026-01-19_teaching-out-loud-and-becoming-statquest-josh-starmer-data-science-hangout"
date = "2026-01-19T15:15:02Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Josh Starmer, Founder and Creator of the massively popular YouTube channel StatQuest with Josh Starmer, to chat about his process for simplifying complex technical topics, overcoming imposter syndrome and feeling cringe, the enduring value of foundational statistics over fleeting AI trends, and how to use AI tools responsibly without sacrificing true understanding.\n\nIn this Hangout, we explore Josh's unique approach to teaching and learning difficult concepts. He reveals that he specifically avoids watching other videos on a subject to ensure his explanations remain original. Instead, he focuses on finding the \"simplest possible example\" that still highlights the method's utility—such as creating a neural network with only three data points to visualize the math. Josh emphasizes that the hardest part of his work is constantly asking, \"Can I make it simpler?\" and extracting the essence of an equation so that learners can \"feel\" the statistics rather than just memorizing them.\n\nResources mentioned in the video and zoom chat: \n🔗 StatQuest with Josh Starmer (YouTube) → https://www.youtube.com/c/joshstarmer \n🔗 The StatQuest Illustrated Guide to Neural Networks and AI → https://www.amazon.com/dp/B0DRS71QVQ \n🔗 The StatQuest Illustrated Guide to Machine Learning → https://www.amazon.com/dp/B0BLM4TLPY\n🔗 The StatQuest Store → https://statquest.org/statquest-store/\n🔗 Introduction to Statistical Learning (ISLR) → https://www.statlearning.com/\n🔗 Grokking Machine Learning by Luis Serrano → https://www.manning.com/books/grokking-machine-learning\n🔗 Hands-On Large Language Models by Jay Alammar & Maarten Grootendorst  → https://www.maartengrootendorst.com/book/\n🔗 Statistical Methods for Research Workers by R. A. Fisher → https://link.springer.com/chapter/10.1007/978-1-4612-4380-9_6\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was the \"Smug Bayesian\" vs. Frequentist debate, which sparked jokes about p-hacking and a community demand for \"Smug Bayesian\" t-shirts. Will Mike K. Smith answer this call?? Would you wear a Smug Bayesian shirt? 😎\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nThe Lab: https://pos.it/dslab\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps:\n00:00 Introduction\n01:47 \"Who are you and how did you get to the YouTube space?\" \n05:38 \"What was it that you really wanted to do as a career?\" \n07:52 \"Have you got any top tips on how to make video editing easier?\" \n10:30 \"What is your process for breaking down a difficult concept?\" \n15:56 \"What's the most common statistical or machine learning mistake you see in real projects?\" \n19:40 \"How do you keep up with the hands-on stuff?\" \n21:43 \"What is the one book that every data science professional should read?\" \n26:13 \"What statistical concept do people think they understand but almost always misuse?\" \n30:42 \"What would be your advice for a new grad to break out as a data science professional?\" \n35:55 \"What are your tips for generating confidence to teach out loud?\" \n40:18 \"Do you ever feel cringe? How do you deal with that?\" \n42:25 \"Do you have any career advice?\" \n45:28 \"How have your musical talents helped with your work in data?\" \n47:25 \"How would you integrate AI as a responsible assistant and where would you forbid it?\" \n47:43 \"What data tools and IDEs do you use?\" \n52:25 \"What is a memorable concept that you remember having a personal moment through teaching?\" \n53:10 \"What are you most excited for in 2026?\""
