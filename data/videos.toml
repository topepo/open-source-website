title = "Supporting 100 Data Scientists with a Small Team | Mike Thomson | Data Science Hangout"
slug = "2025-10-08_supporting-100-data-scientists-with-a-small-team-mike-thomson-data-science-hangout"
date = "2025-10-08T15:01:20Z"
description = "ADD THE DATA SCIENCE HANGOUT TO YOUR CALENDAR HERE: https://pos.it/dsh - All are welcome! We'd love to see you!\n\nWe were recently joined by Mike Thomson, Data Science Manager at Flatiron Health, to chat about managing open source tools and maintaining R packages, creating reproducible reports for Word and Excel using Quarto, the “hub and spoke” support model for data scientists, and applying R and Posit tools in Real World Evidence (RWE) oncology space.\n\nIn this Hangout, we explore creating reproducible outputs using Quarto for formats like Word and Excel. Flatiron Health uses Quarto because it allows the reproducible publication of analyses to multiple formats simultaneously (like HTML and a downloadable Word document) from the same source code. A specific challenge discussed was outputting formatted analytic tables to Excel, as this is not natively supported by Quarto. Erica Yim, from Mike's team, detailed how they built an internal R function that uses the flexlsx package along with flextable to easily output pre-existing formatted tables from a Quarto document into an Excel template.\n\nResources mentioned in the video and zoom chat: \n🔗 flexlsx R package GitHub repository → https://github.com/pteridin/flexlsx \n🔗 DBPlier PR for Snowflake Translations (contributed to by Flat Iron Health) → https://github.com/tidyverse/dbplyr/pull/860\n\nIf you didn’t join live, one great discussion you missed from the zoom chat was about the pain points of exporting data from Quarto to Word or Excel, particularly concerning table formatting and styles. Attendees in the chat strongly highlighted the difficulty of managing table formatting, including issues with table cross-references, headers, and footers. They noted that dealing with styles often requires workarounds, such as creating flextables that match desired Word styles instead of relying on default table styles. Let us know below if you’d like to hear more about this topic!\n\n► Subscribe to Our Channel Here: https://bit.ly/2TzgcOu\n\nFollow Us Here:\nWebsite: https://www.posit.co\nHangout: https://pos.it/dsh\nLinkedIn:  https://www.linkedin.com/company/posit-software\nBluesky:  https://bsky.app/profile/posit.co\n\nThanks for hanging out with us! 💛\n\nTimestamps: \n00:00 Introduction \n02:23 \"Can you talk about what Flatiron does and what your teams do?\" \n03:29 \"Could you give us a few examples of the data types or collections that you might be working with?\" \n05:00 \"Do you have longitudinal data?\" \n07:46 \"Are you aware of any computer vision applications in the health care industry from your perspective?\" \n09:38 \"Do you use mixed models or Bayesian MCMC?\" \n10:56 \"How does your team use Quarto?\" \n16:59 \"How do you convince stakeholders of the value of going open source (and handle security concerns)?\" \n22:56 \"Do you allow people to have a certain amount of time to contribute back to open source?\" \n26:03 \"I just want to understand a little bit about your support model for that group.\" \n29:57 \"Do you have any tips for asynchronous working?\" \n31:02 \"Are you like a Jira team or an Asana team for assigning tasks or tickets?\" \n32:10 \"How many people on your platform team support Posit teams?\" \n34:24 \"What does your team use for unstructured document analysis?\" \n36:24 \"How important is domain knowledge in your recruitment?\" \n40:02 \"Where do you store all of this stuff (data storage and databases)?\" \n42:04 \"What is the approximate timeline from the time you do analysis to final deployment of results in the real world?\" \n44:31 \"Is there a process for people getting things approved to use in your environment?\" \n47:39 \"How do you handle the challenge of going back from Word to Quarto source code (after changes are tracked)?\" \n50:22 \"What does a typical Workday look like for you?\" \n51:47 \"Is there a piece of career advice that has either really helped you, that you've really liked, that you try to give to other people?\""
