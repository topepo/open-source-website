url = "https://www.youtube.com/watch?v=xR9kGAZXpV4"
title = "Communicating the value of data science | Led by Merav Yuravlivker"
slug = "2022-09-02_communicating-the-value-of-data-science-led-by-merav-yuravlivker"
date = "2022-09-02T18:58:28Z"
description = "Communicating the value of data science\nLed by Merav Yuravlivker, CEO & Co-Founder of Data Society\n\nFour years ago, Merav sent out a small survey to better understand the challenges of data professionals. It quickly spread and hundreds of responses poured in from Frustrated Data Scientists, who didn't feel understood or have the support they needed. From that, Data Society released the Data Science Communicator Toolkit to help alleviate their pain points. \n\nNow, they've relaunched the survey to see how they're doing today - what's better, what's worse, and what's next. Merav will release the preliminary results of the updated survey and talk through how data professionals today can bridge the communication gap to foster better insights and increase their impact.\n\nSurvey link: https://bit.ly/3pxrejT\nData Science Communicator Toolkit: https://www.rstudio.com/champion/business-case (under the section that says build your case with a presentation)\n\nSpeaker bio:\nMerav Yuravlivker is the CEO and co-founder of Data Society. She and her team train up thousands of professionals every year across Fortune 500 companies, large organizations, and federal agencies to help them use data better and solve tough challenges. Merav is passionate about delivering the impactful combination of education and data to transform how industries run today.\n\nWhat is a Champion Chat?\nThe champion chat is an informal meetup where we can ask questions to the community and share best practices with each other for advocating for data science at your organization. During these calls, we may also feature a short presentation from a community member who has championed data science and has a few tips to share with us all.\n\n*Please note, any presentation portion of this meetup would be recorded, but the open discussion/ Q&A will not.\n\nWho?\nAll are welcome - no matter your role/industry/experience\nNo need to register for anything\nIt's always okay to join for part of a session\nYou can just listen-in if you want\nYou can ask anonymous questions too!\n\nHelpful info on advocating for data science: rstudio.com/champion"
