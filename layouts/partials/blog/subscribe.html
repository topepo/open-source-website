{{- /*
  Subscription CTA section for blog posts
  Encourages readers to stay connected
*/ -}}

<section class="w-[calc(100vw-2rem)] sm:w-[calc(100vw-3rem)] lg:w-[calc(100vw-8rem)] relative left-1/2 -translate-x-1/2 bg-blue-100 dark:bg-blue-950 py-20 mt-12 mb-0 rounded-[3rem]">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-3xl font-semibold mb-4 text-gray-800 dark:text-gray-100">
      Stay Connected
    </h2>
    <p class="text-lg text-gray-600 dark:text-gray-300 mb-6">
      Get the latest updates on Posit open source projects and insights from our community.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a href="https://github.com/posit-dev" target="_blank" rel="noopener noreferrer"
         class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
        Follow us on GitHub
      </a>
      <a href="/blog/index.xml"
         class="inline-flex items-center px-6 py-3 border border-blue-600 text-blue-600 dark:text-blue-600 dark:border-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900 font-medium rounded-lg transition-colors">
        Subscribe via RSS
      </a>
    </div>
  </div>
</section>
